<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Admin</title>

<style>

:root{
  --bg:#07070b;
  --card:rgba(255,255,255,0.04);
  --text:#f5f5f7;
  --muted:#9ca3af;
  --accent:#7c3aed;
  --stroke:rgba(255,255,255,0.06);
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= SCREENS ================= */
.screen{
  position:absolute;
  width:100%;
  height:100vh;
  opacity:0;
  transform:scale(1.02);
  pointer-events:none;
  transition:.3s ease;
}

.screen.active{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

/* ================= TOP ================= */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-weight:700;
}

/* ================= POST ================= */
.post{
  margin:10px 12px;
  padding:14px;
  background:var(--card);
  border-radius:18px;
  border:1px solid var(--stroke);
}

.header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  background:var(--accent);
}

/* ================= BUTTON ================= */
.btn{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  font-weight:600;
}

/* ================= NAV ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:64px;
  background:rgba(20,20,25,0.65);
  backdrop-filter:blur(26px);
  border-radius:24px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid var(--stroke);
}

/* ================= ADMIN PANEL ================= */
#adminPanel{
  position:absolute;
  top:0;
  right:-100%;
  width:85%;
  height:100vh;
  background:#0f0f14;
  transition:.35s ease;
  padding:16px;
  overflow:auto;
  border-left:1px solid var(--stroke);
}

#adminPanel.active{
  right:0;
}

.userRow{
  padding:10px;
  border-bottom:1px solid var(--stroke);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ================= TAP ================= */
.tap:active{
  transform:scale(.95);
}

</style>
</head>

<body>

<!-- FEED -->
<div id="feedScreen" class="screen active">

  <div class="topbar">
    <div>Instant</div>
    <div onclick="openAdmin()" class="tap">⚙</div>
  </div>

  <div id="feed"></div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <h3>Panel Admin</h3>

  <div id="onlineBox"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain:"vozanonimasm.firebaseapp.com",
  projectId:"vozanonimasm"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* ================= USER ================= */
let me={
  username:"Jscol_Owner",
  role:"admin"
};

/* ================= NAV ================= */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ================= FEED ================= */
function loadFeed(){

  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{

    let html="";

    s.forEach(d=>{

      let p=d.data();

      html+=`
      <div class="post">

        <div class="header">
          <div class="avatar"></div>
          <b>@${p.username}</b>
        </div>

        <p>${p.text}</p>

        ${me.role==="admin" ? `
          <button class="btn" onclick="deletePost('${d.id}')">
            borrar
          </button>
        ` : ""}

      </div>`;
    });

    feed.innerHTML=html;

  });

}

/* ================= DELETE POST ================= */
function deletePost(id){

  if(me.role!=="admin")return;

  db.collection("posts").doc(id).delete();

}

/* ================= ADMIN PANEL ================= */
function openAdmin(){

  if(me.role!=="admin"){
    alert("No eres admin");
    return;
  }

  let panel=document.getElementById("adminPanel");
  panel.classList.toggle("active");

  loadUsers();
}

/* ================= USERS ONLINE ================= */
function loadUsers(){

  db.collection("presence")
  .onSnapshot(s=>{

    let html="<h4>Usuarios</h4>";

    s.forEach(d=>{

      let u=d.data();

      html+=`
      <div class="userRow">
        <span>@${u.username}</span>
        <small>${Date.now()-u.lastSeen < 10000 ? "online" : "offline"}</small>
      </div>`;
    });

    onlineBox.innerHTML=html;

  });

}

/* ================= POSTS INIT ================= */
loadFeed();

/* ================= PRESENCE ================= */
function setOnline(){

  db.collection("presence")
  .doc(me.username)
  .set({
    username:me.username,
    lastSeen:Date.now()
  });

}

setInterval(()=>{

  db.collection("presence")
  .doc(me.username)
  .set({
    username:me.username,
    lastSeen:Date.now()
  });

},5000);

setOnline();

</script>

</body>
</html>
