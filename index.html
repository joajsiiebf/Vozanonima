<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant</title>

<style>
:root{
  --bg:#0b0b10;
  --card:#14141a;
  --text:#f5f5f7;
  --muted:#8e8e93;
  --accent:#3897f0;
  --glass:rgba(25,25,30,0.55);
  --stroke:rgba(255,255,255,0.08);
}

.light{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#0b0b10;
  --muted:#6b6b70;
  --glass:rgba(255,255,255,0.7);
  --stroke:rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* WELCOME */
#welcome{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo{
  font-size:40px;
  font-weight:700;
}

.sub{
  color:var(--muted);
}

.btn{
  margin-top:20px;
  padding:12px 18px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:white;
  font-weight:600;
}

/* SCREENS */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:100%;
  transition:.35s ease;
  background:var(--bg);
  overflow:auto;
}

.screen.active{
  left:0;
}

/* LOGIN */
.login{
  display:flex;
  flex-direction:column;
  justify-content:center;
  height:100%;
  padding:24px;
  gap:10px;
}

input{
  padding:13px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:var(--card);
  color:var(--text);
}

/* FEED */
.feed{
  padding-bottom:100px;
}

.post{
  padding:14px;
  border-bottom:1px solid var(--stroke);
}

.header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#333;
}

.image{
  width:100%;
  height:260px;
  background:#222;
  border-radius:14px;
  margin-top:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:64px;
  background:var(--glass);
  backdrop-filter:blur(25px);
  border-radius:22px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid var(--stroke);
}

/* PROFILE */
.profile{
  padding:16px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.grid div{
  height:120px;
  background:var(--card);
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome">
  <div class="logo">Instant</div>
  <div class="sub">Share moments, not noise</div>
  <button class="btn" onclick="goLogin()">Continuar</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <div class="login">
    <h2>Login</h2>
    <input id="user" placeholder="usuario">
    <input id="pass" type="password" placeholder="contraseña">
    <button class="btn" onclick="login()">Entrar</button>
    <button class="btn" onclick="register()">Crear cuenta</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">

  <div style="padding:14px;font-weight:700">Instant</div>

  <div id="feed" class="feed"></div>

  <div class="nav">
    <span onclick="loadFeed()">🏠</span>
    <span onclick="createPost()">＋</span>
    <span onclick="openProfile()">👤</span>
  </div>

</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <div style="padding:14px" onclick="back()">← volver</div>
  <div id="profileBox"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain: "vozanonimasm.firebaseapp.com",
  projectId: "vozanonimasm",
  storageBucket: "vozanonimasm.firebasestorage.app",
  messagingSenderId: "533740152067",
  appId: "1:533740152067:web:1ec05c7842f09a9e32f536",
  measurementId: "G-S53MVLKF66"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= SESSION ================= */
let currentUser = JSON.parse(localStorage.getItem("user")) || null;

if(currentUser){
  showApp();
}

/* ================= NAV ================= */
function goLogin(){
  welcome.style.display="none";
  login.classList.add("active");
}

function showApp(){
  login.classList.remove("active");
  app.classList.add("active");
  loadFeed();
}

/* ================= AUTH ================= */
async function login(){
  const snap = await db.collection("users")
  .where("username","==",user.value)
  .where("password","==",pass.value)
  .get();

  if(snap.empty) return alert("error login");

  currentUser = snap.docs[0].data();
  localStorage.setItem("user", JSON.stringify(currentUser));

  showApp();
}

async function register(){
  await db.collection("users").add({
    username:user.value,
    password:pass.value,
    followers:0,
    following:0
  });

  alert("creado");
}

/* ================= FEED ================= */
function loadFeed(){
  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{
    let html="";

    s.forEach(d=>{
      let p=d.data();

      html+=`
      <div class="post">

        <div class="header">
          <div class="avatar"></div>
          <b>@${p.username}</b>
        </div>

        <div class="image"></div>

        <p>${p.text}</p>

      </div>`;
    });

    feed.innerHTML = html;
  });
}

/* ================= POST ================= */
function createPost(){
  let t = prompt("texto");

  if(!t) return;

  db.collection("posts").add({
    username: currentUser.username,
    text: t,
    created: Date.now()
  });
}

/* ================= PROFILE ================= */
function openProfile(){
  app.classList.remove("active");
  profile.classList.add("active");

  db.collection("posts")
  .where("username","==",currentUser.username)
  .get()
  .then(s=>{
    let html = `<h3>@${currentUser.username}</h3><div class="grid">`;

    s.forEach(()=> html += `<div></div>`);

    html += `</div>`;
    profileBox.innerHTML = html;
  });
}

function back(){
  profile.classList.remove("active");
  app.classList.add("active");
}

</script>

</body>
</html>
