<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voz Anónima SM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="menu">☰</span>
    <h1>Voz Anonima</h1>
    <div class="icons">
      <span>➕</span>
      <span>🔍</span>
      <span>💬</span>
    </div>
  </div>

  <!-- INPUT -->
  <div class="post-input">
    <img src="https://i.pravatar.cc/40" class="avatar">
    <input type="text" placeholder="¿Qué quieres contar anónimamente?">
  </div>

  <!-- STORIES -->
  <div class="stories">
    <div class="story create">+</div>
    <div class="story"></div>
    <div class="story"></div>
    <div class="story"></div>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

  <!-- NAVBAR -->
  <div class="navbar">
    <span>🏠</span>
    <span>🎥</span>
    <span>👥</span>
    <span>🔔</span>
    <span>👤</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
