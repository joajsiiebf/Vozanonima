<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSCOL | Retro Puzzle Challenge</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f7ff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #fff200;
            --bg-dark: #05051a;
            --panel-bg: rgba(10, 10, 42, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(var(--neon-cyan) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-cyan) 1px, transparent 1px);
            background-size: 50px 50px;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Efecto Scanlines */
            background-blend-mode: overlay;
        }

        /* Overlay de líneas de TV vieja */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        #app {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 20px;
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            z-index: 2;
        }

        .panel {
            background: var(--panel-bg);
            border: 3px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 15px var(--neon-cyan), inset 0 0 10px rgba(0, 247, 255, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Estilo JSCOL Especial */
        .main-panel {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta), inset 0 0 15px rgba(255, 0, 255, 0.2);
            text-align: center;
            justify-content: center;
        }

        h2 {
            font-size: 14px;
            margin-bottom: 20px;
            color: var(--neon-yellow);
            text-shadow: 2px 2px var(--neon-magenta);
            text-transform: uppercase;
        }

        .stat-box {
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 2px dashed var(--neon-cyan);
        }

        .stat-label { font-size: 10px; color: var(--neon-cyan); margin-bottom: 8px; display: block; }
        .stat-value { font-size: 14px; color: #fff; }

        /* Pantalla de juego */
        #content {
            background: rgba(0,0,0,0.4);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        input {
            background: #000;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-yellow);
            padding: 15px;
            font-family: 'Press Start 2P';
            font-size: 12px;
            width: 80%;
            margin-top: 20px;
            text-align: center;
            outline: none;
        }

        button {
            background: var(--neon-magenta);
            color: white;
            border: none;
            padding: 15px 25px;
            margin-top: 20px;
            font-family: 'Press Start 2P';
            font-size: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #6a006a;
            transition: all 0.1s;
        }

        button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #6a006a;
            filter: brightness(1.2);
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #6a006a;
        }

        .prize-tag {
            color: var(--neon-yellow);
            background: rgba(255, 242, 0, 0.1);
            padding: 10px;
            border: 1px solid var(--neon-yellow);
            margin-top: auto;
            font-size: 10px;
            line-height: 1.5;
        }

        #ranking p {
            font-size: 9px;
            line-height: 1.8;
            border-left: 4px solid var(--neon-magenta);
            padding-left: 10px;
            margin: 10px 0;
        }

        /* Animación Glitch */
        .glitch {
            animation: glitch-anim 0.3s infinite;
        }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); filter: hue-rotate(90deg); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-3px, -2px); }
            80% { transform: translate(3px, 2px); }
            100% { transform: translate(0); }
        }

        @media (max-width: 900px) {
            #app { grid-template-columns: 1fr; height: auto; padding: 20px 0; }
            .panel { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="panel">
        <h2><span style="color: var(--neon-magenta);">[</span> JSCOL PLAYER <span style="color: var(--neon-magenta);">]</span></h2>
        
        <div class="stat-box">
            <span class="stat-label">USUARIO:</span>
            <span id="playerName" class="stat-value">---</span>
        </div>
        
        <div class="stat-box">
            <span class="stat-label">NIVEL ACTUAL:</span>
            <span id="playerLevel" class="stat-value">0</span>
        </div>

        <div class="stat-box">
            <span class="stat-label">PROGRESO:</span>
            <span id="progress" class="stat-value">0/20</span>
        </div>

        <div class="prize-tag">
            GRAND PRIZE:<br>
            <span style="font-size: 14px;">$10,000 COP</span>
        </div>
    </div>

    <div class="panel main-panel" id="game">
        <h2 id="levelTitle">INICIALIZANDO...</h2>
        <div id="content">
            </div>
    </div>

    <div class="panel">
        <h2>TOP PUZZLERS</h2>
        <div id="ranking">
            <p>Cargando datos...</p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // Tu Configuración (Asegúrate que coincida con tu proyecto de Firebase)
    const firebaseConfig = {
        apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain: "vozanonimasm.firebaseapp.com",
        projectId: "vozanonimasm"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let USER = {
        uid: localStorage.getItem("uid") || "u_"+Math.random().toString(36).slice(2,7),
        name: localStorage.getItem("name") || null,
        level: parseInt(localStorage.getItem("level")) || 1
    };
    localStorage.setItem("uid", USER.uid);

    const content = document.getElementById("content");
    const ranking = document.getElementById("ranking");

    // Lógica de Inicio
    function checkLogin() {
        if(!USER.name){
            content.innerHTML = `
                <p style="font-size:10px; margin-bottom:20px;">BIENVENIDO AL DESAFÍO JSCOL</p>
                <input id="userNameInput" placeholder="TU ALIAS" maxlength="10">
                <button onclick="login()">EMPEZAR RETRO</button>
            `;
        } else {
            initGame();
        }
    }

    function login() {
        const input = document.getElementById("userNameInput");
        if(input.value.trim().length > 2) {
            USER.name = input.value.trim().toUpperCase();
            localStorage.setItem("name", USER.name);
            saveProgress();
            initGame();
        }
    }

    function saveProgress() {
        db.collection("players").doc(USER.uid).set({
            name: USER.name,
            level: USER.level,
            lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge: true});
    }

    // Ranking en Tiempo Real
    db.collection("players")
        .orderBy("level", "desc")
        .limit(8)
        .onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const p = doc.data();
                html += `<p><span style="color:var(--neon-yellow)">></span> ${p.name} <br> <span style="color:var(--neon-cyan)">LVL ${p.level}</span></p>`;
            });
            ranking.innerHTML = html;
        });

    const puzzles = [
        {q:"TERCERA PALABRA DE ESTA FRASE", a:"palabra"},
        {q:"ENCUENTRA EL BOTÓN OCULTO", action:()=>next()},
        {q:"SERIE: 2, 6, 7, 21, 22, ?", a:"66"},
        {q:"COMANDO: PRESIONA ENTER", enter:true},
        {q:"LA RESPUESTA ESTÁ AQUÍ", a:"aquí"},
        {q:"PROHIBIDO ESCRIBIR 'SÍ'", a:"no"}, // Trampa sutil
        {q:"ASCII: 72 69 76 76 79", a:"hello"},
        {q:"COMBO: 3 CLICKS EN LA PANTALLA", multi:3},
        {q:"SISTEMA SATURADO... ESPERA", wait:5000},
        {q:"ERROR CRÍTICO: NO DEBERÍAS ESTAR AQUÍ", glitch:true, wait:10000},
    ];

    function initGame() {
        document.getElementById("playerName").innerText = USER.name;
        loadLevel();
    }

    function loadLevel() {
        document.body.classList.remove("glitch");
        const levelIdx = USER.level - 1;
        const p = puzzles[levelIdx];

        document.getElementById("playerLevel").innerText = USER.level;
        document.getElementById("progress").innerText = `${USER.level}/20`;
        document.getElementById("levelTitle").innerText = `PUZZLE 0${USER.level}`;

        if(!p) { finishGame(); return; }

        content.innerHTML = `<p style="line-height:1.6; font-size:12px;">${p.q}</p>`;

        if(p.a) {
            content.innerHTML += `<input id="ansInput" autocomplete="off"><br><button onclick="validate('${p.a}')">ENVIAR</button>`;
        }

        if(p.action) {
            const btn = document.createElement("button");
            btn.innerText = "SISTEMA";
            btn.onclick = p.action;
            content.appendChild(btn);
        }

        if(p.enter) {
            content.innerHTML += `<input id="ansInput" placeholder="..."><p style="font-size:8px; margin-top:10px;">[ENTER]</p>`;
            setTimeout(() => {
                const inp = document.getElementById("ansInput");
                inp.onkeydown = e => { if(e.key === "Enter") next(); };
                inp.focus();
            }, 100);
        }

        if(p.multi) {
            let count = 0;
            const clickHandler = () => {
                count++;
                if(count >= p.multi) {
                    window.removeEventListener("click", clickHandler);
                    next();
                }
            };
            window.addEventListener("click", clickHandler);
        }

        if(p.wait) {
            let bar = document.createElement("div");
            bar.style.cssText = "width:0%; height:4px; background:var(--neon-cyan); margin-top:20px; transition: width "+p.wait+"ms linear;";
            content.appendChild(bar);
            setTimeout(() => bar.style.width = "100%", 50);
            setTimeout(next, p.wait);
        }

        if(p.glitch) document.body.classList.add("glitch");
    }

    function validate(correctAns) {
        const val = document.getElementById("ansInput").value.toLowerCase().trim();
        if(val === correctAns.toLowerCase()) {
            next();
        } else {
            const err = document.createElement("p");
            err.innerText = "ACCESO DENEGADO";
            err.style.color = "var(--neon-magenta)";
            err.style.fontSize = "8px";
            content.appendChild(err);
            setTimeout(() => err.remove(), 1000);
        }
    }

    function next() {
        USER.level++;
        localStorage.setItem("level", USER.level);
        saveProgress();
        loadLevel();
    }

    function finishGame() {
        const winCode = "JSCOL-" + Math.random().toString(36).substring(2,8).toUpperCase();
        db.collection("players").doc(USER.uid).update({
            completed: true,
            code: winCode
        });
        
        content.innerHTML = `
            <h2 style="color:var(--neon-cyan)">SISTEMA COMPLETADO</h2>
            <p style="font-size:10px; color:var(--neon-yellow)">¡FELICIDADES ${USER.name}!</p>
            <div style="border:2px solid var(--neon-cyan); padding:15px; margin-top:20px;">
                <p style="font-size:8px;">CÓDIGO DE PREMIO:</p>
                <p style="font-size:14px; color:var(--neon-magenta)">${winCode}</p>
            </div>
            <p style="font-size:8px; margin-top:20px;">TOMA CAPTURA Y RECLAMA TUS $10,000 COP</p>
        `;
    }

    checkLogin();
</script>

</body>
</html>
