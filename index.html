<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant</title>

<style>

/* ================= THEMES ================= */
:root{
  --bg:#07070b;
  --card:rgba(255,255,255,0.04);
  --text:#f5f5f7;
  --muted:#9ca3af;
  --accent:#7c3aed;
  --stroke:rgba(255,255,255,0.06);
}

.light{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#0b0b10;
  --muted:#6b7280;
  --accent:#7c3aed;
  --stroke:rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= SCREEN SYSTEM ================= */
.screen{
  position:absolute;
  width:100%;
  height:100vh;
  opacity:0;
  transform:translateY(12px);
  transition:.35s ease;
  pointer-events:none;
}

.screen.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* ================= WELCOME ================= */
#welcome{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo{
  font-size:54px;
  font-weight:900;
  color:var(--accent);
}

.sub{color:var(--muted)}

.btn{
  margin-top:12px;
  padding:12px 18px;
  border-radius:14px;
  border:none;
  background:var(--accent);
  color:white;
  font-weight:600;
}

/* ================= LOGIN ================= */
#login{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:24px;
  gap:12px;
}

input{
  padding:13px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:var(--card);
  color:var(--text);
}

/* ================= TOPBAR ================= */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-weight:700;
}

/* ================= ONLINE COUNTER ================= */
.online{
  font-size:12px;
  color:var(--muted);
  padding:0 16px;
}

/* ================= FEED ================= */
.post{
  margin:10px 12px;
  padding:12px;
  background:var(--card);
  border-radius:18px;
  border:1px solid var(--stroke);
  animation:pop .25s ease;
}

@keyframes pop{
  from{opacity:0;transform:scale(.98)}
  to{opacity:1;transform:scale(1)}
}

.header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  background:var(--accent);
  opacity:.7;
}

.textOnly{
  padding-top:8px;
}

/* ================= NAV ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:64px;
  background:rgba(20,20,25,0.6);
  backdrop-filter:blur(26px);
  border-radius:24px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid var(--stroke);
}

/* ICONS (NO EMOJIS) */
.icon{
  width:18px;
  height:18px;
  border-radius:4px;
  background:var(--muted);
}

/* ================= PROFILE ================= */
#profile{
  padding:16px;
}

.stats{
  display:flex;
  justify-content:space-around;
  color:var(--muted);
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.grid div{
  height:120px;
  background:#111118;
}

/* ================= SETTINGS ================= */
#settings{
  padding:16px;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:16px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="logo">Instant</div>
  <div class="sub">Share moments</div>

  <button class="btn" onclick="goLogin()">Entrar</button>
  <button class="btn" onclick="guest()">Invitado</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <input id="user" placeholder="usuario">
  <input id="pass" type="password" placeholder="contraseña">

  <button class="btn" onclick="login()">Entrar</button>
  <button class="btn" onclick="register()">Crear</button>
</div>

<!-- FEED -->
<div id="feedScreen" class="screen">

  <div class="topbar">
    <div>Instant</div>
    <div onclick="toggleTheme()">■</div>
  </div>

  <div class="online" id="online">Usuarios en línea: 0</div>

  <div id="feed"></div>

  <div class="nav">
    <div class="icon"></div>
    <div class="icon"></div>
    <div class="icon"></div>
  </div>

</div>

<!-- PROFILE -->
<div id="profile" class="screen">

  <div style="padding:14px" onclick="showFeed()">←</div>

  <h2 id="name"></h2>

  <div class="stats">
    <div><b id="posts">0</b><br>posts</div>
    <div><b id="followers">0</b><br>followers</div>
    <div><b id="following">0</b><br>following</div>
  </div>

  <div id="grid" class="grid"></div>

</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <div style="padding:14px" onclick="showFeed()">←</div>

  <div class="card" onclick="toggleTheme()">
    Cambiar tema
  </div>

  <div class="card" onclick="logout()">
    Cerrar sesión
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain:"vozanonimasm.firebaseapp.com",
  projectId:"vozanonimasm"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* ================= STATE ================= */
let me={username:"guest"};
let onlineCount=0;

/* ================= START ================= */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

let saved=localStorage.getItem("user");
if(saved){
  me=JSON.parse(saved);
  show("feedScreen");
  loadFeed();
}else show("welcome");

/* ================= AUTH ================= */
function goLogin(){show("login");}

function guest(){
  show("feedScreen");
  loadFeed();
}

/* ================= FEED ================= */
function loadFeed(){

  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{

    let html="";

    s.forEach(d=>{
      let p=d.data();

      let isTextOnly = !p.image;

      html+=`
      <div class="post">
        <div class="header">
          <div class="avatar"></div>
          <b>@${p.username}</b>
        </div>

        ${isTextOnly ? `
          <div class="textOnly">${p.text}</div>
        ` : `
          <div class="image"></div>
          <p>${p.text}</p>
        `}
      </div>`;
    });

    feed.innerHTML=html;

  });

}

/* ================= PROFILE FIXED ================= */
function openProfile(){

  show("profile");

  name.innerText="@JTS Call Owner";

  followers.innerText="110000";
  following.innerText="0";

  db.collection("posts")
  .where("username","==","JTS Call Owner")
  .get()
  .then(s=>{
    posts.innerText=s.size;

    let html="";
    s.forEach(()=>html+="<div></div>");
    grid.innerHTML=html;
  });

}

/* ================= SETTINGS ================= */
function toggleTheme(){
  document.body.classList.toggle("light");
}

function showFeed(){
  show("feedScreen");
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* ================= ONLINE SIM ================= */
setInterval(()=>{
  onlineCount = Math.floor(Math.random()*300)+50;
  document.getElementById("online").innerText =
  "Usuarios en línea: " + onlineCount;
},3000);

</script>

</body>
</html>
