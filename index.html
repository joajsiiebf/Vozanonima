<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant - Visual Identity</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ================= VARIABLES SEGÚN GUÍA ================= */
:root {
  --primary-metallic: linear-gradient(135deg, #C04FBA 0%, #7A2C76 100%);
  --dark-bg: #1A1A1A;
  --field-bg: #121212;
  --text-primary: #FFFFFF;
  --text-muted: #9CA3AF;
  --secondary-gray: #333333;
  --font-main: 'Inter', sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font-main);
  background-color: var(--dark-bg);
  color: var(--text-primary);
  display: flex;
  justify-content: center;
}

/* Contenedor para simular móvil */
.app-container {
  width: 100%;
  max-width: 450px;
  height: 100vh;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ================= COMPONENTES DE TEXTO ================= */
.header-logo {
  text-align: center;
  font-weight: 800;
  font-size: 24px;
  letter-spacing: 2px;
  padding: 20px;
  background: var(--primary-metallic);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
}

/* ================= SCREENS ================= */
.screen { display: none; flex: 1; overflow-y: auto; padding-bottom: 100px; }
.active { display: flex; flex-direction: column; }

/* ================= INPUTS & BUTTONS ================= */
.input-group { padding: 0 25px; margin-bottom: 15px; }

.input {
  width: 100%;
  padding: 16px;
  background: var(--field-bg);
  border: 1px solid #333;
  border-radius: 12px;
  color: white;
  font-size: 14px;
}

.input:focus { border-color: #C04FBA; outline: none; }

.btn-metallic {
  background: var(--primary-metallic);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 25px;
  font-weight: 700;
  width: 100%;
  cursor: pointer;
  margin-top: 10px;
  transition: opacity 0.2s;
}

.btn-outline {
  background: transparent;
  border: 1px solid #C04FBA;
  color: white;
  padding: 12px;
  border-radius: 25px;
  width: 100%;
  margin-top: 10px;
}

/* ================= THREAD COMPONENT ================= */
.thread-card {
  background: transparent;
  border-bottom: 1px solid #2A2A2A;
  padding: 15px;
  display: flex;
  gap: 12px;
}

.avatar {
  width: 40px;
  height: 40px;
  background: var(--primary-metallic);
  border-radius: 50%;
  flex-shrink: 0;
}

.thread-content { flex: 1; }

.thread-user { font-weight: 700; font-size: 14px; margin-bottom: 4px; }

.thread-text { font-size: 14px; line-height: 1.4; color: #E0E0E0; }

.hashtag { color: #C04FBA; font-weight: 600; }

.thread-actions {
  display: flex;
  gap: 20px;
  margin-top: 12px;
  opacity: 0.6;
}

/* ================= NAV BAR (ANATOMY) ================= */
.nav-bar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 85px;
  background: linear-gradient(to top, #000, transparent);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding-bottom: 10px;
}

/* El diseño curvo metálico de la imagen */
.nav-background {
  position: absolute;
  bottom: 10px;
  width: 90%;
  height: 60px;
  background: var(--primary-metallic);
  border-radius: 30px;
  z-index: 1;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.nav-item {
  z-index: 2;
  color: white;
  text-align: center;
  font-size: 11px;
  text-decoration: none;
  cursor: pointer;
}

.nav-item svg { width: 24px; height: 24px; display: block; margin: 0 auto 4px; }

.plus-button {
  width: 55px;
  height: 55px;
  background: white;
  color: #7A2C76;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transform: translateY(-5px);
}

/* ================= SETTINGS ================= */
.settings-item {
  padding: 18px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
</style>
</head>
<body>

<div class="app-container">

  <div id="login" class="screen active">
    <div style="margin-top: 60px; text-align: center; padding: 40px;">
       <div class="header-logo" style="font-size: 40px;">INSTANT</div>
       <p style="color: var(--text-muted)">Visual Identity & Dev</p>
    </div>
    
    <div class="input-group">
      <input type="text" id="user" class="input" placeholder="Username/Email">
    </div>
    <div class="input-group">
      <input type="password" class="input" placeholder="Password">
    </div>
    
    <div class="input-group">
      <button class="btn-metallic" onclick="login()">Log In</button>
      <button class="btn-outline">Sign Up</button>
      <p style="text-align: center; font-size: 12px; margin-top: 20px; color: var(--text-muted)">Forgot Password?</p>
    </div>
  </div>

  <div id="feed" class="screen">
    <div class="header-logo">INSTANT</div>
    <div id="feedBox"></div>
  </div>

  <div id="profile" class="screen">
    <div class="header-logo">PROFILE</div>
    <div style="padding: 25px; text-align: center;">
      <div class="avatar" style="width: 80px; height: 80px; margin: 0 auto 15px;"></div>
      <h2 id="profileName">Username</h2>
      <p class="text-muted">Professional Developer</p>
    </div>
  </div>

  <div id="settings" class="screen">
    <div class="header-logo">CONFIGURACIÓN</div>
    <div class="settings-item"><span>Account</span> <span>&rsaquo;</span></div>
    <div class="settings-item"><span>Appearance (Dark)</span> <span>&rsaquo;</span></div>
    <div class="settings-item"><span>Notifications</span> <span>&rsaquo;</span></div>
    <div class="settings-item" onclick="logout()" style="color: #ff4444;">Logout</div>
  </div>

  <div class="nav-bar" id="mainNav" style="display: none;">
    <div class="nav-background">
      <div class="nav-item" onclick="go('feed')">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        HOME
      </div>
      
      <div class="plus-button" onclick="createPost()">+</div>
      
      <div class="nav-item" onclick="go('profile')">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        PROFILE
      </div>
      
      <div class="nav-item" onclick="go('settings')">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        SETTINGS
      </div>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Configuración de Firebase (Se mantiene tu DB actual)
firebase.initializeApp({
  apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain:"vozanonimasm.firebaseapp.com",
  projectId:"vozanonimasm"
});
const db = firebase.firestore();

let me = localStorage.getItem("user");

function go(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  
  // Mostrar u ocultar nav según la pantalla
  const nav = document.getElementById('mainNav');
  if(screenId === 'login') {
    nav.style.display = 'none';
  } else {
    nav.style.display = 'flex';
  }

  if(screenId === 'feed') loadFeed();
  if(screenId === 'profile') document.getElementById('profileName').innerText = me;
}

function login() {
  let u = document.getElementById('user').value;
  if(!u) return alert("Ingresa un usuario");
  me = u;
  localStorage.setItem("user", u);
  go('feed');
}

function loadFeed() {
  db.collection("posts").orderBy("created", "desc").onSnapshot(s => {
    let html = "";
    s.forEach(doc => {
      let p = doc.data();
      // Estructura de "Thread Component Specs" de la imagen
      html += `
        <div class="thread-card">
          <div class="avatar"></div>
          <div class="thread-content">
            <div class="thread-user">@${p.username} <span style="font-weight:400; font-size:11px; opacity:0.5; margin-left:8px;">3h</span></div>
            <div class="thread-text">${formatText(p.text)}</div>
            <div class="thread-actions">
              <span>♡</span> <span>⇆</span> <span>☍</span>
            </div>
          </div>
        </div>`;
    });
    document.getElementById('feedBox').innerHTML = html;
  });
}

function formatText(text) {
  // Resaltar hashtags como pide la guía (Metallic Purple)
  return text.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');
}

function createPost() {
  let t = prompt("What's happening?");
  if(!t) return;
  db.collection("posts").add({
    username: me || "guest",
    text: t,
    created: Date.now()
  });
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

// Inicialización
if(me) go('feed');
</script>
</body>
</html>
