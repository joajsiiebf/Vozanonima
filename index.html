<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant</title>

<style>

:root{
  --bg:#07070b;
  --card:rgba(255,255,255,0.05);
  --text:#f5f5f7;
  --muted:#9ca3af;
  --accent:#7c3aed;
  --stroke:rgba(255,255,255,0.06);
}

.light{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#0b0b10;
  --muted:#6b7280;
}

/* ================= BASE ================= */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= ROUTER ================= */
.screen{
  position:absolute;
  width:100%;
  height:100vh;
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:.35s ease;
}

.screen.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* ================= TOPBAR ================= */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-weight:700;
}

/* ================= POST ================= */
.post{
  margin:10px 12px;
  padding:14px;
  background:var(--card);
  border-radius:18px;
  border:1px solid var(--stroke);
  animation:fade .2s ease;
}

@keyframes fade{
  from{opacity:0;transform:scale(.98)}
  to{opacity:1;transform:scale(1)}
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ================= NAV ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:64px;
  background:rgba(20,20,25,0.6);
  backdrop-filter:blur(30px);
  border-radius:24px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid var(--stroke);
}

/* ================= BUTTON ================= */
.btn{
  padding:8px 12px;
  background:var(--accent);
  border:none;
  border-radius:12px;
  color:white;
  font-weight:600;
}

/* ================= PANEL ================= */
.panel{
  position:absolute;
  top:0;
  right:-100%;
  width:85%;
  height:100vh;
  background:#0f0f14;
  transition:.35s ease;
  padding:16px;
}

.panel.active{right:0}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="topbar">Instant</div>
  <div style="padding:16px">
    <button class="btn" onclick="go('feed')">Entrar</button>
  </div>
</div>

<!-- FEED -->
<div id="feed" class="screen">

  <div class="topbar">
    <div>Instant</div>
    <button class="btn" onclick="toggleSettings()">⚙</button>
  </div>

  <div id="feedBox"></div>

  <div class="nav">
    <button class="btn" onclick="go('feed')">Home</button>
    <button class="btn" onclick="go('profile')">Perfil</button>
    <button class="btn" onclick="createPost()">+</button>
  </div>

</div>

<!-- PROFILE -->
<div id="profile" class="screen">

  <div class="topbar">
    <div onclick="go('feed')">←</div>
    Perfil
  </div>

  <div style="padding:16px">
    <h3 id="meName"></h3>
    <p>Followers: <span id="followers">0</span></p>
    <p>Following: <span id="following">0</span></p>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings" class="panel">

  <h3>Settings</h3>

  <button class="btn" onclick="toggleTheme()">Tema</button>
  <button class="btn" onclick="logout()">Logout</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */
firebase.initializeApp({
  apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain:"vozanonimasm.firebaseapp.com",
  projectId:"vozanonimasm"
});

const db=firebase.firestore();

/* ================= USER ================= */
let me={
  username:"Jscol_Owner",
  role:"admin"
};

/* ================= ROUTER ================= */
function go(s){

  document.querySelectorAll(".screen")
  .forEach(e=>e.classList.remove("active"));

  document.getElementById(s)
  .classList.add("active");

  if(s==="feed") loadFeed();
  if(s==="profile") loadProfile();

}

/* ================= FEED ================= */
function loadFeed(){

  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{

    let html="";

    s.forEach(d=>{

      let p=d.data();

      html+=`
      <div class="post">

        <div class="header">
          <b>@${p.username}</b>
          <button class="btn" onclick="like('${d.id}')">
            ❤️ ${p.likes||0}
          </button>
        </div>

        <p>${p.text}</p>

      </div>`;
    });

    feedBox.innerHTML=html;

  });

}

/* ================= CREATE POST ================= */
function createPost(){

  let t=prompt("Escribe algo");
  if(!t)return;

  db.collection("posts").add({
    username:me.username,
    text:t,
    created:Date.now(),
    likes:0
  });

}

/* ================= LIKE (REAL TOGGLE) ================= */
async function like(id){

  let ref=db.collection("likes")
  .doc(id+"_"+me.username);

  let doc=await ref.get();

  if(doc.exists){
    ref.delete();
  }else{
    ref.set({postId:id,user:me.username});
  }

}

/* ================= PROFILE ================= */
function loadProfile(){

  meName.innerText=me.username;

}

/* ================= SETTINGS ================= */
function toggleSettings(){
  document.getElementById("settings")
  .classList.toggle("active");
}

/* ================= THEME ================= */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ================= LOGOUT ================= */
function logout(){
  location.reload();
}

/* ================= INIT ================= */
go("login");

</script>

</body>
</html>
