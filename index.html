<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Safe App</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>

<body>

<div id="errorBox" style="display:none;"></div>

<div id="auth">
  <h3>Login</h3>

  <input id="user" placeholder="Usuario">
  <input id="phone" placeholder="Teléfono">
  <input id="pass" placeholder="Contraseña">

  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

  <div class="topbar">
    <span id="me"></span>
  </div>

  <div id="feedView"></div>
  <div id="profileView" style="display:none"></div>
  <div id="chatView" style="display:none"></div>

  <div class="bottom-nav">
    <button onclick="showView('home')">Inicio</button>
    <button onclick="showView('profile')">Perfil</button>
    <button onclick="showView('chat')">Chat</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
