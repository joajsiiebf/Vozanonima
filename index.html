<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSCOL | Retro-Cian Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cian: #00f7ff; --neon-magenta: #ff00ff; --neon-yellow: #fff200;
            --bg-dark: #010115; --panel-bg: rgba(10, 10, 42, 0.95);
        }

        body {
            margin: 0; background: var(--bg-dark); color: #fff;
            font-family: 'Press Start 2P', cursive; overflow: hidden;
            background-image: radial-gradient(circle at center, #0a0a30 0%, #010115 80%);
            height: 100vh; display: flex; flex-direction: column;
        }

        /* Scanlines */
        body::after {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 100;
        }

        #app { display: flex; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; position: relative; }

        .header-stats {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; border: 2px solid var(--neon-cian); margin-bottom: 10px; font-size: 8px;
            box-shadow: 0 0 10px var(--neon-cian);
        }

        .main-game {
            flex-grow: 1; border: 3px solid var(--neon-magenta); background: var(--panel-bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 15px; text-align: center; position: relative;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4); overflow: hidden;
        }

        /* --- NPC LA PARCA & DIÁLOGO (50% VH) --- */
        #reaper-npc {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50vh;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path fill="%23FFFFFF" d="M3,0 h10 v2 h1 v2 h1 v10 h-1 v2 h-10 v-2 h-1 v-10 h1 v-2 h1 z M5,3 h6 v1 h-6 z M4,4 h8 v1 h-8 z M3,5 h10 v1 h-10 z M2,6 h12 v6 h-12 z M3,12 h10 v1 h-10 z M4,13 h8 v1 h-8 z M5,14 h6 v1 h-6 z M6,7 h4 v2 h-4 z M7,8 v1 h2 v-1 z M7,6 h2 v1 h-2 z"/></svg>'); /* Parca Simplificada */
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            display: none; flex-direction: column; align-items: center; justify-content: flex-start;
            z-index: 60; animation: reaperRise 0.5s ease-out;
            filter: drop-shadow(0 0 15px #ff0040);
        }

        @keyframes reaperRise { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        #reaper-dialog {
            background: #000; border: 3px solid #ff0040; border-radius: 5px;
            padding: 10px; width: 85%; margin-top: 20px;
            font-size: 7px; line-height: 1.6; color: #fff;
            box-shadow: 0 0 15px #ff0040; position: relative;
        }

        #reaper-dialog::before {
            content: "💀"; position: absolute; top: -15px; left: 10px; font-size: 14px;
        }

        .heart { color: #ff0040; font-size: 14px; margin-left: 2px; text-shadow: 0 0 5px #ff0040; }
        .heart.lost { color: #222; text-shadow: none; }

        input {
            background: #000; border: 2px solid var(--neon-yellow); color: var(--neon-cian);
            padding: 12px; font-family: 'Press Start 2P'; width: 90%; margin-top: 15px;
            font-size: 12px; text-align: center; outline: none; -webkit-appearance: none;
        }

        button {
            background: var(--neon-cian); color: #000; border: none; padding: 15px 20px;
            font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; margin-top: 15px;
            box-shadow: 4px 4px 0px var(--neon-magenta); width: 90%;
        }

        #ranking-min { font-size: 7px; margin-top: 12px; color: var(--neon-yellow); text-shadow: 0 0 5px var(--neon-yellow); }

        .damage-flash { animation: flash-magenta 0.1s 3; }
        @keyframes flash-magenta { 0% { background: #ff00ff66; } 100% { background: transparent; } }

        @media (min-width: 900px) {
            #app { padding: 40px; }
            .main-game { width: 60%; align-self: center; }
            #reaper-npc { height: 40vh; }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header-stats">
        <div>LVL:<span id="lvl">01</span></div>
        <div id="lives-ui"></div>
        <div id="user-ui">---</div>
    </div>

    <div class="main-game" id="game-view">
        <div id="reaper-npc">
            <div id="reaper-dialog">
                <p>LA ESTRATEGIA FALLÓ...</p>
                <p id="reaper-fact" style="color: var(--neon-yellow); margin-top: 5px;"></p>
            </div>
        </div>
        
        <h2 style="font-size:12px; color:var(--neon-cyan);">JSCOL ARCADE</h2>
        <button onclick="startApp()">DESBLOQUEAR SONIDO Y EMPEZAR</button>
    </div>

    <div id="ranking-min">LÍDERES: CARGANDO...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // --- MOTOR DE AUDIO ---
    let audioContext; let ambientOsc;

    function initAudio() { if (!audioContext) { audioContext = new (window.AudioContext || window.webkitAudioContext)(); } }

    function playSFX(freq, type = 'sine', duration = 0.2, fadeOut = 0.01) {
        if (!audioContext) return;
        const osc = audioContext.createOscillator(); const gain = audioContext.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioContext.currentTime);
        if(type === 'sawtooth') osc.frequency.exponentialRampToValueAtTime(10, audioContext.currentTime + duration);
        gain.gain.setValueAtTime(0.06, audioContext.currentTime); gain.gain.exponentialRampToValueAtTime(fadeOut, audioContext.currentTime + duration);
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.start(); osc.stop(audioContext.currentTime + duration);
    }

    function playAmbient() {
        if (ambientOsc) return;
        const osc = audioContext.createOscillator(); const gain = audioContext.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(90, audioContext.currentTime);
        gain.gain.value = 0.02; osc.connect(gain); gain.connect(audioContext.destination);
        osc.start(); ambientOsc = osc;
    }

    // --- DATOS CURIOSOS DE JSCOL (ESTRATEGIA) ---
    const jscolFacts = [
        "Jscol piensa como estratega, siempre viendo varios pasos adelante.",
        "Jscol no soporta lo genérico; todo debe tener identidad propia.",
        "Jscol mezcla creatividad con técnica: diseña, escribe y construye.",
        "Jscol se estresa cuando algo está mal organizado.",
        "Jscol cuida mucho su imagen y cómo lo perciben.",
        "Jscol insinúa más de lo que dice, le gusta dejar misterio.",
        "Jscol prefiere lo elegante con carácter, nada vacío.",
        "Jscol quiere independencia temprano y no depender de nadie.",
        "Jscol analiza a las personas y detecta detalles ocultos.",
        "Jscol sabe provocar reacciones, no pasa desapercibido.",
        "Jscol es romántico, pero no se entrega sin pensar.",
        "Jscol viene de lo urbano, apuntando a algo más grande.",
        "Jscol se obsesiona con lo que le importa hasta hacerlo bien.",
        "Jscol se aburre rápido de lo repetitivo.",
        "Jscol busca respeto real, no solo atención.",
        "Jscol se adapta sin perder su esencia.",
        "Jscol quiere entender su mente y por qué es como es.",
        "Jscol vive entre la razón y la emoción.",
        "Jscol crea más de lo que consume.",
        "Jscol no nació para ser promedio."
    ];

    // --- LÓGICA ARCADE ---
    const firebaseConfig = { apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU", authDomain: "vozanonimasm.firebaseapp.com", projectId: "vozanonimasm" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

    let USER = { uid: localStorage.getItem("uid") || "js_"+Math.random().toString(36).substr(2,4), name: localStorage.getItem("name"), level: parseInt(localStorage.getItem("level")) || 1, lives: 3 };
    localStorage.setItem("uid", USER.uid);

    const puzzles = [
        {q:"Verifica conexión: Escribe 'JSCOL'", a:"jscol"},
        {q:"¿Cuánto es (12 + 13) - 5?", a:"20"},
        {q:"Secuencia: 2, 4, 16, 256, ?", a:"65536"},
        {q:"¿Qué animal dice 'Miau'?", a:"gato"},
        {q:"Escribe 'NIVEL' al revés", a:"levin"},
        {q:"Si hoy es lunes, ¿qué día será en 100 días?", a:"martes"},
        {q:"Nivel Final: ¿Quién te reta hoy? (JS...)", a:"jscol"}
    ];

    function startApp() { initAudio(); playAmbient(); playSFX(600); if(!USER.name) showLogin(); else showGame(); }

    function showLogin() {
        document.getElementById("game-view").innerHTML = `
            <div id="reaper-npc"><div id="reaper-dialog"><p id="reaper-fact"></p></div></div>
            <p style="font-size:9px">INGRESA AL SISTEMA</p>
            <input id="nick" placeholder="ALIAS" maxlength="8">
            <button onclick="saveNick()">EMPEZAR RETRO</button>
        `;
    }

    function saveNick() {
        let n = document.getElementById("nick").value.toUpperCase().trim();
        if(n.length >= 3) { USER.name = n; localStorage.setItem("name", n); showGame(); }
    }

    function renderLives() {
        let h = ""; for(let i=0; i<3; i++) h += `<span class="heart ${i >= USER.lives ? 'lost' : ''}">❤</span>`;
        document.getElementById("lives-ui").innerHTML = h;
    }

    function showGame() {
        document.getElementById("user-ui").innerText = USER.name;
        renderLives();
        let p = puzzles[USER.level-1];
        if(!p) { finish(); return; }
        document.getElementById("lvl").innerText = USER.level < 10 ? "0"+USER.level : USER.level;
        document.getElementById("game-view").innerHTML = `
            <div id="reaper-npc"><div id="reaper-dialog"><p id="reaper-fact"></p></div></div>
            <p style="font-size:11px; line-height:1.6">${p.q}</p>
            <input id="ans" autocomplete="off">
            <button onclick="playSFX(700, 'sine', 0.1); check();">ENVIAR</button>
        `;
    }

    function check() {
        let val = document.getElementById("ans").value.toLowerCase().trim();
        if(val === puzzles[USER.level-1].a) { playSFX(1200, 'square', 0.1); next(); } else { USER.lives--; triggerReaper(); }
    }

    function triggerReaper() {
        const npc = document.getElementById("reaper-npc");
        const factText = document.getElementById("reaper-fact");
        
        // Seleccionar dato curioso aleatorio
        const fact = jscolFacts[Math.floor(Math.random() * jscolFacts.length)];
        factText.innerText = `> ${fact}`;
        
        npc.style.display = 'flex';
        playSFX(110, 'sawtooth', 0.8, 0.001); // Sonido siniestro
        document.getElementById("game-view").classList.add("damage-flash");
        
        setTimeout(() => {
            npc.style.display = 'none';
            document.getElementById("game-view").classList.remove("damage-flash");
            renderLives();
            if(USER.lives <= 0) gameOver();
        }, 3000); // Duración del NPC (más tiempo para leer el dato)
    }

    function next() {
        USER.level++; localStorage.setItem("level", USER.level);
        db.collection("players").doc(USER.uid).set({name:USER.name, level:USER.level}, {merge:true});
        showGame();
    }

    function gameOver() {
        document.getElementById("game-view").innerHTML = `<h2 style="color:#ff0040">GAME OVER</h2><button onclick="location.reload()">REINTENTAR</button>`;
        localStorage.setItem("level", 1);
    }

    function finish() {
        document.getElementById("game-view").innerHTML = `
            <h2 style="color:var(--neon-yellow)">VICTORIA TOTAL</h2>
            <div style="font-size: 7px; border:2px solid var(--neon-yellow); padding:8px; margin-top:10px;">
                PREMIO: $10,000 COP
                <p style="color:var(--neon-cian); font-size:9px; margin-top:5px;">JSCOL-${USER.uid.toUpperCase()}</p>
            </div>
        `;
    }

    db.collection("players").orderBy("level","desc").limit(3).onSnapshot(s => {
        let h = "TOP: "; s.forEach(d => h += `${d.data().name}(L${d.data().level}) `);
        document.getElementById("ranking-min").innerText = h;
    });

</script>
</body>
</html>
