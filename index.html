<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant</title>

<style>
/* ================= DESIGN SYSTEM ================= */
:root{
  --bg:#0b0b10;
  --card:#14141a;
  --text:#f5f5f7;
  --muted:#8e8e93;
  --accent:#3897f0;
  --glass:rgba(25,25,30,0.55);
  --stroke:rgba(255,255,255,0.08);
}

.light{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#0b0b10;
  --muted:#6b6b70;
  --glass:rgba(255,255,255,0.7);
  --stroke:rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ================= APP STRUCTURE ================= */
.screen{display:none;height:100vh;}
.active{display:block;}

.hidden{display:none}

/* ================= WELCOME ================= */
#welcome{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  height:100vh;
}

.logo{font-size:44px;font-weight:700;}
.sub{color:var(--muted);}

.btn{
  margin-top:14px;
  padding:12px 18px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
}

/* ================= LOGIN ================= */
#login{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:24px;
  gap:10px;
}

input{
  padding:13px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:var(--card);
  color:var(--text);
}

/* ================= APP SHELL ================= */
#app{
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid var(--stroke);
}

/* FEED */
.feed{
  padding-bottom:90px;
}

.post{
  padding:14px;
  border-bottom:1px solid var(--stroke);
  animation:fade .25s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

.header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:36px;height:36px;
  border-radius:50%;
  background:#333;
}

.image{
  height:240px;
  background:#222;
  border-radius:14px;
  margin-top:10px;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:12px;
  font-size:13px;
  color:var(--muted);
  margin-top:8px;
}

/* ================= NAV BAR ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:62px;
  background:var(--glass);
  backdrop-filter:blur(24px);
  border-radius:22px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid var(--stroke);
}

/* ================= PROFILE ================= */
.profile{
  padding:16px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.grid div{
  height:120px;
  background:var(--card);
}

/* ================= MODALS ================= */
.modal{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:var(--card);
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  padding:16px;
  transform:translateY(100%);
  transition:.3s ease;
}

.modal.active{
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- ================= WELCOME ================= -->
<div id="welcome" class="screen active">
  <div class="logo">Instant</div>
  <div class="sub">Share moments, not noise</div>

  <button class="btn" onclick="goLogin()">Entrar</button>
  <button class="btn" onclick="guestMode()">Entrar como invitado</button>
</div>

<!-- ================= LOGIN ================= -->
<div id="login" class="screen">
  <h2>Login</h2>
  <input id="user" placeholder="usuario">
  <input id="pass" type="password" placeholder="contraseña">

  <button class="btn" onclick="login()">Entrar</button>
  <button class="btn" onclick="register()">Crear cuenta</button>
</div>

<!-- ================= APP ================= -->
<div id="app" class="screen">

  <div class="topbar">
    <div>Instant</div>
    <div onclick="toggleTheme()">◐</div>
  </div>

  <div id="feed" class="feed"></div>

  <div class="nav">
    <span onclick="loadFeed()">🏠</span>
    <span onclick="openCreate()">＋</span>
    <span onclick="openProfile()">👤</span>
    <span onclick="openSettings()">⚙</span>
  </div>

</div>

<!-- ================= PROFILE ================= -->
<div id="profile" class="screen">
  <div style="padding:14px" onclick="back()">←</div>
  <div id="profileBox"></div>
</div>

<!-- ================= MODAL CREATE ================= -->
<div id="createModal" class="modal">
  <h3>Crear post</h3>
  <input id="postText" placeholder="¿Qué estás pensando?">
  <button class="btn" onclick="createPost()">Publicar</button>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain: "vozanonimasm.firebaseapp.com",
  projectId: "vozanonimasm"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= STATE ================= */
let userData = JSON.parse(localStorage.getItem("user"));
let role = "guest";

/* ================= NAV SYSTEM ================= */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ================= START ================= */
if(userData){
  role = userData.role || "user";
  show("app");
  loadFeed();
}else{
  show("welcome");
}

/* ================= AUTH ================= */
function goLogin(){
  show("login");
}

function guestMode(){
  role = "guest";
  userData = { username:"Invitado" };
  show("app");
  loadFeed();
}

async function login(){
  const snap = await db.collection("users")
  .where("username","==",user.value)
  .where("password","==",pass.value)
  .get();

  if(snap.empty) return alert("error");

  userData = snap.docs[0].data();
  role = userData.role || "user";

  localStorage.setItem("user", JSON.stringify(userData));

  show("app");
  loadFeed();
}

async function register(){
  await db.collection("users").add({
    username:user.value,
    password:pass.value,
    role:"user"
  });

  alert("creado");
}

/* ================= FEED ================= */
function loadFeed(){
  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{
    let html="";

    s.forEach(d=>{
      let p=d.data();

      html+=`
      <div class="post">

        <div class="header">
          <div class="avatar"></div>
          <b>@${p.username}</b>
        </div>

        <div class="image"></div>

        <p>${p.text}</p>

        <div class="actions">
          <span>like</span>
          <span>comment</span>
        </div>

      </div>`;
    });

    feed.innerHTML = html;
  });
}

/* ================= CREATE ================= */
function openCreate(){
  if(role==="guest") return alert("solo lectura");
  createModal.classList.add("active");
}

function createPost(){
  db.collection("posts").add({
    username:userData.username,
    text:postText.value,
    created:Date.now()
  });

  postText.value="";
  createModal.classList.remove("active");
}

/* ================= PROFILE ================= */
function openProfile(){
  show("profile");

  db.collection("posts")
  .where("username","==",userData.username)
  .get()
  .then(s=>{
    let html=`<h3>@${userData.username}</h3><div class="grid">`;

    s.forEach(()=>html+=`<div></div>`);

    html+=`</div>`;
    profileBox.innerHTML = html;
  });
}

/* ================= SETTINGS ================= */
function openSettings(){
  alert("settings placeholder");
}

/* ================= BACK ================= */
function back(){
  show("app");
}

/* ================= THEME ================= */
function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
