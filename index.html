<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INSTANT - Final Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-metallic: linear-gradient(135deg, #C04FBA 0%, #7A2C76 100%);
            --dark-bg: #1A1A1A;
            --field-bg: #121212;
            --text-main: #FFFFFF;
            --text-muted: #9CA3AF;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-viewport {
            width: 100%;
            max-width: 430px;
            background: var(--dark-bg);
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ================= SCREENS ================= */
        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            padding-bottom: 100px;
            overflow-y: auto;
            background: var(--dark-bg);
            z-index: 10;
        }

        .screen.active { display: flex; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ================= UI ELEMENTS ================= */
        .logo-header {
            font-weight: 800;
            background: var(--primary-metallic);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            padding: 20px;
            font-size: 22px;
            text-transform: uppercase;
        }

        .btn-metallic {
            background: var(--primary-metallic);
            border: none;
            border-radius: 50px;
            padding: 16px;
            color: white;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-metallic:active { transform: scale(0.96); }

        .input-main {
            width: 100%;
            background: var(--field-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            color: white;
            margin-bottom: 15px;
        }

        /* ================= THREADS ================= */
        .thread-item {
            padding: 16px;
            border-bottom: 1px solid #2A2A2A;
            display: flex;
            gap: 12px;
        }

        .avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--primary-metallic);
            flex-shrink: 0;
        }

        .hashtag { color: #C04FBA; font-weight: 600; }

        /* ================= NAV BAR CURVA ================= */
        .nav-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            z-index: 100;
        }

        .nav-body {
            background: var(--primary-metallic);
            height: 65px;
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .nav-item {
            color: white;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            opacity: 0.7;
            cursor: pointer;
        }

        .nav-item.active { opacity: 1; }

        .nav-item svg { width: 22px; height: 22px; display: block; margin: 0 auto 2px; }

        .nav-plus {
            width: 55px; height: 55px;
            background: white;
            border-radius: 50%;
            margin-top: -35px;
            display: flex;
            align-items: center; justify-content: center;
            color: #7A2C76;
            font-size: 28px;
            border: 4px solid var(--dark-bg);
        }

        /* ================= MODAL ================= */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }

        .modal-content {
            background: var(--dark-bg);
            width: 100%;
            max-width: 350px;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        /* ================= SETTINGS ================= */
        .settings-item {
            padding: 18px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .toggle {
            width: 44px; height: 22px;
            background: #333;
            border-radius: 20px;
            position: relative;
            transition: 0.3s;
        }
        .toggle.active { background: #C04FBA; }
        .toggle::after {
            content: ''; position: absolute;
            width: 18px; height: 18px;
            background: white; border-radius: 50%;
            top: 2px; left: 2px; transition: 0.3s;
        }
        .toggle.active::after { left: 24px; }

    </style>
</head>
<body>

<div class="app-viewport">

    <div id="screen-login" class="screen active">
        <div style="margin: auto 0; padding: 30px;">
            <div class="logo-header" style="font-size: 45px; margin-bottom: 30px;">INSTANT</div>
            <input type="text" id="login-user" class="input-main" placeholder="Usuario">
            <button class="btn-metallic" onclick="auth()">Entrar</button>
        </div>
    </div>

    <div id="screen-feed" class="screen">
        <div class="logo-header">INSTANT</div>
        <div id="feed-box"></div>
    </div>

    <div id="screen-profile" class="screen">
        <div class="logo-header">MI PERFIL</div>
        <div style="text-align:center; padding:30px;">
            <div class="avatar" style="width:80px; height:80px; margin:0 auto 15px;"></div>
            <h2 id="prof-name">@Username</h2>
            <p class="text-muted">110K Seguidores</p>
        </div>
    </div>

    <div id="screen-settings" class="screen">
        <div class="logo-header">CONFIGURACIÓN</div>
        <div class="settings-item"><span>Cuenta</span> <span>&rsaquo;</span></div>
        <div class="settings-item" onclick="this.querySelector('.toggle').classList.toggle('active')">
            <span>Modo Oscuro</span> <div class="toggle active"></div>
        </div>
        <div class="settings-item" onclick="logout()" style="color:#ff4d4d; margin-top:20px;">
            <span>Cerrar Sesión</span>
        </div>
    </div>

    <div class="nav-container" id="main-nav" style="display:none;">
        <div class="nav-body">
            <div class="nav-item" onclick="navigate('feed')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                HOME
            </div>
            <div class="nav-plus" onclick="openModal()">+</div>
            <div class="nav-item" onclick="navigate('profile')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                PERFIL
            </div>
            <div class="nav-item" onclick="navigate('settings')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                AJUSTES
            </div>
        </div>
    </div>

</div>

<div class="modal" id="postModal">
    <div class="modal-content">
        <h3 style="margin-top:0">Nuevo Post</h3>
        <textarea id="postText" class="input-main" rows="4" placeholder="¿Qué está pasando?" style="resize:none"></textarea>
        <div style="display:flex; gap:10px">
            <button class="btn-metallic" onclick="sendPost()">Publicar</button>
            <button class="btn-metallic" style="background:#333" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain:"vozanonimasm.firebaseapp.com",
        projectId:"vozanonimasm"
    });
    const db = firebase.firestore();
    let me = localStorage.getItem("user");

    function navigate(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + screenId).classList.add('active');
        
        document.getElementById('main-nav').style.display = (screenId === 'login') ? 'none' : 'block';
        
        if(screenId === 'feed') loadFeed();
        if(screenId === 'profile') document.getElementById('prof-name').innerText = '@' + me;
    }

    function auth() {
        const u = document.getElementById('login-user').value;
        if(!u) return alert("Escribe un usuario");
        me = u;
        localStorage.setItem("user", u);
        navigate('feed');
    }

    function loadFeed() {
        db.collection("posts").orderBy("created", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const p = doc.data();
                html += `
                    <div class="thread-item">
                        <div class="avatar"></div>
                        <div style="flex:1">
                            <div style="font-weight:700; font-size:14px; margin-bottom:4px">@${p.username}</div>
                            <div style="font-size:14px; line-height:1.4">${formatText(p.text)}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('feed-box').innerHTML = html;
        });
    }

    function formatText(t) {
        return t.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');
    }

    // MODAL LOGIC
    function openModal() { document.getElementById('postModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('postModal').style.display = 'none'; }

    function sendPost() {
        const text = document.getElementById('postText').value;
        if(!text) return;
        db.collection("posts").add({
            username: me,
            text: text,
            created: Date.now()
        }).then(() => {
            document.getElementById('postText').value = "";
            closeModal();
        });
    }

    function logout() {
        localStorage.removeItem("user");
        location.reload();
    }

    // Start
    if(me) navigate('feed');
    else navigate('login');

</script>

</body>
</html>
