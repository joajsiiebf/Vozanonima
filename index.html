<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22InstantX%22,%22short_name%22:%22InstantX%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000000%22}">

    <title>INSTANT 𝕏 | PRO ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --s1: #0A0A0A;
            --s2: #161616;
            --t1: #FFFFFF;
            --t2: #71767B;
            --accent: #8B5CF6;
            --accent-soft: rgba(139, 92, 246, 0.15);
            --danger: #F91880;
            --glass: rgba(0, 0, 0, 0.8);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body.light-mode {
            --bg: #FFFFFF; --s1: #F7F9F9; --s2: #EFF3F4;
            --t1: #0F1419; --t2: #536471; --accent: #7C3AED;
            --glass: rgba(255, 255, 255, 0.8);
        }

        /* --- RESET & ACCELERATION --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--t1); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh; overflow: hidden; width: 100%;
        }

        /* --- MAIN CONTAINER --- */
        #app {
            width: 100%; max-width: 500px; height: 100vh; margin: 0 auto;
            position: relative; display: flex; flex-direction: column;
            border-left: 0.5px solid rgba(255,255,255,0.05);
            border-right: 0.5px solid rgba(255,255,255,0.05);
        }

        /* --- ROUTING SYSTEM --- */
        .screen {
            position: absolute; inset: 0; display: none; flex-direction: column;
            background: var(--bg); z-index: 10;
            padding-top: var(--safe-top);
            padding-bottom: calc(85px + var(--safe-bottom));
            will-change: transform, opacity;
        }
        .screen.active { display: flex; animation: viewIn 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }

        @keyframes viewIn {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* --- UI COMPONENTS: HEADERS --- */
        .header {
            height: 60px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100; border-bottom: 0.5px solid rgba(255,255,255,0.08);
        }
        .header h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin: 0; }
        .header-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .header-btn:active { background: var(--s2); }

        /* --- FEED & POSTS --- */
        .feed { flex: 1; overflow-y: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .feed::-webkit-scrollbar { display: none; }

        .post {
            padding: 16px; display: flex; gap: 12px;
            border-bottom: 0.5px solid rgba(255,255,255,0.05);
            transition: 0.2s; cursor: pointer;
        }
        .post:active { background: var(--s1); }

        .avatar {
            width: 46px; height: 46px; border-radius: 50%; background: var(--s2);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: var(--accent); flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.05); font-size: 18px;
        }

        .p-content { flex: 1; min-width: 0; }
        .p-meta { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
        .p-name { font-weight: 700; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .p-user { color: var(--t2); font-size: 14px; }
        .p-text { font-size: 15px; line-height: 1.5; color: var(--t1); word-wrap: break-word; }
        
        .p-actions { display: flex; justify-content: space-between; max-width: 250px; margin-top: 12px; color: var(--t2); }
        .action-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
        .action-btn.liked { color: var(--danger); }
        .action-btn svg { width: 18px; height: 18px; }

        /* --- NAVIGATION BAR --- */
        .nav-bar {
            position: absolute; bottom: 0; width: 100%;
            height: calc(75px + var(--safe-bottom));
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-bottom);
            border-top: 0.5px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }
        .nav-item { 
            color: var(--t2); flex: 1; display: flex; flex-direction: column; 
            align-items: center; gap: 4px; cursor: pointer; transition: 0.2s; 
        }
        .nav-item.active { color: var(--t1); }
        .nav-item svg { width: 26px; height: 26px; }

        .btn-post {
            width: 54px; height: 54px; background: var(--accent); border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin-top: -35px; box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
            border: 4px solid var(--bg); transition: 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .btn-post:active { transform: scale(0.85) rotate(-10deg); }

        /* --- PROFILE & STATS --- */
        .profile-hero { padding: 20px; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        .stats-row { display: flex; gap: 20px; margin-top: 15px; }
        .stat-item { font-size: 14px; color: var(--t2); }
        .stat-item b { color: var(--t1); margin-right: 3px; }

        /* --- AUTH & INPUTS --- */
        .auth-view { justify-content: center; align-items: center; padding: 40px; }
        .input-group { width: 100%; margin-bottom: 20px; }
        .input-main {
            width: 100%; padding: 18px; background: var(--s2); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px; color: white; font-size: 16px; transition: 0.3s;
        }
        .input-main:focus { border-color: var(--accent); background: var(--s1); }
        .btn-main {
            width: 100%; padding: 18px; background: var(--t1); color: var(--bg);
            border: none; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer;
        }

        /* --- UTILS --- */
        .skeleton { background: linear-gradient(90deg, var(--s1) 25%, var(--s2) 50%, var(--s1) 75%); background-size: 200% 100%; animation: load 1.5s infinite; }
        @keyframes load { from { background-position: 150% 0; } to { background-position: -150% 0; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-auth" class="screen active auth-view">
        <div style="font-size: 70px; font-weight: 900; margin-bottom: 10px;">𝕏</div>
        <h2 style="font-weight: 800; margin-bottom: 30px;">Inicia sesión ahora</h2>
        <div class="input-group">
            <input id="auth-user" class="input-main" placeholder="Tu nombre de usuario">
        </div>
        <button onclick="Engine.Auth.login()" class="btn-main">Empezar</button>
    </div>

    <div id="scr-feed" class="screen">
        <header class="header">
            <h1>Inicio</h1>
            <div onclick="Engine.Router.go('settings')" class="header-btn">⚙️</div>
        </header>
        <div id="main-feed" class="feed"></div>
    </div>

    <div id="scr-profile" class="screen">
        <header class="header">
            <div onclick="Engine.Router.back()" class="header-btn">←</div>
            <h1 id="view-username">Perfil</h1>
            <div style="width:36px"></div>
        </header>
        <div id="profile-content" class="profile-hero"></div>
        <div id="profile-feed" class="feed"></div>
    </div>

    <div id="scr-settings" class="screen">
        <header class="header">
            <div onclick="Engine.Router.back()" class="header-btn">←</div>
            <h1>Ajustes</h1>
            <div style="width:36px"></div>
        </header>
        <div style="padding: 20px;">
            <div style="background: var(--s1); border-radius: 18px; overflow: hidden;">
                <div class="post" onclick="Engine.UI.toggleTheme()" style="justify-content: space-between; align-items: center; border:none">
                    <span>Modo Oscuro</span>
                    <div id="theme-tag" style="color:var(--accent); font-weight:800">ON</div>
                </div>
                <div class="post" onclick="Engine.Auth.logout()" style="color: var(--danger); border:none">Cerrar sesión</div>
            </div>
            <p style="text-align: center; color: var(--t2); font-size: 12px; margin-top: 30px;">INSTANT X PRO v4.2.0<br>Desarrollado para alto rendimiento.</p>
        </div>
    </div>

    <nav id="nav-global" class="nav-bar hidden">
        <div class="nav-item active" onclick="Engine.Router.go('feed')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/></svg>
        </div>
        <div onclick="Engine.Social.createPost()" class="btn-post">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
        <div class="nav-item" onclick="Engine.Router.goProfile(Engine.Data.me)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    /* --- CONFIGURACIÓN DE FIREBASE --- */
    firebase.initializeApp({
        apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain: "vozanonimasm.firebaseapp.com",
        projectId: "vozanonimasm"
    });
    const db = firebase.firestore();

    /* --- ENGINE: EL CEREBRO DE LA APP --- */
    const Engine = {
        Data: {
            me: localStorage.getItem('__x_uid'),
            isDark: true,
            stack: ['feed']
        },

        UI: {
            toggleTheme() {
                Engine.Data.isDark = !Engine.Data.isDark;
                document.body.classList.toggle('light-mode');
                document.getElementById('theme-tag').innerText = Engine.Data.isDark ? 'ON' : 'OFF';
            },
            formatDate(ts) {
                const diff = (Date.now() - ts) / 1000;
                if(diff < 60) return 'ahora';
                if(diff < 3600) return Math.floor(diff/60) + 'm';
                if(diff < 86400) return Math.floor(diff/3600) + 'h';
                return new Date(ts).toLocaleDateString();
            },
            renderPost(id, p, target) {
                const el = document.createElement('div');
                el.className = 'post';
                el.onclick = () => Engine.Social.likePost(id);
                el.innerHTML = `
                    <div class="avatar" onclick="event.stopPropagation(); Engine.Router.goProfile('${p.user}')">${p.user[0].toUpperCase()}</div>
                    <div class="p-content">
                        <div class="p-meta">
                            <span class="p-name">${p.user}</span>
                            <span class="p-user">@${p.user} · ${this.formatDate(p.created)}</span>
                        </div>
                        <div class="p-text">${p.text}</div>
                        <div class="p-actions">
                            <div class="action-btn">💬 0</div>
                            <div class="action-btn">🔄 0</div>
                            <div class="action-btn">❤️ ${p.likes || 0}</div>
                        </div>
                    </div>
                `;
                document.getElementById(target).appendChild(el);
            }
        },

        Router: {
            go(id) {
                const screens = document.querySelectorAll('.screen');
                screens.forEach(s => s.classList.remove('active'));
                
                const target = document.getElementById('scr-' + id);
                target.classList.add('active');
                
                const nav = document.getElementById('nav-global');
                nav.classList.toggle('hidden', id === 'auth');

                document.querySelectorAll('.nav-item').forEach((n, i) => {
                    n.classList.toggle('active', (id === 'feed' && i === 0) || (id === 'profile' && i === 1));
                });

                if(id === 'feed') Engine.Social.listenFeed();
                if(id !== Engine.Data.stack[Engine.Data.stack.length-1]) Engine.Data.stack.push(id);
            },
            back() {
                if(Engine.Data.stack.length > 1) {
                    Engine.Data.stack.pop();
                    this.go(Engine.Data.stack[Engine.Data.stack.length-1]);
                }
            },
            goProfile(username) {
                this.go('profile');
                Engine.Social.loadProfile(username);
            }
        },

        Social: {
            listenFeed() {
                db.collection("posts").orderBy("created", "desc").limit(40).onSnapshot(snap => {
                    const wall = document.getElementById('main-feed');
                    wall.innerHTML = "";
                    snap.forEach(doc => Engine.UI.renderPost(doc.id, doc.data(), 'main-feed'));
                });
            },
            async loadProfile(u) {
                document.getElementById('view-username').innerText = `@${u}`;
                const userDoc = await db.collection("users").doc(u).get();
                const d = userDoc.data() || { bio: "Usuario de Instant 𝕏", followers: 0, following: 0 };
                
                document.getElementById('profile-content').innerHTML = `
                    <div style="display:flex; align-items:center; gap:16px">
                        <div class="avatar" style="width:70px; height:70px; font-size:30px; background:var(--accent); color:white">${u[0].toUpperCase()}</div>
                        <div>
                            <div style="font-size:22px; font-weight:900">@${u}</div>
                            <div style="color:var(--t2); font-size:14px">${d.bio}</div>
                        </div>
                    </div>
                    <div class="stats-row">
                        <div class="stat-item"><b>${d.following}</b> Siguiendo</div>
                        <div class="stat-item"><b>${d.followers}</b> Seguidores</div>
                    </div>
                `;

                db.collection("posts").where("user", "==", u).orderBy("created", "desc").get().then(snap => {
                    const wall = document.getElementById('profile-feed');
                    wall.innerHTML = "";
                    snap.forEach(doc => Engine.UI.renderPost(doc.id, doc.data(), 'profile-feed'));
                });
            },
            createPost() {
                const msg = prompt("¿Qué está pasando?");
                if(msg && msg.trim().length > 0) {
                    db.collection("posts").add({
                        user: Engine.Data.me,
                        text: msg,
                        created: Date.now(),
                        likes: 0
                    });
                }
            },
            async likePost(id) {
                const ref = db.collection("posts").doc(id);
                await ref.update({ likes: firebase.firestore.FieldValue.increment(1) });
            }
        },

        Auth: {
            login() {
                const user = document.getElementById('auth-user').value.trim().toLowerCase();
                if(user.length < 3) return alert("Mínimo 3 caracteres.");
                Engine.Data.me = user;
                localStorage.setItem('__x_uid', user);
                db.collection("users").doc(user).set({ user, bio: "¡Hola! Estoy en Instant X.", followers: 120, following: 84 }, { merge: true });
                Engine.Router.go('feed');
            },
            logout() {
                localStorage.clear();
                location.reload();
            }
        }
    };

    /* --- INITIALIZE --- */
    window.onload = () => {
        if(Engine.Data.me) Engine.Router.go('feed');
    };
</script>
</body>
</html>
