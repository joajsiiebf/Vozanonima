<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Social App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="login-card">
    <h2>Acceder</h2>

    <input id="user" placeholder="Usuario">
    <input id="phone" placeholder="Teléfono">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="register()">Crear cuenta</button>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- TOP -->
  <div class="topbar">
    <div>Social</div>
    <div id="me"></div>
  </div>

  <!-- SEARCH -->
  <div id="searchView" style="display:none;">
    <div class="search-bar">
      <input id="searchInput" placeholder="Buscar usuarios...">
      <button onclick="searchUsers()">Buscar</button>
    </div>
    <div id="searchResults"></div>
  </div>

  <!-- FEED -->
  <div id="feedView">
    <div class="post-box">
      <textarea id="postText" placeholder="¿Qué estás pensando?"></textarea>
      <button onclick="createPost()">Publicar</button>
    </div>

    <div id="feed"></div>
  </div>

  <!-- PROFILE -->
  <div id="profileView" style="display:none;"></div>

  <!-- SETTINGS -->
  <div id="settingsView" style="display:none;">
    <h3>Configuración</h3>

    <button onclick="toggleTheme()">Modo oscuro/claro</button>
    <button onclick="toggleLang()">Idioma</button>
    <button onclick="changeUser()">Cambiar usuario</button>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button onclick="showView('home')">Inicio</button>
    <button onclick="showView('search')">Buscar</button>
    <button onclick="showView('profile')">Perfil</button>
    <button onclick="showView('settings')">Ajustes</button>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
