
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS TITAN V28</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000; --surface: #0A0A0A; --accent: #D4AF37; --border: #1F1F1F;
            --text: #fff; --dim: #71767B; --verify: #1D9BF0; --gold: #D4AF37; --error: #f4212e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; height: 100%; }

        /* --- LAYOUT SISTÉMICO --- */
        #nexus-app { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; border-inline: 1px solid var(--border); display: flex; flex-direction: column; position: relative; background: #000; }
        .view { flex: 1; overflow-y: auto; display: none; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .view.active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER & NAVIGATION --- */
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 1000; position: sticky; top: 0; }
        nav { height: 70px; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; background: #000; position: absolute; bottom: 0; width: 100%; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-btn { color: var(--dim); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 25%; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn svg { width: 24px; height: 24px; }

        /* --- FEED & POSTS --- */
        .post { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; transition: 0.2s; }
        .avatar-box { width: 48px; height: 48px; border-radius: 50%; background: #151515; flex-shrink: 0; overflow: hidden; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .post-body { flex: 1; }
        .post-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .post-name { font-weight: 800; font-size: 15px; color: #fff; }
        .post-handle { color: var(--dim); font-size: 14px; }
        .post-text { font-size: 15px; line-height: 1.5; color: #eff3f4; white-space: pre-wrap; }
        
        .post-actions { display: flex; gap: 30px; margin-top: 12px; color: var(--dim); }
        .action { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .action.liked { color: #f91880; }
        .action svg { width: 18px; height: 18px; fill: currentColor; }

        /* --- PROFILE & SETTINGS --- */
        .hero { height: 120px; background: linear-gradient(to bottom, #1a1a1a, #000); position: relative; }
        .profile-data { padding: 0 16px; margin-top: -45px; }
        .avatar-lg { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #000; background: #151515; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .stats { display: flex; gap: 20px; margin-top: 15px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 900; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }
        .nx-input { width: 100%; background: #0A0A0A; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
        .nx-input:focus { border-color: var(--accent); background: #111; }

        /* --- MODAL & TOAST --- */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 24px; border-radius: 30px; font-weight: 800; font-size: 13px; z-index: 5000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .verify-icon { width: 16px; height: 16px; fill: var(--gold); }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="nexus-app">
    <header>
        <div style="display:flex; align-items:center; gap:8px;">
            <div id="top-avatar" class="avatar-box" style="width:32px; height:32px; font-size:12px;"></div>
            <span style="font-weight:900; letter-spacing:-1px;">NEXUS <span style="color:var(--accent)">TITAN</span></span>
        </div>
        <div id="status-dot" style="width:8px; height:8px; border-radius:50%; background:var(--gold); box-shadow:0 0 10px var(--gold)"></div>
    </header>

    <main style="flex:1; position:relative; overflow:hidden">
        <section id="v-home" class="view active">
            <div id="feed-scroller"></div>
            <div id="load-more" style="padding:40px; text-align:center; color:var(--dim); font-size:12px;">CARGANDO MATRIZ...</div>
        </section>

        <section id="v-profile" class="view">
            <div class="hero"></div>
            <div class="profile-data">
                <div class="avatar-lg" id="ui-avatar-lg"></div>
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-top:10px;">
                    <div>
                        <h1 id="ui-name" style="font-size:22px; font-weight:800; display:flex; align-items:center; gap:5px;"></h1>
                        <p id="ui-handle" style="color:var(--dim)"></p>
                    </div>
                    <button onclick="Nexus.Router.go('settings')" style="border:1px solid var(--border); background:transparent; color:#fff; padding:8px 20px; border-radius:20px; font-weight:700; font-size:13px;">Editar</button>
                </div>
                <p id="ui-bio" style="margin-top:12px; line-height:1.4; color:#cfd9de;"></p>
                <div class="stats">
                    <span><b id="count-following">0</b> <span style="color:var(--dim)">Siguiendo</span></span>
                    <span><b id="count-followers">1.4M</b> <span style="color:var(--dim)">Seguidores</span></span>
                </div>
            </div>
            <div id="user-posts"></div>
        </section>

        <section id="v-settings" class="view">
            <div style="padding:20px">
                <h2 style="margin-bottom:24px">Personalización</h2>
                <div class="form-group">
                    <label>Nombre Público</label>
                    <input type="text" id="set-name" class="nx-input" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Biografía</label>
                    <textarea id="set-bio" class="nx-input" style="height:100px; resize:none;" placeholder="Cuenta tu historia..."></textarea>
                </div>
                <div class="form-group">
                    <label>URL Imagen de Perfil</label>
                    <input type="text" id="set-avatar" class="nx-input" placeholder="https://imgur.com/tu-foto.jpg">
                </div>
                <div style="background:#111; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;">
                    <p style="font-size:12px; color:var(--dim)">Tu ID único es: <span id="ui-id-display" style="color:var(--accent)"></span></p>
                </div>
                <button onclick="Nexus.Core.saveProfile()" style="width:100%; background:var(--accent); color:#000; border:none; padding:18px; border-radius:15px; font-weight:900; cursor:pointer;">GUARDAR CAMBIOS</button>
            </div>
        </section>
    </main>

    <nav>
        <div class="nav-btn active" onclick="Nexus.Router.go('home')">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>INICIO</span>
        </div>
        <div class="nav-btn" onclick="Nexus.UI.modal('m-post', true)" style="color:var(--accent)">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <span>POSTEAR</span>
        </div>
        <div class="nav-btn" onclick="Nexus.Router.go('profile')">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>PERFIL</span>
        </div>
    </nav>

    <div id="m-post" class="modal">
        <header>
            <div onclick="Nexus.UI.modal('m-post', false)" style="cursor:pointer">Cancelar</div>
            <button onclick="Nexus.Social.post()" style="background:var(--accent); color:#000; border:none; padding:8px 20px; border-radius:20px; font-weight:800;">Publicar</button>
        </header>
        <textarea id="post-area" style="flex:1; background:transparent; border:none; color:#fff; padding:20px; font-size:19px; outline:none; resize:none;" placeholder="¿Qué está pasando?"></textarea>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/**
 * NEXUS CORE V28 - THE TITAN ENGINE
 * Architecture: Event-Driven SPA
 */

firebase.initializeApp({ 
    apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU", 
    authDomain: "vozanonimasm.firebaseapp.com", 
    projectId: "vozanonimasm" 
});
const db = firebase.firestore();

const Nexus = {
    // ESTADO CENTRALIZADO
    State: {
        user: {
            id: localStorage.getItem('nx_id') || 'js_' + Math.random().toString(36).substr(2, 5),
            name: localStorage.getItem('nx_name') || 'Nexus User',
            bio: localStorage.getItem('nx_bio') || 'Explorador de la Matriz',
            avatar: localStorage.getItem('nx_avatar') || '',
            likes: JSON.parse(localStorage.getItem('nx_likes') || '[]'),
            isVerify: localStorage.getItem('nx_verify') === 'true'
        },
        view: 'home',
        loading: false
    },

    // MOTOR LÓGICO
    Core: {
        init() {
            localStorage.setItem('nx_id', Nexus.State.user.id);
            Nexus.UI.sync();
            Nexus.Router.go('home');
            console.log("Nexus Titan Engine Online");
        },
        saveProfile() {
            const n = document.getElementById('set-name').value;
            const b = document.getElementById('set-bio').value;
            const a = document.getElementById('set-avatar').value;

            Nexus.State.user.name = n;
            Nexus.State.user.bio = b;
            Nexus.State.user.avatar = a;

            localStorage.setItem('nx_name', n);
            localStorage.setItem('nx_bio', b);
            localStorage.setItem('nx_avatar', a);

            Nexus.UI.sync();
            Nexus.UI.toast("IDENTIDAD ACTUALIZADA");
            Nexus.Router.go('profile');
        }
    },

    // MOTOR SOCIAL (FIREBASE)
    Social: {
        async post() {
            const txt = document.getElementById('post-area').value.trim();
            if(!txt) return;

            try {
                await db.collection("posts").add({
                    uid: Nexus.State.user.id,
                    author: Nexus.State.user.name,
                    avatar: Nexus.State.user.avatar,
                    content: txt,
                    likes: 0,
                    isVerify: Nexus.State.user.isVerify,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                document.getElementById('post-area').value = "";
                Nexus.UI.modal('m-post', false);
                Nexus.UI.toast("TRANSMISIÓN EXITOSA");
            } catch(e) { Nexus.UI.toast("ERROR DE ENLACE"); }
        },

        async like(postId, el) {
            let myLikes = Nexus.State.user.likes;
            const ref = db.collection("posts").doc(postId);
            
            if(myLikes.includes(postId)) {
                myLikes = myLikes.filter(id => id !== postId);
                await ref.update({ likes: firebase.firestore.FieldValue.increment(-1) });
                el.classList.remove('liked');
            } else {
                myLikes.push(postId);
                await ref.update({ likes: firebase.firestore.FieldValue.increment(1) });
                el.classList.add('liked');
            }
            
            Nexus.State.user.likes = myLikes;
            localStorage.setItem('nx_likes', JSON.stringify(myLikes));
        },

        renderFeed(containerId, filterUid = null) {
            const container = document.getElementById(containerId);
            let query = db.collection("posts").orderBy("timestamp", "desc").limit(30);
            
            query.onSnapshot(snap => {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    if(filterUid && p.uid !== filterUid) return;

                    const isLiked = Nexus.State.user.likes.includes(doc.id);
                    const postEl = document.createElement('div');
                    postEl.className = 'post';
                    postEl.innerHTML = `
                        <div class="avatar-box">
                            ${p.avatar ? `<img src="${p.avatar}">` : p.author[0]}
                        </div>
                        <div class="post-body">
                            <div class="post-meta">
                                <span class="post-name">${p.author}</span>
                                ${p.isVerify ? '<svg class="verify-icon" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.88-2.95-2.18-3.66.15-.44.23-.91.23-1.4 0-2.22-1.81-4.02-4.04-4.04-.48 0-.95.08-1.38.24C14.42 2.37 13.06 1.5 11.5 1.5c-1.56 0-2.92.87-3.63 2.15-.44-.16-.91-.24-1.38-.24-2.23 0-4.03 1.8-4.03 4.02 0 .49.08.96.23 1.41C1.38 9.55.5 10.92.5 12.5c0 1.58.88 2.95 2.18 3.66-.15.44-.23.91-.23 1.4 0 2.22 1.81 4.02 4.04 4.02.48 0 .95-.08 1.38-.24 1.43 1.3 2.79 2.15 4.34 2.15 1.56 0 2.92-.87 3.63-2.15.44.16.91.24 1.38.24 2.23 0 4.03-1.8 4.03-4.02 0-.49-.08-.96-.23-1.41 1.3-.71 2.18-2.08 2.18-3.66zM9.91 17.39l-4.76-4.76L6.58 11.2l3.33 3.33 7.05-7.05 1.43 1.43-8.48 8.48z"/></svg>' : ''}
                                <span class="post-handle">@${p.uid}</span>
                            </div>
                            <div class="post-text">${p.content}</div>
                            <div class="post-actions">
                                <div class="action ${isLiked?'liked':''}" onclick="Nexus.Social.like('${doc.id}', this)">
                                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                    <span>${p.likes || 0}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(postEl);
                });
            });
        }
    },

    // RUTAS Y NAVEGACIÓN
    Router: {
        go(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const target = document.getElementById('v-' + view);
            target.classList.add('active');
            Nexus.State.view = view;

            // Update Nav visual
            const buttons = document.querySelectorAll('.nav-btn');
            if(view === 'home') buttons[0].classList.add('active');
            if(view === 'profile') buttons[2].classList.add('active');

            if(view === 'home') Nexus.Social.renderFeed('feed-scroller');
            if(view === 'profile') {
                Nexus.UI.sync();
                Nexus.Social.renderFeed('user-posts', Nexus.State.user.id);
            }
        }
    },

    // INTERFAZ DE USUARIO
    UI: {
        sync() {
            const u = Nexus.State.user;
            // Sync Profile UI
            document.getElementById('ui-name').innerHTML = u.name + (u.isVerify ? ' <svg class="verify-icon" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.88-2.95-2.18-3.66.15-.44.23-.91.23-1.4 0-2.22-1.81-4.02-4.04-4.02-.48 0-.95.08-1.38.24C14.42 2.37 13.06 1.5 11.5 1.5c-1.56 0-2.92.87-3.63 2.15-.44-.16-.91-.24-1.38-.24-2.23 0-4.03 1.8-4.03 4.02 0 .49.08.96.23 1.41C1.38 9.55.5 10.92.5 12.5c0 1.58.88 2.95 2.18 3.66-.15.44-.23.91-.23 1.4 0 2.22 1.81 4.02 4.04 4.02.48 0 .95-.08 1.38-.24 1.43 1.3 2.79 2.15 4.34 2.15 1.56 0 2.92-.87 3.63-2.15.44.16.91.24 1.38.24 2.23 0 4.03-1.8 4.03-4.02 0-.49-.08-.96-.23-1.41 1.3-.71 2.18-2.08 2.18-3.66zM9.91 17.39l-4.76-4.76L6.58 11.2l3.33 3.33 7.05-7.05 1.43 1.43-8.48 8.48z"/></svg>' : '');
            document.getElementById('ui-handle').innerText = '@' + u.id;
            document.getElementById('ui-bio').innerText = u.bio;
            document.getElementById('ui-avatar-lg').innerHTML = u.avatar ? `<img src="${u.avatar}">` : u.name[0];
            document.getElementById('top-avatar').innerHTML = u.avatar ? `<img src="${u.avatar}">` : u.name[0];
            document.getElementById('ui-id-display').innerText = u.id;

            // Sync Settings Inputs
            document.getElementById('set-name').value = u.name;
            document.getElementById('set-bio').value = u.bio;
            document.getElementById('set-avatar').value = u.avatar;
        },
        modal(id, show) {
            document.getElementById(id).classList.toggle('active', show);
        },
        toast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    }
};

// ARRANQUE
window.onload = () => Nexus.Core.init();
</script>
</body>
</html>
