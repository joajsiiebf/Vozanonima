<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSCOL | Arcade Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f7ff; --neon-magenta: #ff00ff; --neon-yellow: #fff200;
            --bg-dark: #020210; --panel-bg: rgba(5, 5, 30, 0.95);
        }

        body {
            margin: 0; background: var(--bg-dark); color: #fff;
            font-family: 'Press Start 2P', cursive; overflow: hidden;
            background-image: radial-gradient(circle at center, #1a1a4a 0%, #020210 80%),
                linear-gradient(var(--neon-cyan) 0.1rem, transparent 0.1rem),
                linear-gradient(90deg, var(--neon-cyan) 0.1rem, transparent 0.1rem);
            background-size: 100% 100%, 40px 40px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        #app {
            display: grid; grid-template-columns: 280px 1fr 280px; gap: 15px;
            width: 98%; max-width: 1300px; height: 85vh; z-index: 5;
        }

        .panel {
            background: var(--panel-bg); border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.4); padding: 20px;
            display: flex; flex-direction: column; position: relative;
        }

        .main-panel { border-color: var(--neon-magenta); text-align: center; }

        .heart { color: #ff0040; text-shadow: 0 0 10px #ff0040; font-size: 20px; margin: 0 5px; transition: 0.3s; }
        .heart.lost { color: #222; text-shadow: none; transform: scale(0.8); }

        input {
            background: #000; border: 3px solid var(--neon-yellow); color: var(--neon-cyan);
            padding: 15px; font-family: 'Press Start 2P'; width: 80%; margin-top: 20px; text-align: center; outline: none;
        }

        button {
            background: var(--neon-magenta); color: #fff; border: none; padding: 15px 30px;
            font-family: 'Press Start 2P'; cursor: pointer; margin-top: 20px;
            box-shadow: 5px 5px 0px #000; transition: 0.1s;
        }

        button:hover { background: var(--neon-cyan); color: #000; transform: translate(-2px, -2px); box-shadow: 7px 7px 0px var(--neon-magenta); }

        /* Efecto Glitch de Daño */
        .damage-flash { animation: flash-red 0.1s 3; }
        @keyframes flash-red { 0%, 100% { background: transparent; } 50% { background: rgba(255, 0, 0, 0.4); } }

        #ranking p { font-size: 9px; border-left: 3px solid var(--neon-magenta); padding-left: 8px; margin: 12px 0; }
    </style>
</head>
<body>

<div id="app">
    <div class="panel">
        <h2>SISTEMA</h2>
        <div style="margin:20px 0;">VIDAS:<br><div id="lives-container"></div></div>
        <div class="stat">NIVEL: <span id="p-level" style="color:var(--neon-yellow)">01</span></div>
        <div class="stat">PLAYER: <span id="p-name" style="color:var(--neon-cyan)">---</span></div>
        <div style="margin-top:auto; font-size:9px; color:var(--neon-yellow); border:1px dashed var(--neon-yellow); padding:10px;">
            BOUNTY: $10,000 COP
        </div>
    </div>

    <div class="panel main-panel" id="game-core">
        <h2 id="lvl-title">JSCOL ARCADE</h2>
        <div id="content" style="flex-grow:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <p>CARGANDO INTERFAZ...</p>
        </div>
    </div>

    <div class="panel">
        <h2>RANKING</h2>
        <div id="ranking"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // --- MOTOR DE AUDIO AVANZADO ---
    const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let ambientNode = null;

    function playSFX(type) {
        const osc = AudioCtx.createOscillator();
        const gain = AudioCtx.createGain();
        osc.connect(gain); gain.connect(AudioCtx.destination);

        if(type === 'click') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, AudioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 0.1);
        } else if(type === 'win') {
            osc.type = 'square'; osc.frequency.setValueAtTime(523.25, AudioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1046.50, AudioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
        } else if(type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, AudioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, AudioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
        }
        osc.start(); osc.stop(AudioCtx.currentTime + 0.4);
    }

    function startAmbient() {
        if(ambientNode) return;
        // Sonido base suave (tipo Minecraft)
        const base = AudioCtx.createOscillator();
        const filter = AudioCtx.createBiquadFilter();
        const gain = AudioCtx.createGain();
        
        base.type = 'triangle';
        base.frequency.setValueAtTime(110, AudioCtx.currentTime);
        filter.type = 'lowpass'; filter.frequency.value = 400;
        gain.gain.value = 0.03;

        base.connect(filter); filter.connect(gain); gain.connect(AudioCtx.destination);
        base.start();
        ambientNode = base;
    }

    // --- LOGICA DE JUEGO ---
    const firebaseConfig = { apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU", authDomain: "vozanonimasm.firebaseapp.com", projectId: "vozanonimasm" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let USER = { 
        uid: localStorage.getItem("uid") || "js_"+Math.random().toString(36).substr(2,5), 
        name: localStorage.getItem("name"), 
        level: parseInt(localStorage.getItem("level")) || 1,
        lives: 3 
    };

    const puzzles = [
        {q:"Escribe el ID de tu marca", a:"jscol"},
        {q:"¿Qué número sigue? 2, 4, 16, 256, ?", a:"65536"},
        {q:"¿Cuántos colores tiene el arcoíris?", a:"7"},
        {q:"Si hoy es lunes, ¿qué día será en 100 días?", a:"martes"},
        {q:"Escribe 'HOLA' en Binario", a:"01001000 01001111 01001100 01000001"},
        {q:"Resuelve: (4 * 4) + (4 / 4) - 4", a:"13"},
        {q:"¿Cuál es la capital de Colombia?", a:"bogotá"},
        {q:"Escribe la palabra 'PIXEL' al revés", a:"lexip"},
        {q:"¿Cuál es el color que resulta de mezclar Rojo y Azul?", a:"violeta"},
        {q:"Nivel Final: ¿Cuál es el código secreto? (Pista: JSCOL)", a:"jscol2026"}
    ];

    function init() {
        if(!USER.name) {
            document.getElementById("content").innerHTML = `<h2>INGRESA AL ARCADE</h2><input id="u-in" placeholder="TU NOMBRE"><button id="start-btn">CONECTAR</button>`;
            document.getElementById("start-btn").onclick = () => { startAmbient(); login(); };
        } else {
            startAmbient();
            document.getElementById("p-name").innerText = USER.name;
            renderLives();
            loadLevel();
        }
    }

    function login() {
        let n = document.getElementById("u-in").value.toUpperCase();
        if(n.length > 2) { playSFX('win'); USER.name = n; localStorage.setItem("name", n); init(); }
    }

    function renderLives() {
        let h = "";
        for(let i=0; i<3; i++) h += `<span class="heart ${i >= USER.lives ? 'lost' : ''}">❤</span>`;
        document.getElementById("lives-container").innerHTML = h;
    }

    function loadLevel() {
        let p = puzzles[USER.level-1];
        if(!p) { finish(); return; }
        document.getElementById("lvl-title").innerText = `RETRO PUZZLE 0${USER.level}`;
        document.getElementById("p-level").innerText = USER.level;
        document.getElementById("content").innerHTML = `<p>${p.q}</p><input id="ans" autocomplete="off"><button onclick="playSFX('click'); check();">ENVIAR</button>`;
    }

    function check() {
        let v = document.getElementById("ans").value.toLowerCase().trim();
        if(v === puzzles[USER.level-1].a) {
            playSFX('win'); USER.level++;
            localStorage.setItem("level", USER.level);
            db.collection("players").doc(USER.uid).set({name:USER.name, level:USER.level}, {merge:true});
            loadLevel();
        } else {
            USER.lives--;
            playSFX('fail');
            document.body.classList.add("damage-flash");
            setTimeout(() => document.body.classList.remove("damage-flash"), 300);
            renderLives();
            if(USER.lives <= 0) gameOver();
        }
    }

    function gameOver() {
        document.getElementById("content").innerHTML = `<h2 style="color:red">CONEXIÓN PERDIDA</h2><p>TE HAS QUEDADO SIN VIDAS</p><button onclick="reset()">REINICIAR</button>`;
    }

    function reset() {
        USER.level = 1; USER.lives = 3;
        localStorage.setItem("level", 1);
        init();
    }

    function finish() {
        document.getElementById("content").innerHTML = `<h2>VICTORIA TOTAL</h2><p>ERES UNA LEYENDA</p>`;
    }

    db.collection("players").orderBy("level","desc").limit(6).onSnapshot(s => {
        let html = ""; s.forEach(d => html += `<p>> ${d.data().name} - LVL ${d.data().level}</p>`);
        document.getElementById("ranking").innerHTML = html;
    });

    init();
</script>
</body>
</html>
