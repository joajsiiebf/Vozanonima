<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INSTANT 𝕏 | Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --s1: #0A0A0A;
            --brd: #2F3336; /* Gris X original */
            --t1: #FFFFFF;
            --t2: #71767B;
            --accent: #8B5CF6; /* Morado Eléctrico */
            --danger: #F91880;
            --ios-spring: cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--t1); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* --- LAYOUT --- */
        #app { width: 100%; max-width: 450px; height: 100%; margin: 0 auto; position: relative; display: flex; flex-direction: column; border-left: 1px solid var(--brd); border-right: 1px solid var(--brd); }
        
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: var(--bg); z-index: 10; padding-bottom: 60px; }
        .screen.active { display: flex; }

        /* --- HEADER & NAVIGATION --- */
        .header { 
            height: 53px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--brd); z-index: 100; position: sticky; top: 0;
        }
        .header h1 { font-size: 19px; font-weight: 800; margin: 0; }
        
        .nav-bottom { 
            position: absolute; bottom: 0; width: 100%; height: 53px; 
            background: var(--bg); border-top: 1px solid var(--brd);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-tab { color: var(--t2); text-align: center; flex: 1; cursor: pointer; transition: 0.2s; }
        .nav-tab.active { color: var(--t1); }
        .nav-tab svg { width: 26px; height: 26px; }

        /* --- POSTS (ESTILO X) --- */
        .feed { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        .post { padding: 12px 16px; border-bottom: 1px solid var(--brd); display: flex; gap: 12px; transition: 0.2s; cursor: pointer; }
        .post:active { background: #080808; }

        .avatar { 
            width: 42px; height: 42px; border-radius: 50%; background: #1a1a1a; 
            display: flex; align-items: center; justify-content: center; font-weight: 700;
            flex-shrink: 0; font-size: 14px; border: 1px solid var(--brd);
        }

        .p-body { flex: 1; }
        .p-info { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
        .p-name { font-weight: 700; font-size: 15px; }
        .p-user { color: var(--t2); font-size: 14px; }
        .p-text { font-size: 15px; line-height: 1.4; color: var(--t1); white-space: pre-wrap; }

        .p-actions { display: flex; justify-content: space-between; max-width: 300px; margin-top: 12px; color: var(--t2); }
        .btn-int { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-int:hover { color: var(--accent); }
        .btn-int.liked { color: var(--danger); }
        .btn-int svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
        .btn-int.liked svg { fill: var(--danger); stroke: var(--danger); }

        /* --- PERFIL --- */
        .profile-top { padding: 16px; border-bottom: 1px solid var(--brd); }
        .p-stats { display: flex; gap: 20px; margin-top: 15px; font-size: 14px; }
        .stat-v { font-weight: 700; color: var(--t1); }
        .stat-l { color: var(--t2); margin-left: 2px; }

        /* --- SETTINGS --- */
        .sett-item { padding: 16px; border-bottom: 1px solid var(--brd); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .sett-item:active { background: #1a1a1a; }

        /* --- BUTTONS --- */
        .fab { 
            position: absolute; bottom: 75px; right: 20px; width: 56px; height: 56px; 
            background: var(--accent); border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; z-index: 999;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-auth" class="screen active" style="justify-content:center; padding:40px;">
        <div style="font-size: 50px; font-weight: 900; text-align: center; margin-bottom: 30px;">𝕏</div>
        <input id="login-input" style="width:100%; padding:18px; background:#000; border:1px solid var(--brd); border-radius:8px; color:white; margin-bottom:15px;" placeholder="Tu @usuario">
        <button onclick="Core.Auth.login()" style="width:100%; padding:15px; background:white; border:none; border-radius:30px; color:black; font-weight:700; cursor:pointer;">Continuar</button>
    </div>

    <div id="scr-feed" class="screen">
        <header class="header"><h1>Inicio</h1><div onclick="Core.Router.go('settings')" style="cursor:pointer">⚙️</div></header>
        <div id="feed-wall" class="feed"></div>
        <div class="fab" onclick="Core.Social.newPost()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M23 3c-6.62 0-12 5.38-12 12h3c0-4.97 4.03-9 9-9V3zM2 3c0 3.87 3.13 7 7 7h3c0-5.52-4.48-10-10-10V3zm15 15c0-2.76-2.24-5-5-5h-3c0 4.42 3.58 8 8 8V18z"/></svg>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <header class="header"><div onclick="Core.Router.back()" style="cursor:pointer">←</div><h1 id="p-title">@perfil</h1><div style="width:20px"></div></header>
        <div id="profile-meta" class="profile-top"></div>
        <div id="profile-posts" class="feed"></div>
    </div>

    <div id="scr-settings" class="screen">
        <header class="header"><div onclick="Core.Router.back()" style="cursor:pointer">←</div><h1>Configuración</h1><div style="width:20px"></div></header>
        <div class="sett-item" onclick="Core.Auth.logout()" style="color:var(--danger)"><b>Cerrar sesión</b></div>
        <div class="sett-item"><span>Modo Oscuro</span><span style="color:var(--t2)">Activado</span></div>
        <p style="text-align:center; color:var(--t2); font-size:12px; margin-top:20px;">INSTANT 𝕏 v3.0.0 (2026)</p>
    </div>

    <nav id="nav-main" class="nav-bottom" style="display:none">
        <div class="nav-tab active" onclick="Core.Router.go('feed')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M21.58 13.06l-8.26-8.26c-.73-.73-1.91-.73-2.65 0L2.42 13.06c-.36.36-.58.86-.58 1.41 0 1.1.9 2 2 2h1.5v4.5c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-4h2v4c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-4.5h1.5c1.1 0 2-.9 2-2 0-.55-.22-1.05-.58-1.41z"/></svg></div>
        <div class="nav-tab" onclick="Core.Router.goProfile(Core.State.me)"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M17.863 13.44c1.477 1.58 2.366 3.72 2.366 6.06v.5c0 .83-.67 1.5-1.5 1.5h-13.5c-.83 0-1.5-.67-1.5-1.5v-.5c0-2.34.89-4.48 2.366-6.06C7.3 12.19 9.5 11.5 12 11.5s4.7.69 5.863 1.94zM12 2c2.485 0 4.5 2.015 4.5 4.5S14.485 11 12 11 7.5 8.985 7.5 6.5 9.515 2 12 2z"/></svg></div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    // ⚙️ FIREBASE CONFIG (Tu proyecto real)
    firebase.initializeApp({
        apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain: "vozanonimasm.firebaseapp.com",
        projectId: "vozanonimasm"
    });
    const db = firebase.firestore();

    // 🧬 ENGINE CORE
    const Core = {
        State: {
            me: localStorage.getItem('_inst_u'),
            history: ['feed'],
            cache: new Map()
        },

        Router: {
            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('scr-' + id).classList.add('active');
                
                const isAuth = id === 'auth';
                document.getElementById('nav-main').style.display = isAuth ? 'none' : 'flex';
                
                document.querySelectorAll('.nav-tab').forEach((t, i) => {
                    t.classList.toggle('active', (id === 'feed' && i === 0) || (id === 'profile' && Core.State.viewing === Core.State.me && i === 1));
                });

                if(id === 'feed') Core.Social.listenFeed();
                if(!isAuth && id !== Core.State.history[Core.State.history.length-1]) Core.State.history.push(id);
            },
            back() {
                if(Core.State.history.length > 1) {
                    Core.State.history.pop();
                    this.go(Core.State.history[Core.State.history.length-1]);
                }
            },
            goProfile(u) {
                Core.State.viewing = u;
                this.go('profile');
                Core.Social.loadProfile(u);
            }
        },

        Social: {
            listenFeed() {
                db.collection("posts").orderBy("created", "desc").limit(25).onSnapshot(snap => {
                    const wall = document.getElementById('feed-wall');
                    wall.innerHTML = "";
                    snap.forEach(doc => wall.appendChild(Core.UI.renderPost(doc.id, doc.data())));
                });
            },

            async loadProfile(u) {
                document.getElementById('p-title').innerText = `@${u}`;
                const userDoc = await db.collection("users").doc(u).get();
                const d = userDoc.data() || {followers:0, following:0};
                
                document.getElementById('profile-meta').innerHTML = `
                    <div class="avatar" style="width:70px; height:70px; font-size:24px; background:var(--accent)">${u[0].toUpperCase()}</div>
                    <div style="margin-top:12px">
                        <span style="font-size:20px; font-weight:800; display:block">@${u}</span>
                        <div class="p-stats">
                            <span><span class="stat-v">${d.following}</span><span class="stat-l">Siguiendo</span></span>
                            <span><span class="stat-v">${d.followers}</span><span class="stat-l">Seguidores</span></span>
                        </div>
                    </div>
                `;

                db.collection("posts").where("user", "==", u).get().then(snap => {
                    const wall = document.getElementById('profile-posts');
                    wall.innerHTML = "";
                    snap.forEach(doc => wall.appendChild(Core.UI.renderPost(doc.id, doc.data())));
                });
            },

            async like(pid, owner) {
                const id = `${Core.State.me}_${pid}`;
                const ref = db.collection("likes").doc(id);
                const doc = await ref.get();
                
                if(!doc.exists) {
                    await ref.set({ u: Core.State.me, p: pid });
                    await db.collection("posts").doc(pid).update({ likes: firebase.firestore.FieldValue.increment(1) });
                } else {
                    await ref.delete();
                    await db.collection("posts").doc(pid).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                }
            },

            newPost() {
                const t = prompt("¿Qué está pasando?");
                if(t) db.collection("posts").add({ user: Core.State.me, text: t, created: Date.now(), likes: 0 });
            }
        },

        UI: {
            renderPost(id, data) {
                const el = document.createElement('div');
                el.className = 'post';
                el.innerHTML = `
                    <div class="avatar" onclick="Core.Router.goProfile('${data.user}')">${data.user[0].toUpperCase()}</div>
                    <div class="p-body">
                        <div class="p-info">
                            <span class="p-name">${data.user}</span>
                            <span class="p-user">@${data.user}</span>
                        </div>
                        <div class="p-text">${data.text}</div>
                        <div class="p-actions">
                            <div class="btn-int" onclick="Core.Social.like('${id}', '${data.user}')">
                                <svg viewBox="0 0 24 24"><path d="M12 21.638h-.014C9.403 21.59 1.95 14.856 1.95 8.478c0-3.064 2.525-5.754 5.403-5.754 2.29 0 3.83 1.58 4.646 2.73.814-1.148 2.354-2.73 4.645-2.73 2.88 0 5.404 2.69 5.404 5.755 0 6.376-7.454 13.11-10.037 13.157H12z"/></svg>
                                <span>${data.likes || 0}</span>
                            </div>
                            <div class="btn-int"><svg viewBox="0 0 24 24"><path d="M14.046 2.242l-4.148-.01h-.002c-4.374 0-7.8 3.427-7.8 7.802 0 4.098 3.186 7.206 7.465 7.37v3.828c0 .585.312 1.104.812 1.37.5.266 1.1.235 1.575-.074l5.444-3.56c3.307-.166 5.642-3.22 5.642-6.73 0-4.39-3.47-7.92-7.988-7.996z"/></svg>0</div>
                            <div class="btn-int"><svg viewBox="0 0 24 24"><path d="M4.5 3.88l4.432 4.43-1.77 1.77L4.5 7.42V17h15V7.42l-2.662 2.66-1.77-1.77L19.5 3.88V2h-15v1.88z"/></svg></div>
                        </div>
                    </div>
                `;
                return el;
            }
        },

        Auth: {
            login() {
                const u = document.getElementById('login-input').value.trim().toLowerCase();
                if(u.length < 3) return alert("Mínimo 3 caracteres");
                Core.State.me = u;
                localStorage.setItem('_inst_u', u);
                db.collection("users").doc(u).set({ u, followers: 0, following: 0 }, { merge: true });
                Core.Router.go('feed');
            },
            logout() { localStorage.clear(); location.reload(); }
        }
    };

    // INIT
    if(Core.State.me) Core.Router.go('feed');
</script>
</body>
</html>
