<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voz Anónima</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="tutorial" class="tutorial">
  <h2>👁️ Voz Anónima</h2>
  <p>Publica pensamientos de forma anónima</p>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none;">

  <div class="topbar">Voz Anónima</div>

  <div class="composer">
    <input id="username" placeholder="Usuario (opcional)">
    <button onclick="guardarUsuario()">OK</button>
  </div>

  <div class="post-box">
    <textarea id="inputChisme" placeholder="¿Qué estás pensando?"></textarea>
    <button id="btnPost" onclick="enviarChisme()">Publicar</button>
  </div>

  <div id="feed"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
