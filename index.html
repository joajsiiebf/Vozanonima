<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INSTANT | Social Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: linear-gradient(135deg, #C04FBA 0%, #7A2C76 100%);
            --bg: #000000;
            --card: #1C1C1E;
            --text: #FFFFFF;
            --border: rgba(255, 255, 255, 0.1);
            --muted: #8E8E93;
            --ios-blue: #0A84FF;
        }

        body.light-mode {
            --bg: #F2F2F7; --card: #FFFFFF; --text: #000000;
            --border: rgba(0, 0, 0, 0.1); --muted: #636366;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: var(--text); font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        .app-viewport { width: 100%; max-width: 430px; background: var(--bg); height: 100%; position: relative; display: flex; flex-direction: column; }

        /* SCREENS */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding-bottom: 110px; overflow-y: auto; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; animation: iosSlide 0.3s cubic-bezier(0.15, 1, 0.3, 1); }
        @keyframes iosSlide { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* HEADER */
        .header { position: sticky; top: 0; padding: 18px 20px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); z-index: 100; }
        .logo { font-weight: 800; background: var(--primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 26px; letter-spacing: -1.2px; }

        /* POSTS */
        .post-card { padding: 16px; border-bottom: 0.5px solid var(--border); display: flex; gap: 14px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; flex-shrink: 0; cursor: pointer; }
        .post-main { flex: 1; }
        .post-user { font-weight: 700; font-size: 15px; margin-bottom: 3px; cursor: pointer; }
        .post-content { font-size: 15px; line-height: 1.4; margin-bottom: 12px; }

        /* PROFILE SPECIALS */
        .profile-hero { padding: 30px 20px; text-align: center; border-bottom: 0.5px solid var(--border); }
        .stat-grid { display: flex; justify-content: center; gap: 40px; margin: 20px 0; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: 800; }
        .stat-lab { font-size: 12px; color: var(--muted); text-transform: uppercase; }

        .btn-follow { width: 100%; max-width: 200px; padding: 10px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-follow.active { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-follow.not-active { background: var(--primary); color: white; }

        /* NAVBAR */
        .nav-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; height: 68px; background: var(--primary); border-radius: 34px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        .nav-item { color: white; opacity: 0.6; font-size: 10px; font-weight: 800; text-align: center; cursor: pointer; }
        .nav-item.active { opacity: 1; }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 2px; }

        /* AUTH */
        .auth-box { height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 40px; text-align: center; }
        .ios-input { width: 100%; padding: 18px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); color: white; margin-bottom: 15px; font-size: 16px; }
        .ios-btn { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; }

    </style>
</head>
<body>

<div class="app-viewport">

    <div id="scr-auth" class="screen active">
        <div class="auth-box">
            <div class="logo" style="font-size: 60px; margin-bottom: 40px;">INSTANT</div>
            <input id="login-user" class="ios-input" type="text" placeholder="Usuario">
            <button onclick="SocialApp.login()" class="ios-btn">Entrar</button>
        </div>
    </div>

    <div id="scr-feed" class="screen">
        <header class="header">
            <div class="logo">INSTANT</div>
            <div onclick="SocialApp.navigate('settings')" style="cursor:pointer">⚙️</div>
        </header>
        <div id="feed-container"></div>
    </div>

    <div id="scr-profile" class="screen">
        <header class="header">
            <div onclick="SocialApp.navigate('feed')" style="color:var(--ios-blue); cursor:pointer">← Volver</div>
            <div id="profile-title" class="logo" style="font-size:18px">PERFIL</div>
            <div style="width:40px"></div>
        </header>
        <div id="profile-ui"></div>
        <div id="profile-posts"></div>
    </div>

    <div id="scr-settings" class="screen">
        <header class="header">
            <div onclick="SocialApp.navigate('feed')" style="color:var(--ios-blue); cursor:pointer">← Atrás</div>
            <div class="logo">AJUSTES</div>
            <div style="width:40px"></div>
        </header>
        <div style="padding: 20px;">
            <button onclick="SocialApp.logout()" class="ios-btn" style="background:#FF3B30">Cerrar Sesión</button>
        </div>
    </div>

    <nav id="main-nav" class="nav-bar" style="display:none">
        <div class="nav-item active" onclick="SocialApp.navigate('feed')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            FEED
        </div>
        <div onclick="SocialApp.openComposer()" style="width:60px; height:60px; background:white; border-radius:50%; margin-top:-40px; display:flex; align-items:center; justify-content:center; color:#7A2C76; font-size:30px; border:6px solid var(--bg); cursor:pointer">+</div>
        <div class="nav-item" onclick="SocialApp.viewProfile(SocialApp.me)">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            YO
        </div>
    </nav>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain:"vozanonimasm.firebaseapp.com",
        projectId:"vozanonimasm"
    });
    const db = firebase.firestore();

    const SocialApp = {
        me: localStorage.getItem('inst_me'),
        
        init() {
            if(this.me) this.navigate('feed');
        },

        login() {
            const u = document.getElementById('login-user').value.trim().toLowerCase();
            if(u.length < 3) return;
            this.me = u;
            localStorage.setItem('inst_me', u);
            db.collection("users").doc(u).set({ username: u }, { merge: true });
            this.navigate('feed');
        },

        navigate(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-'+id).classList.add('active');
            document.getElementById('main-nav').style.display = (id === 'auth') ? 'none' : 'flex';
            if(id === 'feed') this.loadFeed();
        },

        // --- SISTEMA DE SEGUIDORES (REAL) ---
        async followUser(targetUser) {
            const followID = `${this.me}_${targetUser}`;
            const ref = db.collection("follows").doc(followID);
            const doc = await ref.get();

            if (!doc.exists) {
                // SEGUIR
                await ref.set({ follower: this.me, following: targetUser });
                this.updateCounter(this.me, 'following', 1);
                this.updateCounter(targetUser, 'followers', 1);
            } else {
                // DEJAR DE SEGUIR
                await ref.delete();
                this.updateCounter(this.me, 'following', -1);
                this.updateCounter(targetUser, 'followers', -1);
            }
            this.viewProfile(targetUser); // Refresh UI
        },

        updateCounter(user, field, inc) {
            db.collection("users").doc(user).update({
                [field]: firebase.firestore.FieldValue.increment(inc)
            });
        },

        // --- CARGA DE PERFIL DINÁMICO ---
        async viewProfile(username) {
            this.navigate('profile');
            const uDoc = await db.collection("users").doc(username).get();
            const data = uDoc.data() || { followers: 0, following: 0 };
            
            // Chequear si yo lo sigo
            const fDoc = await db.collection("follows").doc(`${this.me}_${username}`).get();
            const isFollowing = fDoc.exists;

            document.getElementById('profile-ui').innerHTML = `
                <div class="profile-hero">
                    <div class="avatar" style="width:80px; height:80px; margin:0 auto 15px; font-size:30px">
                        ${username.charAt(0).toUpperCase()}
                    </div>
                    <h2 style="margin:0">@${username}</h2>
                    <div class="stat-grid">
                        <div class="stat-item"><span class="stat-val">${data.followers || 0}</span><span class="stat-lab">Seguidores</span></div>
                        <div class="stat-item"><span class="stat-val">${data.following || 0}</span><span class="stat-lab">Seguidos</span></div>
                    </div>
                    ${username !== this.me ? `
                        <button onclick="SocialApp.followUser('${username}')" class="btn-follow ${isFollowing ? 'active' : 'not-active'}">
                            ${isFollowing ? 'Siguiendo' : 'Seguir'}
                        </button>
                    ` : ''}
                </div>
            `;
            this.loadUserPosts(username);
        },

        // --- FEED & POSTS ---
        loadFeed() {
            db.collection("posts").orderBy("created", "desc").limit(30).onSnapshot(snap => {
                const container = document.getElementById('feed-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    const el = document.createElement('div');
                    el.className = 'post-card';
                    el.innerHTML = `
                        <div class="avatar" onclick="SocialApp.viewProfile('${p.user}')">${p.user.charAt(0).toUpperCase()}</div>
                        <div class="post-main">
                            <div class="post-user" onclick="SocialApp.viewProfile('${p.user}')">@${p.user}</div>
                            <div class="post-content">${p.text}</div>
                        </div>
                    `;
                    container.appendChild(el);
                });
            });
        },

        loadUserPosts(u) {
            db.collection("posts").where("user", "==", u).get().then(snap => {
                const container = document.getElementById('profile-posts');
                container.innerHTML = `<p style="text-align:center; color:var(--muted); font-size:12px; margin-top:20px">POSTS DEL USUARIO</p>`;
                snap.forEach(doc => {
                    const p = doc.data();
                    container.innerHTML += `<div class="post-card"><div class="post-main"><div class="post-content">${p.text}</div></div></div>`;
                });
            });
        },

        openComposer() {
            const txt = prompt("¿Qué estás pensando?");
            if(txt) {
                db.collection("posts").add({
                    user: this.me,
                    text: txt,
                    created: Date.now()
                });
            }
        },

        logout() { localStorage.clear(); location.reload(); }
    };

    SocialApp.init();
</script>
</body>
</html>
