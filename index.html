<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INSTANT 𝕏 | Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette: X Premium Minimal */
            --bg: #000000;
            --s1: #0F0F0F;
            --s2: #161616;
            --t1: #FFFFFF;
            --t2: #71767B;
            --accent: #8B5CF6; /* Electric Purple */
            --glass: rgba(0, 0, 0, 0.85);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body.light-mode {
            --bg: #FFFFFF; --s1: #F7F9F9; --s2: #EFF3F4;
            --t1: #0F1419; --t2: #536471; --accent: #7C3AED;
            --glass: rgba(255, 255, 255, 0.85);
        }

        /* Optimization: GPU acceleration */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; transform: translateZ(0); }
        
        body { 
            margin: 0; background: var(--bg); color: var(--t1); 
            font-family: 'Inter', -apple-system, sans-serif; 
            height: 100vh; overflow: hidden; overscroll-behavior: none;
        }

        #app { 
            width: 100%; max-width: 500px; height: 100vh; 
            margin: 0 auto; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- SCREENS ENGINE --- */
        .screen { 
            position: absolute; inset: 0; display: none; flex-direction: column; 
            background: var(--bg); z-index: 10; 
            padding-bottom: calc(85px + var(--safe-bottom));
        }
        .screen.active { display: flex; animation: slideIn 0.35s cubic-bezier(0.15, 1, 0.3, 1); }
        
        @keyframes slideIn { 
            from { transform: translateX(15px); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }

        /* --- COMPONENTES: HEADER --- */
        .header { 
            height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100; border-bottom: 0.5px solid rgba(255,255,255,0.05);
        }
        .header h1 { font-size: 19px; font-weight: 800; letter-spacing: -0.8px; margin: 0; }

        /* --- COMPONENTES: FEED (ULTRA OPTIMIZED) --- */
        .feed { 
            flex: 1; overflow-y: auto; overflow-x: hidden; 
            -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }
        .feed::-webkit-scrollbar { display: none; }
        
        .post { 
            padding: 14px 18px; display: flex; gap: 12px; 
            transition: background 0.15s ease; cursor: pointer;
            border-bottom: 0.5px solid rgba(255,255,255,0.03);
        }
        .post:active { background: var(--s1); transform: scale(0.995); }

        .avatar { 
            width: 44px; height: 44px; border-radius: 50%; background: var(--s2); 
            display: flex; align-items: center; justify-content: center; font-weight: 800;
            color: var(--accent); flex-shrink: 0; font-size: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .p-body { flex: 1; min-width: 0; }
        .p-header { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
        .p-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-user { color: var(--t2); font-size: 14px; font-weight: 400; }
        .p-text { font-size: 15px; line-height: 1.5; color: var(--t1); word-wrap: break-word; }

        /* --- NAV BAR: FLOATING GLASS --- */
        .nav-bottom { 
            position: absolute; bottom: 0; width: 100%; 
            padding-bottom: var(--safe-bottom);
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; align-items: center;
            height: calc(75px + var(--safe-bottom)); border-top: 0.5px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }
        .nav-tab { 
            color: var(--t2); flex: 1; display: flex; flex-direction: column; 
            align-items: center; gap: 4px; cursor: pointer; transition: 0.2s;
        }
        .nav-tab.active { color: var(--t1); }
        .nav-tab svg { width: 24px; height: 24px; transition: transform 0.2s; }
        .nav-tab:active svg { transform: scale(0.85); }

        /* --- SPECIAL: FAB (Floating Action Button) --- */
        .fab { 
            width: 52px; height: 52px; background: var(--accent); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4); margin-top: -30px;
            border: 4px solid var(--bg); transition: 0.3s;
        }
        .fab:active { transform: scale(0.9) rotate(90deg); }

        /* --- SKELETON LOADER --- */
        .skeleton { 
            background: linear-gradient(90deg, var(--s1) 25%, var(--s2) 50%, var(--s1) 75%);
            background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 4px;
        }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    </style>
</head>
<body>

<div id="app">
    <div id="scr-auth" class="screen active" style="justify-content:center; align-items:center; padding:40px;">
        <div style="font-size: 55px; font-weight: 900; margin-bottom: 8px;">𝕏</div>
        <p style="color:var(--t2); font-weight:500; margin-bottom:40px;">Instant Premium Social</p>
        <input id="login-input" style="width:100%; padding:18px; background:var(--s1); border:1px solid rgba(255,255,255,0.1); border-radius:14px; color:white; margin-bottom:12px; font-size:16px;" placeholder="Tu @usuario">
        <button onclick="Core.Auth.login()" style="width:100%; padding:18px; background:var(--t1); border:none; border-radius:14px; color:var(--bg); font-weight:800; font-size:16px; cursor:pointer;">Continuar</button>
    </div>

    <div id="scr-feed" class="screen">
        <header class="header">
            <h1>Inicio</h1>
            <div onclick="Core.Router.go('settings')" style="cursor:pointer; padding:5px;">⚙️</div>
        </header>
        <div id="feed-wall" class="feed">
            <div class="post"><div class="avatar skeleton"></div><div class="p-body"><div class="skeleton" style="height:12px; width:40%; margin-bottom:8px"></div><div class="skeleton" style="height:40px; width:90%"></div></div></div>
            <div class="post"><div class="avatar skeleton"></div><div class="p-body"><div class="skeleton" style="height:12px; width:40%; margin-bottom:8px"></div><div class="skeleton" style="height:40px; width:90%"></div></div></div>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <header class="header">
            <div onclick="Core.Router.back()" style="cursor:pointer; font-weight:800; font-size:18px">←</div>
            <h1 id="p-title-nav">Perfil</h1>
            <div style="width:20px"></div>
        </header>
        <div id="profile-head" style="padding:20px; border-bottom:0.5px solid rgba(255,255,255,0.05)"></div>
        <div id="profile-posts" class="feed"></div>
    </div>

    <div id="scr-settings" class="screen">
        <header class="header"><div onclick="Core.Router.back()" style="cursor:pointer">←</div><h1>Ajustes</h1><div style="width:20px"></div></header>
        <div style="padding:15px">
            <div style="background:var(--s1); border-radius:20px; overflow:hidden">
                <div class="post" onclick="Core.UI.toggleTheme()" style="justify-content:space-between; align-items:center; border:none">
                    <span>Modo Oscuro</span>
                    <div id="theme-status" style="color:var(--accent); font-weight:700">ON</div>
                </div>
                <div class="post" onclick="Core.Auth.logout()" style="color:#F91880; border:none">Cerrar Sesión</div>
            </div>
        </div>
    </div>

    <nav id="nav-main" class="nav-bottom" style="display:none">
        <div class="nav-tab active" onclick="Core.Router.go('feed')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/></svg>
        </div>
        <div onclick="Core.Social.newPost()" class="fab">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
        <div class="nav-tab" onclick="Core.Router.goProfile(Core.State.me)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    // 🔥 FIREBASE INIT
    firebase.initializeApp({
        apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain: "vozanonimasm.firebaseapp.com",
        projectId: "vozanonimasm"
    });
    const db = firebase.firestore();

    const Core = {
        State: {
            me: localStorage.getItem('_inst_session'),
            history: ['feed'],
            isDark: true,
            postCache: []
        },

        UI: {
            toggleTheme() {
                Core.State.isDark = !Core.State.isDark;
                document.body.classList.toggle('light-mode');
                document.getElementById('theme-status').innerText = Core.State.isDark ? 'ON' : 'OFF';
            }
        },

        Router: {
            go(id) {
                const screens = document.querySelectorAll('.screen');
                screens.forEach(s => s.classList.remove('active'));
                
                const target = document.getElementById('scr-' + id);
                target.classList.add('active');
                
                const nav = document.getElementById('nav-main');
                nav.style.display = (id === 'auth') ? 'none' : 'flex';

                // Update active tab visual
                document.querySelectorAll('.nav-tab').forEach((t, i) => {
                    t.classList.toggle('active', (id === 'feed' && i === 0) || (id === 'profile' && i === 1));
                });

                if(id === 'feed') Core.Social.listenFeed();
                if(id !== Core.State.history[Core.State.history.length-1]) Core.State.history.push(id);
            },
            back() {
                if(Core.State.history.length > 1) {
                    Core.State.history.pop();
                    this.go(Core.State.history[Core.State.history.length-1]);
                }
            },
            goProfile(u) {
                this.go('profile');
                Core.Social.loadProfile(u);
            }
        },

        Social: {
            listenFeed() {
                // Optimized Snapshot: Only processes diffs
                db.collection("posts").orderBy("created", "desc").limit(30).onSnapshot(snap => {
                    const wall = document.getElementById('feed-wall');
                    if (snap.metadata.hasPendingWrites) return; // Ignore optimistic local updates to prevent double render

                    wall.innerHTML = "";
                    snap.forEach(doc => {
                        const p = doc.data();
                        const el = document.createElement('div');
                        el.className = 'post';
                        el.onclick = () => console.log("Open post:", doc.id);
                        el.innerHTML = `
                            <div class="avatar" onclick="event.stopPropagation(); Core.Router.goProfile('${p.user}')">${p.user[0].toUpperCase()}</div>
                            <div class="p-body">
                                <div class="p-header">
                                    <span class="p-name">${p.user}</span>
                                    <span class="p-user">@${p.user}</span>
                                </div>
                                <div class="p-text">${p.text}</div>
                            </div>
                        `;
                        wall.appendChild(el);
                    });
                });
            },

            async loadProfile(u) {
                document.getElementById('p-title-nav').innerText = `@${u}`;
                const userDoc = await db.collection("users").doc(u).get();
                const d = userDoc.data() || { bio: "Digital Native." };
                
                document.getElementById('profile-head').innerHTML = `
                    <div style="display:flex; align-items:center; gap:20px;">
                        <div class="avatar" style="width:75px; height:75px; font-size:28px; background:var(--accent); color:white;">${u[0].toUpperCase()}</div>
                        <div>
                            <div style="font-size:22px; font-weight:800;">@${u}</div>
                            <div style="color:var(--t2); font-size:14px;">${d.bio}</div>
                        </div>
                    </div>
                `;

                db.collection("posts").where("user", "==", u).get().then(snap => {
                    const wall = document.getElementById('profile-posts');
                    wall.innerHTML = "";
                    snap.forEach(doc => {
                        const p = doc.data();
                        const el = document.createElement('div');
                        el.className = 'post';
                        el.innerHTML = `<div class="avatar">${u[0].toUpperCase()}</div><div class="p-body"><div class="p-header"><span class="p-name">${u}</span></div><div class="p-text">${p.text}</div></div>`;
                        wall.appendChild(el);
                    });
                });
            },

            newPost() {
                const txt = prompt("¿Qué está pasando?");
                if(txt && txt.trim().length > 0) {
                    db.collection("posts").add({
                        user: Core.State.me,
                        text: txt,
                        created: Date.now(),
                        likes: 0
                    });
                }
            }
        },

        Auth: {
            login() {
                const u = document.getElementById('login-input').value.trim().toLowerCase();
                if(u.length < 3) return alert("Usuario inválido");
                Core.State.me = u;
                localStorage.setItem('_inst_session', u);
                db.collection("users").doc(u).set({ u }, { merge: true });
                Core.Router.go('feed');
            },
            logout() { localStorage.clear(); location.reload(); }
        }
    };

    // BOOT
    if(Core.State.me) Core.Router.go('feed');
</script>
</body>
</html>
