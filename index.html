<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𝕏 | NEXUS MATRIX V24</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000; --surface: #0A0A0A; --border: #1F1F1F;
            --accent: #D4AF37; --text: #FFF; --text-dim: #71767B;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        #nexus-root {
            width: 100%; max-width: 500px; height: 100vh; margin: 0 auto;
            border-inline: 1px solid var(--border); display: flex; flex-direction: column; position: relative;
        }

        /* HEADER */
        .nx-header {
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000;
        }
        .nx-logo { font-weight: 900; color: var(--accent); font-size: 22px; }

        /* FEED & POSTS */
        .scroller { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }

        .nx-post { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nx-avatar { width: 42px; height: 42px; border-radius: 50%; background: #222; flex-shrink: 0; overflow: hidden; }
        .nx-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .nx-content { flex: 1; }
        .nx-user-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .nx-name { font-weight: 800; font-size: 15px; color: #fff; }
        .nx-handle { color: var(--text-dim); font-weight: 400; font-size: 14px; }

        /* BOTÓN SEGUIR (DINÁMICO) */
        .btn-follow {
            padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 13px;
            cursor: pointer; transition: 0.2s; border: 1px solid #fff; background: #fff; color: #000;
        }
        .btn-follow.active { background: transparent; color: #fff; border-color: #555; }
        .btn-follow.active::after { content: 'Siguiendo'; }
        .btn-follow:not(.active)::after { content: 'Seguir'; }

        /* NAVEGACIÓN */
        .nx-nav {
            height: calc(65px + var(--safe-bottom)); padding-bottom: var(--safe-bottom);
            background: #000; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-icon { color: var(--text-dim); transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-icon.active { color: var(--accent); }
        .nav-icon span { font-size: 9px; font-weight: 700; text-transform: uppercase; }

        /* MODAL REDACTAR */
        .nx-modal { position: absolute; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
        .nx-modal.active { display: flex; }
        .nx-input { width: 100%; height: 100%; background: transparent; border: none; color: #fff; padding: 20px; font-size: 19px; outline: none; resize: none; }

        /* TOAST */
        .nx-toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 10px 20px; border-radius: 30px;
            font-weight: 800; font-size: 13px; display: none; z-index: 10000;
        }
    </style>
</head>
<body>

<div id="nx-toast" class="nx-toast"></div>

<div id="nexus-root">
    <header class="nx-header">
        <div class="nx-avatar" style="width:32px; height:32px" onclick="Nexus.Router.go('profile')"></div>
        <div class="nx-logo">NEXUS</div>
        <div style="width:32px"></div>
    </header>

    <main style="flex:1; position:relative; overflow:hidden">
        <section id="v-home" class="view" style="display:none">
            <div id="global-feed" class="scroller"></div>
            <div style="position:absolute; bottom:20px; right:20px; width:56px; height:56px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 20px rgba(0,0,0,0.4)" onclick="Nexus.UI.modal(true)">
                <svg width="24" height="24" fill="#000" viewBox="0 0 24 24"><path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L4.32 8.909A2.25 2.25 0 013.25 6.993V6.75"/></svg>
            </div>
        </section>

        <section id="v-following" class="view" style="display:none">
            <div style="padding:15px; border-bottom:1px solid var(--border); font-weight:800; color:var(--accent)">TU RED DE CONTACTOS</div>
            <div id="following-feed" class="scroller"></div>
        </section>

        <section id="v-profile" class="view" style="display:none">
            <div class="scroller">
                <div style="height:100px; background:#111"></div>
                <div style="padding:0 15px; margin-top:-40px">
                    <div id="p-avatar" class="nx-avatar" style="width:80px; height:80px; border:4px solid #000"></div>
                    <h2 id="p-name" style="margin-top:10px"></h2>
                    <p id="p-handle" style="color:var(--text-dim)"></p>
                    <div style="display:flex; gap:20px; margin-top:15px">
                        <span><b id="count-following">0</b> <span style="color:var(--text-dim)">Siguiendo</span></span>
                        <span><b id="count-followers">852</b> <span style="color:var(--text-dim)">Seguidores</span></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="nx-nav">
        <div class="nav-icon" id="n-home" onclick="Nexus.Router.go('home')"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Inicio</span></div>
        <div class="nav-icon" id="n-following" onclick="Nexus.Router.go('following')"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span>Siguiendo</span></div>
        <div class="nav-icon" id="n-profile" onclick="Nexus.Router.go('profile')"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Yo</span></div>
    </nav>

    <div id="m-write" class="nx-modal">
        <header class="nx-header">
            <div onclick="Nexus.UI.modal(false)">Cancelar</div>
            <button class="btn-follow" style="background:var(--accent); border:none" onclick="Nexus.Social.post()">Publicar</button>
        </header>
        <textarea id="nx-post-in" class="nx-input" placeholder="¿Qué está pasando en la Matrix?"></textarea>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/**
 * [NEXUS MATRIX V24 - SOCIAL CORE]
 */
firebase.initializeApp({ apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU", authDomain: "vozanonimasm.firebaseapp.com", projectId: "vozanonimasm" });
const db = firebase.firestore();

const Nexus = {
    State: {
        user: {
            id: localStorage.getItem('nx_id') || 'jscol_dev',
            name: 'Jhossue Borrero',
            following: JSON.parse(localStorage.getItem('nx_following')) || []
        },
        activeView: localStorage.getItem('nx_view') || 'home'
    },

    Router: {
        go(view) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById('v-' + view).style.display = 'flex';
            
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('n-' + view).classList.add('active');
            
            Nexus.State.activeView = view;
            localStorage.setItem('nx_view', view);
            if(view === 'home') Nexus.Social.renderFeed('global-feed');
            if(view === 'following') Nexus.Social.renderFeed('following-feed', true);
            if(view === 'profile') Nexus.UI.syncProfile();
        }
    },

    Social: {
        toggleFollow(targetHandle, btn) {
            let list = Nexus.State.user.following;
            const index = list.indexOf(targetHandle);
            
            if (index > -1) {
                list.splice(index, 1);
                btn.classList.remove('active');
                Nexus.UI.toast("Dejaste de seguir a @" + targetHandle);
            } else {
                list.push(targetHandle);
                btn.classList.add('active');
                Nexus.UI.toast("Siguiendo a @" + targetHandle);
            }
            
            Nexus.State.user.following = list;
            localStorage.setItem('nx_following', JSON.stringify(list));
            Nexus.UI.syncProfile();
        },

        renderFeed(containerId, filtered = false) {
            const container = document.getElementById(containerId);
            db.collection("posts").orderBy("created", "desc").limit(30).onSnapshot(snap => {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    const isFollowing = Nexus.State.user.following.includes(p.user);
                    
                    if (filtered && !isFollowing) return;

                    const el = document.createElement('div');
                    el.className = 'nx-post';
                    el.innerHTML = `
                        <div class="nx-avatar">${p.user[0].toUpperCase()}</div>
                        <div class="nx-content">
                            <div class="nx-user-row">
                                <div>
                                    <span class="nx-name">${p.name || p.user}</span>
                                    <span class="nx-handle">@${p.user}</span>
                                </div>
                                ${p.user !== Nexus.State.user.id ? 
                                    `<button class="btn-follow ${isFollowing ? 'active' : ''}" onclick="Nexus.Social.toggleFollow('${p.user}', this)"></button>` : ''}
                            </div>
                            <div style="margin-top:5px; line-height:1.4">${p.text}</div>
                        </div>`;
                    container.appendChild(el);
                });
            });
        },

        post() {
            const txt = document.getElementById('nx-post-in').value;
            if(!txt) return;
            db.collection("posts").add({
                user: Nexus.State.user.id,
                name: Nexus.State.user.name,
                text: txt,
                created: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                Nexus.UI.modal(false);
                document.getElementById('nx-post-in').value = "";
                Nexus.UI.toast("HILO PUBLICADO");
            });
        }
    },

    UI: {
        syncProfile() {
            document.getElementById('p-name').innerText = Nexus.State.user.name;
            document.getElementById('p-handle').innerText = '@' + Nexus.State.user.id;
            document.getElementById('count-following').innerText = Nexus.State.user.following.length;
        },
        modal(show) { document.getElementById('m-write').classList.toggle('active', show); },
        toast(msg) {
            const t = document.getElementById('nx-toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }
    }
};

window.onload = () => {
    Nexus.Router.go(Nexus.State.activeView);
    Nexus.UI.syncProfile();
};
</script>
</body>
</html>
