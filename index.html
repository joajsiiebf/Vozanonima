<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSTANT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ================= THEME ================= */
:root{
  --bg:#0b0b10;
  --card:#15151c;
  --text:#ffffff;
  --muted:#9ca3af;
  --accent:#7c3aed;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= SCREEN SYSTEM ================= */
.screen{
  display:none;
  height:100vh;
  overflow:auto;
  animation:fade .25s ease;
}

.screen.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* ================= HEADER GLASS ================= */
.header{
  padding:16px;
  font-weight:800;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* ================= BUTTONS ================= */
.btn{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:12px;
  font-weight:600;
  transition:.2s;
}

.btn:active{
  transform:scale(0.96);
  opacity:0.8;
}

.btn-outline{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:10px 14px;
  border-radius:12px;
}

/* ================= INPUT ================= */
.input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  background:#15151c;
  border:1px solid rgba(255,255,255,0.08);
  color:white;
}

.input:focus{
  border-color:var(--accent);
  outline:none;
  box-shadow:0 0 10px rgba(124,58,237,0.25);
}

/* ================= POSTS ================= */
.post{
  margin:10px;
  padding:14px;
  background:var(--card);
  border-radius:16px;
  transition:.2s;
}

.post:active{
  transform:scale(0.98);
  opacity:0.8;
}

/* ================= NAV ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:64px;
  background:rgba(20,20,25,0.7);
  backdrop-filter:blur(25px);
  border-radius:30px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid rgba(255,255,255,0.08);
}

.nav div{
  font-size:12px;
  font-weight:600;
  opacity:.8;
  transition:.2s;
}

.nav div:active{
  transform:scale(0.9);
  opacity:1;
}

/* ================= PROFILE ================= */
.profile{
  padding:16px;
}

.big{
  font-size:22px;
  font-weight:800;
}

.muted{
  color:var(--muted);
}

/* ================= WELCOME ================= */
.welcome{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
}

.logo{
  font-size:42px;
  font-weight:800;
  text-align:center;
  margin-bottom:40px;
  color:var(--accent);
  text-shadow:0 0 25px rgba(124,58,237,0.4);
}

</style>
</head>

<body>

<!-- ================= WELCOME ================= -->
<div id="welcome" class="screen active">
  <div class="welcome">
    <div class="logo">INSTANT</div>

    <button class="btn" onclick="go('login')">Crear cuenta</button>
    <button class="btn-outline" onclick="go('login')" style="margin-top:10px">Iniciar sesión</button>
  </div>
</div>

<!-- ================= LOGIN ================= -->
<div id="login" class="screen">

  <div class="header">
    <div onclick="go('welcome')">←</div>
    LOGIN
  </div>

  <div style="padding:16px">

    <input id="user" class="input" placeholder="Usuario">

    <button class="btn" onclick="login()">Entrar</button>

  </div>

</div>

<!-- ================= FEED ================= -->
<div id="feed" class="screen">

  <div class="header">
    <div>INSTANT</div>
    <button class="btn" onclick="go('settings')">⚙</button>
  </div>

  <div id="feedBox"></div>

</div>

<!-- ================= PROFILE ================= -->
<div id="profile" class="screen">

  <div class="header">
    <div onclick="go('feed')">←</div>
    PERFIL
  </div>

  <div class="profile">
    <div class="big" id="username"></div>
    <div class="muted">Seguidores: 110000</div>
    <div class="muted">Siguiendo: 0</div>
  </div>

</div>

<!-- ================= SETTINGS ================= -->
<div id="settings" class="screen">

  <div class="header">
    <div onclick="go('feed')">←</div>
    SETTINGS
  </div>

  <div style="padding:16px">
    <button class="btn" onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<!-- ================= NAV ================= -->
<div class="nav">
  <div onclick="go('feed')">Home</div>
  <div onclick="go('profile')">Perfil</div>
  <div onclick="createPost()">+</div>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain:"vozanonimasm.firebaseapp.com",
  projectId:"vozanonimasm"
});

const db=firebase.firestore();

/* ================= STATE ================= */
let me = localStorage.getItem("user");

/* ================= ROUTER ================= */
function go(id){

  document.querySelectorAll(".screen")
  .forEach(s=>s.classList.remove("active"));

  document.getElementById(id).classList.add("active");

  if(id==="feed") loadFeed();
  if(id==="profile") loadProfile();

}

/* ================= LOGIN ================= */
function login(){

  let u=user.value;
  if(!u) return;

  me=u;
  localStorage.setItem("user",u);

  go("feed");

}

/* ================= FEED ================= */
function loadFeed(){

  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{

    let html="";

    s.forEach(d=>{
      let p=d.data();

      html+=`
      <div class="post">
        <b>@${p.username}</b>
        <div>${p.text}</div>
      </div>`;
    });

    feedBox.innerHTML=html;

  });

}

/* ================= POST ================= */
function createPost(){

  let t=prompt("Post");
  if(!t) return;

  db.collection("posts").add({
    username:me||"guest",
    text:t,
    created:Date.now()
  });

}

/* ================= PROFILE ================= */
function loadProfile(){
  username.innerText = me || "guest";
}

/* ================= LOGOUT ================= */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* ================= INIT ================= */
if(me){
  go("feed");
}else{
  go("welcome");
}

loadFeed();

</script>

</body>
</html>
