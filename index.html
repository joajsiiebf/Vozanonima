<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INSTANT - Real Time App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-metallic: linear-gradient(135deg, #C04FBA 0%, #7A2C76 100%);
            --bg: #000000;
            --card: #1C1C1E;
            --text: #FFFFFF;
            --border: rgba(255, 255, 255, 0.12);
            --muted: #8E8E93;
            --glass: rgba(15, 15, 15, 0.85);
            --ios-blue: #0A84FF;
        }

        body.light-mode {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #000000;
            --border: rgba(0, 0, 0, 0.1);
            --muted: #636366;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, system-ui, 'Inter', sans-serif;
            background-color: #000;
            color: var(--text);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .app-viewport {
            width: 100%;
            max-width: 430px;
            background: var(--bg);
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ================= HEADERS ================= */
        .header {
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--border);
            z-index: 100;
        }

        .logo-text {
            font-weight: 800;
            background: var(--primary-metallic);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            letter-spacing: -1px;
        }

        /* ================= SCREENS ================= */
        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            padding-bottom: 110px;
            overflow-y: auto;
            background: var(--bg);
        }

        .screen.active { display: flex; animation: fadeIn 0.2s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* ================= FEED SYSTEM ================= */
        .post-card {
            padding: 16px;
            border-bottom: 0.5px solid var(--border);
            display: flex;
            gap: 12px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 45px; height: 45px;
            border-radius: 50%;
            background: var(--primary-metallic);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold;
        }

        .post-content { flex: 1; }
        .post-header { font-weight: 700; font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .post-text { font-size: 15px; line-height: 1.5; color: var(--text); margin-bottom: 12px; white-space: pre-wrap; }
        .hashtag { color: #C04FBA; font-weight: 600; }

        .post-actions { display: flex; gap: 25px; }
        .action-item { 
            display: flex; align-items: center; gap: 6px; 
            color: var(--muted); font-size: 13px; cursor: pointer; 
            transition: 0.2s;
        }
        .action-item:active { transform: scale(1.2); }
        .action-item svg { width: 18px; height: 18px; }

        /* ================= NAVIGATION ================= */
        .nav-island {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 68px;
            background: var(--primary-metallic);
            border-radius: 34px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            z-index: 1000;
        }

        .nav-link { color: white; opacity: 0.7; font-size: 10px; font-weight: 700; text-align: center; cursor: pointer; }
        .nav-link.active { opacity: 1; }
        .nav-link svg { display: block; margin: 0 auto 3px; width: 24px; height: 24px; }

        .add-btn {
            width: 60px; height: 60px;
            background: white; border-radius: 50%;
            margin-top: -40px; border: 5px solid var(--bg);
            display: flex; align-items: center; justify-content: center;
            color: #7A2C76; font-size: 30px; font-weight: bold;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        /* ================= MODALS ================= */
        .composer-modal {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 2000; display: none; flex-direction: column;
        }

        .composer-header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 0.5px solid var(--border);
        }

        .composer-input {
            flex: 1; padding: 20px; border: none; background: transparent;
            color: var(--text); font-size: 18px; resize: none;
        }

        /* ================= SETTINGS ================= */
        .settings-row {
            padding: 16px 20px; background: var(--card);
            border-bottom: 0.5px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }

        .toggle-ios {
            width: 50px; height: 30px; background: #39393D;
            border-radius: 15px; position: relative; transition: 0.3s;
        }
        .toggle-ios.on { background: #34C759; }
        .toggle-ios::after {
            content: ''; position: absolute; width: 26px; height: 26px;
            background: white; border-radius: 50%; top: 2px; left: 2px;
            transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .toggle-ios.on::after { left: 22px; }

    </style>
</head>
<body>

<div class="app-viewport">

    <div id="scr-login" class="screen active" style="justify-content: center;">
        <div style="padding: 40px; text-align: center;">
            <div class="logo-text" style="font-size: 50px; margin-bottom: 10px;">INSTANT</div>
            <input id="auth-user" type="text" placeholder="Usuario" style="width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); color: white; margin-bottom: 15px;">
            <button onclick="login()" style="width:100%; padding: 16px; border-radius: 14px; border:none; background: var(--primary-metallic); color: white; font-weight: 700; cursor: pointer;">Entrar</button>
        </div>
    </div>

    <div id="scr-feed" class="screen">
        <header class="header">
            <div class="logo-text">INSTANT</div>
            <div onclick="navigate('profile')" style="cursor: pointer; font-size: 20px;">👤</div>
        </header>
        <div id="feed-container"></div>
    </div>

    <div id="scr-profile" class="screen">
        <header class="header">
            <div onclick="navigate('feed')" style="color: var(--ios-blue); cursor: pointer;">← Inicio</div>
            <div class="logo-text">PERFIL</div>
            <div onclick="navigate('settings')" style="cursor: pointer;">⚙️</div>
        </header>
        <div style="text-align: center; padding: 40px 20px;">
            <div class="avatar" style="width: 100px; height: 100px; margin: 0 auto 20px; font-size: 32px;"></div>
            <h2 id="prof-user" style="margin: 0;">@username</h2>
            <div style="display: flex; justify-content: center; gap: 40px; margin-top: 30px;">
                <div><b>110K</b><br><small class="muted">Seguidores</small></div>
                <div><b>0</b><br><small class="muted">Posts</small></div>
            </div>
        </div>
    </div>

    <div id="scr-settings" class="screen">
        <header class="header">
            <div onclick="navigate('profile')" style="color: var(--ios-blue); cursor: pointer;">← Atrás</div>
            <div class="logo-text">AJUSTES</div>
            <div style="width:40px"></div>
        </header>
        <div style="margin-top: 20px;">
            <div class="settings-row" onclick="toggleTheme()">
                <span>Modo Oscuro</span>
                <div id="theme-toggle" class="toggle-ios on"></div>
            </div>
            <div class="settings-row" onclick="logout()" style="color: #FF3B30; font-weight: 600; margin-top: 30px;">
                <span>Cerrar Sesión</span>
            </div>
        </div>
    </div>

    <div class="nav-island" id="main-nav" style="display: none;">
        <div class="nav-link active" onclick="navigate('feed')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            INICIO
        </div>
        <div class="add-btn" onclick="openComposer()">+</div>
        <div class="nav-link" onclick="navigate('profile')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            PERFIL
        </div>
    </div>

    <div class="composer-modal" id="composer">
        <div class="composer-header">
            <span onclick="closeComposer()" style="color: var(--ios-blue); cursor: pointer;">Cancelar</span>
            <button onclick="publishPost()" style="background: var(--primary-metallic); border: none; padding: 8px 20px; border-radius: 20px; color: white; font-weight: 700;">Publicar</button>
        </div>
        <textarea id="post-text" class="composer-input" placeholder="¿Qué está pasando?"></textarea>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain:"vozanonimasm.firebaseapp.com",
        projectId:"vozanonimasm"
    });
    const db = firebase.firestore();
    let me = localStorage.getItem("user");

    function navigate(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        document.getElementById('main-nav').style.display = (id === 'login') ? 'none' : 'flex';
        
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(id === 'feed') document.querySelectorAll('.nav-link')[0].classList.add('active');
        if(id === 'profile') document.querySelectorAll('.nav-link')[1].classList.add('active');

        if(id === 'feed') syncFeed();
        if(id === 'profile') document.getElementById('prof-user').innerText = '@' + me;
    }

    function syncFeed() {
        db.collection("posts").orderBy("created", "desc").onSnapshot(snapshot => {
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                const likes = data.likes || 0;
                
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="avatar">${data.username.charAt(0).toUpperCase()}</div>
                    <div class="post-content">
                        <div class="post-header">@${data.username} <span style="color:#0A84FF; font-size:12px;">●</span></div>
                        <div class="post-text">${format(data.text)}</div>
                        <div class="post-actions">
                            <div class="action-item" onclick="handleLike('${id}', ${likes})">
                                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                <b>${likes}</b>
                            </div>
                            <div class="action-item">💬 0</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    }

    function format(t) { return t.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>'); }

    function handleLike(postId, current) {
        db.collection("posts").doc(postId).update({ likes: current + 1 });
    }

    function openComposer() { document.getElementById('composer').style.display = 'flex'; document.getElementById('post-text').focus(); }
    function closeComposer() { document.getElementById('composer').style.display = 'none'; }

    function publishPost() {
        const txt = document.getElementById('post-text').value;
        if(!txt) return;
        db.collection("posts").add({
            username: me,
            text: txt,
            likes: 0,
            created: Date.now()
        }).then(() => {
            document.getElementById('post-text').value = "";
            closeComposer();
        });
    }

    function toggleTheme() {
        const body = document.body;
        const toggle = document.getElementById('theme-toggle');
        body.classList.toggle('light-mode');
        toggle.classList.toggle('on');
        localStorage.setItem("theme", body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    function login() {
        const u = document.getElementById('auth-user').value;
        if(!u) return;
        me = u;
        localStorage.setItem("user", u);
        navigate('feed');
    }

    function logout() { localStorage.clear(); location.reload(); }

    if(localStorage.getItem("theme") === 'light') toggleTheme();
    if(me) navigate('feed'); else navigate('login');

</script>
</body>
</html>
