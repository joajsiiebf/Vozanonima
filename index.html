<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social App</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- LOGIN VIEW -->
<div id="loginView" class="view active">
  <div class="card center">
    <h1>Bienvenido</h1>

    <input id="loginPhone" placeholder="Teléfono">
    <input id="loginPass" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <p class="muted">o crea una cuenta</p>

    <input id="regUser" placeholder="Username">
    <input id="regPhone" placeholder="Teléfono">
    <input id="regPass" type="password" placeholder="Contraseña">

    <button class="secondary" onclick="register()">Crear cuenta</button>
  </div>
</div>

<!-- APP VIEW -->
<div id="appView" class="view">

  <header class="topbar">
    <span id="title">Inicio</span>
  </header>

  <!-- FEED -->
  <section id="feedView" class="screen active"></section>

  <!-- SEARCH -->
  <section id="searchView" class="screen hidden">
    <input id="searchInput" placeholder="Buscar usuarios..." oninput="searchUsers()">
    <div id="searchResults"></div>
  </section>

  <!-- PROFILE -->
  <section id="profileView" class="screen hidden"></section>

  <!-- SETTINGS -->
  <section id="settingsView" class="screen hidden">
    <button onclick="toggleTheme()">Modo oscuro/claro</button>
    <button onclick="logout()">Cerrar sesión</button>
  </section>

  <!-- POST INPUT -->
  <div class="composer">
    <input id="postText" placeholder="¿Qué estás pensando?">
    <button onclick="createPost()">Publicar</button>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button onclick="go('feedView','Inicio')">Inicio</button>
    <button onclick="go('searchView','Buscar')">Buscar</button>
    <button onclick="go('profileView','Perfil')">Perfil</button>
    <button onclick="go('settingsView','Ajustes')">Ajustes</button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
