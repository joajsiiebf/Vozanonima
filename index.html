<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS X-ENGINE V27</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000; --surface: #0A0A0A; --accent: #D4AF37; --border: #1F1F1F;
            --text: #fff; --dim: #71767B; --verify: #1D9BF0; --gold: #D4AF37;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; height: 100%; }

        /* --- UI ARCHITECTURE --- */
        #app-shell { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; border-inline: 1px solid var(--border); display: flex; flex-direction: column; position: relative; background: #000; }
        .view { flex: 1; overflow-y: auto; display: none; padding-bottom: 90px; }
        .view.active { display: block; animation: viewFade 0.3s ease; }
        @keyframes viewFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PREMIUM HEADER --- */
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 100; sticky; top: 0; }
        .nx-logo { font-weight: 900; font-size: 20px; color: var(--accent); letter-spacing: -1px; display: flex; align-items: center; gap: 4px; }
        
        /* --- POST CARDS STYLE X --- */
        .post { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #222; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 1px solid var(--border); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .p-content { flex: 1; }
        .p-header { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
        .p-name { font-weight: 800; font-size: 15px; }
        .p-handle { color: var(--dim); font-size: 14px; }
        .verify-badge { width: 16px; height: 16px; fill: var(--gold); }
        .p-body { font-size: 15px; line-height: 1.5; color: #e7e9ea; }

        /* --- PROFILE VIEW --- */
        .profile-hero { height: 140px; background: #161616; position: relative; }
        .profile-avatar-box { padding: 0 16px; margin-top: -45px; display: flex; justify-content: space-between; align-items: flex-end; }
        .avatar-main { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #000; background: #222; overflow: hidden; position: relative; }
        .btn-edit { border: 1px solid var(--border); background: transparent; color: #fff; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 14px; }

        /* --- SETTINGS PANEL --- */
        .settings-item { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .settings-label { font-weight: 600; font-size: 15px; }
        .input-premium { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: #fff; margin-top: 8px; font-size: 15px; outline: none; }
        .input-premium:focus { border-color: var(--accent); }

        /* --- NAVBAR MODERNA --- */
        nav { height: 65px; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; background: #000; position: absolute; bottom: 0; width: 100%; padding-bottom: env(safe-area-inset-bottom); }
        .nav-link { color: var(--dim); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .nav-link.active { color: var(--accent); }

        /* --- TOAST & NOTIF --- */
        #toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 8px 20px; border-radius: 20px; font-weight: 800; font-size: 13px; z-index: 10000; display: none; box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
    </style>
</head>
<body>

<div id="toast">MENSAJE DE SISTEMA</div>

<div id="app-shell">
    <header>
        <div class="nx-logo">NEXUS <span style="font-size: 10px; color: var(--dim); font-weight: 400;">X-ENGINE</span></div>
        <div id="loading-spinner" style="display:none; width:16px; height:16px; border:2px solid var(--accent); border-top-color:transparent; border-radius:50%; animation: spin 0.8s linear infinite;"></div>
    </header>

    <section id="v-home" class="view active">
        <div id="main-feed"></div>
    </section>

    <section id="v-profile" class="view">
        <div class="profile-hero" id="p-banner-ui"></div>
        <div class="profile-avatar-box">
            <div class="avatar-main" id="p-avatar-ui"></div>
            <button class="btn-edit" onclick="Nexus.Router.go('settings')">Configurar</button>
        </div>
        <div style="padding: 12px 16px;">
            <div style="display:flex; align-items:center; gap:4px">
                <h1 id="p-name-ui" style="font-size:22px; font-weight:900">Jhossue Borrero</h1>
                <svg id="p-verify-ui" class="verify-badge" style="display:none" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.88-2.95-2.18-3.66.15-.44.23-.91.23-1.4 0-2.22-1.81-4.02-4.04-4.02-.48 0-.95.08-1.38.24C14.42 2.37 13.06 1.5 11.5 1.5c-1.56 0-2.92.87-3.63 2.15-.44-.16-.91-.24-1.38-.24-2.23 0-4.03 1.8-4.03 4.02 0 .49.08.96.23 1.41C1.38 9.55.5 10.92.5 12.5c0 1.58.88 2.95 2.18 3.66-.15.44-.23.91-.23 1.4 0 2.22 1.81 4.02 4.04 4.02.48 0 .95-.08 1.38-.24 1.43 1.3 2.79 2.15 4.34 2.15 1.56 0 2.92-.87 3.63-2.15.44.16.91.24 1.38.24 2.23 0 4.03-1.8 4.03-4.02 0-.49-.08-.96-.23-1.41 1.3-.71 2.18-2.08 2.18-3.66zM9.91 17.39l-4.76-4.76L6.58 11.2l3.33 3.33 7.05-7.05 1.43 1.43-8.48 8.48z"/></svg>
            </div>
            <p id="p-handle-ui" style="color:var(--dim); font-size:15px">@jscol_dev</p>
            <p id="p-bio-ui" style="margin-top:12px; font-size:15px; line-height:1.4">Aspiring Psychology student | Technical Developer | JSCOL Creator</p>
            
            <div style="display:flex; gap:16px; margin-top:16px; font-size:14px">
                <span><b id="c-following">0</b> <span style="color:var(--dim)">Siguiendo</span></span>
                <span><b id="c-followers">0</b> <span style="color:var(--dim)">Seguidores</span></span>
            </div>
        </div>
        <div id="user-feed" style="border-top: 1px solid var(--border); margin-top:15px"></div>
    </section>

    <section id="v-settings" class="view">
        <div style="padding: 20px;">
            <h2 style="margin-bottom:20px">Configuración</h2>
            
            <div style="margin-bottom:20px">
                <label style="font-size:12px; font-weight:800; color:var(--accent)">NOMBRE DE EXHIBICIÓN</label>
                <input id="in-name" class="input-premium" type="text">
            </div>

            <div style="margin-bottom:20px">
                <label style="font-size:12px; font-weight:800; color:var(--accent)">BIOGRAFÍA</label>
                <textarea id="in-bio" class="input-premium" style="height:80px; resize:none"></textarea>
            </div>

            <div style="margin-bottom:20px">
                <label style="font-size:12px; font-weight:800; color:var(--accent)">URL FOTO DE PERFIL</label>
                <input id="in-avatar" class="input-premium" type="text" placeholder="https://...">
            </div>

            <div class="settings-item" onclick="Nexus.Ident.requestVerify()">
                <div class="settings-label">Solicitar Verificación Dorado</div>
                <div style="color:var(--gold)">→</div>
            </div>

            <button onclick="Nexus.Ident.save()" style="width:100%; background:var(--accent); color:#000; border:none; padding:16px; border-radius:12px; font-weight:800; margin-top:20px">GUARDAR CAMBIOS</button>
        </div>
    </section>

    <nav>
        <div class="nav-link active" onclick="Nexus.Router.go('home')">INICIO</div>
        <div class="nav-link" onclick="Nexus.UI.modal('m-post', true)">POSTEAR</div>
        <div class="nav-link" onclick="Nexus.Router.go('profile')">PERFIL</div>
    </nav>

    <div id="m-post" style="display:none; position:fixed; inset:0; background:#000; z-index:1000; flex-direction:column;">
        <header>
            <div onclick="Nexus.UI.modal('m-post', false)">Cancelar</div>
            <button onclick="Nexus.Social.publish()" style="background:var(--accent); border:none; padding:6px 16px; border-radius:20px; font-weight:800">Publicar</button>
        </header>
        <textarea id="post-input" style="flex:1; background:transparent; color:#fff; border:none; padding:20px; font-size:18px; outline:none; resize:none" placeholder="¿Qué estás pensando?"></textarea>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// --- CORE CONFIG (FIREBASE INTACTO) ---
firebase.initializeApp({ apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU", authDomain: "vozanonimasm.firebaseapp.com", projectId: "vozanonimasm" });
const db = firebase.firestore();

const Nexus = {
    // 1. GESTIÓN DE IDENTIDAD (200 PUNTOS)
    Ident: {
        user: {
            id: localStorage.getItem('nx_id') || 'jscol_' + Math.floor(Math.random()*999),
            name: localStorage.getItem('nx_name') || 'Jhossue Borrero',
            bio: localStorage.getItem('nx_bio') || 'Aspiring Psychology student',
            avatar: localStorage.getItem('nx_avatar') || '',
            verified: localStorage.getItem('nx_verify') === 'true'
        },
        save() {
            this.user.name = document.getElementById('in-name').value;
            this.user.bio = document.getElementById('in-bio').value;
            this.user.avatar = document.getElementById('in-avatar').value;
            
            localStorage.setItem('nx_name', this.user.name);
            localStorage.setItem('nx_bio', this.user.bio);
            localStorage.setItem('nx_avatar', this.user.avatar);
            
            Nexus.UI.sync();
            Nexus.UI.toast("PERFIL ACTUALIZADO");
            Nexus.Router.go('profile');
        },
        requestVerify() {
            Nexus.UI.toast("SOLICITUD ENVIADA AL ADMIN");
            setTimeout(() => {
                this.user.verified = true;
                localStorage.setItem('nx_verify', 'true');
                Nexus.UI.sync();
            }, 3000);
        }
    },

    // 2. MOTOR SOCIAL (ESTABILIDAD FIREBASE)
    Social: {
        async publish() {
            const txt = document.getElementById('post-input').value.trim();
            if(!txt) return;
            
            Nexus.UI.loading(true);
            await db.collection("posts").add({
                uid: Nexus.Ident.user.id,
                author: Nexus.Ident.user.name,
                avatar: Nexus.Ident.user.avatar,
                isVerify: Nexus.Ident.user.verified,
                content: txt,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('post-input').value = "";
            Nexus.UI.modal('m-post', false);
            Nexus.UI.loading(false);
            Nexus.UI.toast("PUBLICADO");
        },

        render(containerId, filterUid = null) {
            const container = document.getElementById(containerId);
            db.collection("posts").orderBy("timestamp", "desc").limit(40).onSnapshot(snap => {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    if(filterUid && p.uid !== filterUid) return;

                    const card = document.createElement('div');
                    card.className = 'post';
                    card.innerHTML = `
                        <div class="avatar">
                            ${p.avatar ? `<img src="${p.avatar}">` : p.author[0]}
                        </div>
                        <div class="p-content">
                            <div class="p-header">
                                <span class="p-name">${p.author}</span>
                                ${p.isVerify ? `<svg class="verify-badge" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.88-2.95-2.18-3.66.15-.44.23-.91.23-1.4 0-2.22-1.81-4.02-4.04-4.04-.48 0-.95.08-1.38.24C14.42 2.37 13.06 1.5 11.5 1.5c-1.56 0-2.92.87-3.63 2.15-.44-.16-.91-.24-1.38-.24-2.23 0-4.03 1.8-4.03 4.02 0 .49.08.96.23 1.41C1.38 9.55.5 10.92.5 12.5c0 1.58.88 2.95 2.18 3.66-.15.44-.23.91-.23 1.4 0 2.22 1.81 4.02 4.04 4.02.48 0 .95-.08 1.38-.24 1.43 1.3 2.79 2.15 4.34 2.15 1.56 0 2.92-.87 3.63-2.15.44.16.91.24 1.38.24 2.23 0 4.03-1.8 4.03-4.02 0-.49-.08-.96-.23-1.41 1.3-.71 2.18-2.08 2.18-3.66zM9.91 17.39l-4.76-4.76L6.58 11.2l3.33 3.33 7.05-7.05 1.43 1.43-8.48 8.48z"/></svg>` : ''}
                                <span class="p-handle">@${p.uid}</span>
                            </div>
                            <div class="p-body">${p.content}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }
    },

    // 3. NAVEGACIÓN Y UI
    Router: {
        go(v) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            
            if(v === 'home') Nexus.Social.render('main-feed');
            if(v === 'profile') {
                Nexus.UI.sync();
                Nexus.Social.render('user-feed', Nexus.Ident.user.id);
            }
        }
    },

    UI: {
        sync() {
            const u = Nexus.Ident.user;
            document.getElementById('p-name-ui').innerText = u.name;
            document.getElementById('p-handle-ui').innerText = '@' + u.id;
            document.getElementById('p-bio-ui').innerText = u.bio;
            document.getElementById('p-avatar-ui').innerHTML = u.avatar ? `<img src="${u.avatar}">` : u.name[0];
            document.getElementById('p-verify-ui').style.display = u.verified ? 'block' : 'none';
            
            // Llenar inputs settings
            document.getElementById('in-name').value = u.name;
            document.getElementById('in-bio').value = u.bio;
            document.getElementById('in-avatar').value = u.avatar;
        },
        modal(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; },
        toast(m) { 
            const t = document.getElementById('toast'); 
            t.innerText = m; t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 2500); 
        },
        loading(s) { document.getElementById('loading-spinner').style.display = s ? 'block' : 'none'; }
    }
};

window.onload = () => {
    Nexus.Ident.user.id = localStorage.getItem('nx_id') || Nexus.Ident.user.id;
    localStorage.setItem('nx_id', Nexus.Ident.user.id);
    Nexus.Router.go('home');
    Nexus.UI.sync();
};
</script>

</body>
</html>
