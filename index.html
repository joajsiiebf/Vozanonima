<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant</title>

<style>
:root{
  --bg:#0b0b10;
  --card:rgba(20,20,26,0.7);
  --text:#f5f5f7;
  --muted:#8e8e93;
  --accent:#3897f0;
  --stroke:rgba(255,255,255,0.08);
  --glass:rgba(25,25,30,0.6);
  --r:18px;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background:var(--bg);
  color:var(--text);
}

.screen{display:none;height:100vh;}
.active{display:block}

/* ================= WELCOME ================= */
#welcome{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo{font-size:48px;font-weight:800;}
.sub{color:var(--muted)}

.btn{
  margin-top:12px;
  padding:12px 18px;
  border-radius:14px;
  border:none;
  background:var(--accent);
  color:#fff;
  font-weight:600;
}

/* ================= LOGIN ================= */
#login{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:24px;
  gap:10px;
}

input{
  padding:13px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:var(--card);
  color:var(--text);
}

/* ================= APP ================= */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-weight:700;
  font-size:18px;
}

.feed{padding-bottom:90px;}

.post{
  margin:12px;
  padding:14px;
  background:var(--card);
  border-radius:var(--r);
  border:1px solid var(--stroke);
  backdrop-filter:blur(20px);
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#2a2a2f;
}

.image{
  height:240px;
  border-radius:14px;
  background:#1a1a1f;
  margin-top:10px;
}

/* ================= NAV ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:64px;
  background:var(--glass);
  backdrop-filter:blur(30px);
  border-radius:24px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid var(--stroke);
}

/* ================= PROFILE ================= */
#profile{
  padding:16px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.grid div{
  height:120px;
  background:#1a1a20;
}

/* ================= SETTINGS ================= */
#settings{
  padding:16px;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:16px;
  border:1px solid var(--stroke);
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="logo">Instant</div>
  <div class="sub">Share moments like Instagram</div>

  <button class="btn" onclick="goLogin()">Entrar</button>
  <button class="btn" onclick="guest()">Invitado</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <h2>Login</h2>
  <input id="user" placeholder="usuario">
  <input id="pass" type="password" placeholder="contraseña">

  <button class="btn" onclick="login()">Entrar</button>
  <button class="btn" onclick="register()">Crear</button>
</div>

<!-- APP -->
<div id="app" class="screen">

  <div class="topbar">
    <div>Instant</div>
    <div onclick="toggleTheme()">◐</div>
  </div>

  <div id="feed" class="feed"></div>

  <div class="nav">
    <span onclick="loadFeed()">🏠</span>
    <span onclick="createPost()">＋</span>
    <span onclick="profile()">👤</span>
    <span onclick="settings()">⚙</span>
  </div>

</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <div style="padding:14px" onclick="back()">←</div>
  <div id="profileBox"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <div style="padding:14px" onclick="back()">← Ajustes</div>

  <div class="card">
    Modo oscuro
    <button class="btn" onclick="toggleTheme()">cambiar</button>
  </div>

  <div class="card">
    Sesión
    <button class="btn" onclick="logout()">salir</button>
  </div>

  <div class="card">
    Instant vFinal
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain:"vozanonimasm.firebaseapp.com",
  projectId:"vozanonimasm"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* ================= STATE ================= */
let me=JSON.parse(localStorage.getItem("user"));
let role="guest";

/* ================= NAV ================= */
function show(s){
  document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
  document.getElementById(s).classList.add("active");
}

/* ================= START ================= */
if(me){
  role=me.role||"user";
  show("app");
  loadFeed();
}else show("welcome");

/* ================= AUTH ================= */
function goLogin(){show("login");}

function guest(){
  me={username:"Invitado"};
  role="guest";
  show("app");
  loadFeed();
}

async function login(){
  const s=await db.collection("users")
  .where("username","==",user.value)
  .where("password","==",pass.value)
  .get();

  if(s.empty)return alert("error");

  me=s.docs[0].data();
  role=me.role||"user";

  localStorage.setItem("user",JSON.stringify(me));

  show("app");
  loadFeed();
}

async function register(){
  await db.collection("users").add({
    username:user.value,
    password:pass.value,
    role:"user"
  });

  alert("ok");
}

/* ================= FEED ================= */
function loadFeed(){
  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{
    let html="";

    s.forEach(d=>{
      let p=d.data();

      html+=`
      <div class="post">
        <div class="header">
          <div class="avatar"></div>
          <b>@${p.username}</b>
        </div>

        <div class="image"></div>
        <p>${p.text}</p>

      </div>`;
    });

    feed.innerHTML=html;
  });
}

/* ================= POSTS ================= */
function createPost(){
  if(role==="guest")return alert("solo lectura");

  let t=prompt("texto");
  if(!t)return;

  db.collection("posts").add({
    username:me.username,
    text:t,
    created:Date.now()
  });
}

/* ================= PROFILE ================= */
function profile(){
  show("profile");

  db.collection("posts")
  .where("username","==",me.username)
  .get()
  .then(s=>{
    let h=`<h3>@${me.username}</h3><div class="grid">`;

    s.forEach(()=>h+=`<div></div>`);

    h+="</div>";
    profileBox.innerHTML=h;
  });
}

/* ================= SETTINGS ================= */
function settings(){
  show("settings");
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* ================= UI ================= */
function back(){show("app");}

function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
