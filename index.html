<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Social App</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginView" class="view">
  <div class="card">
    <h2>Login</h2>

    <input id="loginPhone" placeholder="Teléfono o admin">
    <input id="loginPass" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <hr>

    <h3>Registro</h3>

    <input id="regUser" placeholder="Username">
    <input id="regPhone" placeholder="Teléfono">
    <input id="regPass" type="password" placeholder="Contraseña">

    <button onclick="register()">Crear cuenta</button>
  </div>
</div>

<!-- APP -->
<div id="appView" class="view hidden">

  <header class="topbar">
    <span id="title">Inicio</span>
    <span id="roleBadge"></span>
  </header>

  <!-- COMPOSER ARRIBA -->
  <div class="composer top">
    <input id="postText" placeholder="¿Qué estás pensando?">
    <button onclick="createPost()">Publicar</button>
  </div>

  <!-- FEED -->
  <section id="feedView" class="screen active"></section>

  <!-- SEARCH -->
  <section id="searchView" class="screen hidden">
    <input id="searchInput" placeholder="Buscar...">
    <div id="searchResults"></div>
  </section>

  <!-- PROFILE -->
  <section id="profileView" class="screen hidden"></section>

  <!-- SETTINGS -->
  <section id="settingsView" class="screen hidden">
    <button onclick="toggleTheme()">Modo oscuro / claro</button>
    <button onclick="logout()">Cerrar sesión</button>
  </section>

  <!-- NAV iOS -->
  <nav class="nav">

    <button onclick="go('feedView','Inicio')">🏠</button>
    <button onclick="go('searchView','Buscar')">🔍</button>

    <button onclick="focusPost()">➕</button>

    <button onclick="go('profileView','Perfil'); loadProfile()">👤</button>
    <button onclick="go('settingsView','Ajustes')">⚙️</button>

  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
