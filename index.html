<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INSTANT 𝕏 | ELITE V9</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000; --s1: #0A0A0A; --s2: #161616; --t1: #FFFFFF;
            --t2: #71767B; --accent: #8B5CF6; --glass: rgba(0, 0, 0, 0.9);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body.light-mode {
            --bg: #FFFFFF; --s1: #F7F9F9; --s2: #EFF3F4; --t1: #0F1419; --t2: #536471;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t1); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        #app { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; position: relative; display: flex; flex-direction: column; }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: var(--bg); z-index: 10; padding-bottom: calc(80px + var(--safe-bottom)); }
        .screen.active { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid rgba(255,255,255,0.05); background: var(--glass); backdrop-filter: blur(15px); }
        .feed { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }

        .post { padding: 16px; border-bottom: 0.5px solid rgba(255,255,255,0.05); display: flex; gap: 12px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--s2); flex-shrink: 0; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .chat-bubble { padding: 12px 16px; border-radius: 20px; max-width: 80%; margin-bottom: 8px; font-size: 15px; }
        .me { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .them { background: var(--s2); color: var(--t1); align-self: flex-start; border-bottom-left-radius: 4px; }

        .section-label { padding: 20px 16px 8px; font-size: 11px; font-weight: 800; color: var(--t2); text-transform: uppercase; }
        .card { background: var(--s1); border-radius: 18px; margin: 0 15px 15px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.05); }
        .row { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 0.5px solid rgba(255,255,255,0.03); }
        .row span { font-size: 14px; font-weight: 500; }
        .val { color: var(--t2); font-size: 13px; }

        .nav { position: absolute; bottom: 0; width: 100%; height: calc(75px + var(--safe-bottom)); background: var(--glass); backdrop-filter: blur(20px); display: flex; align-items: center; border-top: 0.5px solid rgba(255,255,255,0.05); z-index: 1000; }
        .tab { flex: 1; text-align: center; color: var(--t2); font-size: 22px; cursor: pointer; }
        .tab.active { color: var(--t1); }
        .fab { width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -30px; border: 4px solid var(--bg); box-shadow: 0 8px 15px rgba(139, 92, 246, 0.3); color: white; font-size: 24px; font-weight: bold; }

        .btn-m { padding: 10px 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; background: var(--t1); color: var(--bg); }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-auth" class="screen" style="justify-content:center; align-items:center; padding:40px;">
        <h1 style="font-size:60px; margin-bottom:20px">𝕏</h1>
        <input id="auth-input" style="width:100%; padding:16px; background:var(--s1); border:1px solid var(--s2); border-radius:14px; color:white; margin-bottom:15px;" placeholder="Tu @usuario">
        <button onclick="Core.Auth.login()" class="btn-m" style="width:100%">Entrar</button>
    </div>

    <div id="scr-feed" class="screen">
        <header class="header"><h1>Instant 𝕏</h1><div onclick="Core.Router.go('settings')">⚙️</div></header>
        <div id="wall" class="feed"></div>
    </div>

    <div id="scr-profile" class="screen">
        <header class="header"><div onclick="Core.Router.back()">←</div><h1 id="p-nav">Perfil</h1><div style="width:20px"></div></header>
        <div class="feed">
            <div id="p-top" style="padding:25px 20px; text-align:center; border-bottom:0.5px solid #111"></div>
            <div id="p-posts"></div>
        </div>
    </div>

    <div id="scr-inbox" class="screen">
        <header class="header"><h1>Inbox</h1><div></div></header>
        <div id="inbox-list" class="feed"></div>
    </div>

    <div id="scr-chat" class="screen" style="padding-bottom:0">
        <header class="header"><div onclick="Core.Router.go('inbox')">←</div><h1 id="chat-u">Chat</h1><div style="width:20px"></div></header>
        <div id="chat-msgs" class="feed" style="display:flex; flex-direction:column; padding:15px"></div>
        <div style="padding:15px; display:flex; gap:10px; background:var(--bg); border-top:0.5px solid #222">
            <input id="chat-in" style="flex:1; padding:12px; border-radius:20px; border:none; background:var(--s1); color:white" placeholder="Escribe un inbox...">
            <button onclick="Core.Inbox.send()" style="background:var(--accent); border:none; color:white; width:40px; height:40px; border-radius:50%">↑</button>
        </div>
    </div>

    <div id="scr-settings" class="screen">
        <header class="header"><div onclick="Core.Router.back()">←</div><h1>Ajustes Pro</h1><div></div></header>
        <div class="feed">
            <div class="section-label">Identidad</div>
            <div class="card">
                <div class="row" onclick="Core.UI.uploadAvatar()"><span>Foto de Perfil</span><span class="val">Subir Foto</span></div>
                <div class="row" onclick="Core.UI.edit('name', 'Nombre')"><span>Nombre Público</span><span class="val" id="st-name">...</span></div>
                <div class="row" onclick="Core.UI.edit('bio', 'Bio')"><span>Biografía</span><span class="val" id="st-bio">...</span></div>
            </div>

            <div class="section-label">Verificación Personalizada</div>
            <div class="card">
                <div class="row" onclick="Core.UI.verify()"><span>Solicitar Check Azul</span><span class="val">📩 Por Email</span></div>
            </div>

            <div class="section-label">Sistema Elite</div>
            <div class="card" id="settings-dynamic-rows"></div>

            <div class="card" style="margin-top:20px">
                <div class="row" onclick="Core.Auth.logout()" style="color:red"><span>Cerrar Sesión</span></div>
            </div>
        </div>
    </div>

    <nav id="nav-bar" class="nav" style="display:none">
        <div class="tab" onclick="Core.Router.go('feed')">🏠</div>
        <div class="tab" onclick="Core.Router.go('inbox')">✉️</div>
        <div onclick="Core.Social.post()" class="fab">+</div>
        <div class="tab" onclick="Core.Router.goProfile(Core.State.me)">👤</div>
    </nav>
</div>

<input type="file" id="avatar-file" style="display:none" accept="image/*">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain: "vozanonimasm.firebaseapp.com",
        projectId: "vozanonimasm"
    });
    const db = firebase.firestore();

    const Core = {
        State: { me: localStorage.getItem('_u_id'), stack: ['feed'], target: null },

        Router: {
            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('scr-' + id).classList.add('active');
                document.getElementById('nav-bar').style.display = id === 'auth' ? 'none' : 'flex';
                
                document.querySelectorAll('.tab').forEach((t, i) => {
                    t.classList.toggle('active', (id==='feed' && i===0) || (id==='inbox' && i===1) || (id==='profile' && i===2));
                });

                if(id === 'feed') Core.Social.listen();
                if(id === 'inbox') Core.Inbox.list();
                if(id === 'settings') Core.UI.renderSettings();
                if(id !== Core.State.stack[Core.State.stack.length-1]) Core.State.stack.push(id);
            },
            back() { Core.State.stack.pop(); this.go(Core.State.stack[Core.State.stack.length-1] || 'feed'); },
            goProfile(u) { this.go('profile'); Core.Social.profile(u); }
        },

        Social: {
            listen() {
                db.collection("posts").orderBy("created", "desc").limit(30).onSnapshot(snap => {
                    const w = document.getElementById('wall'); w.innerHTML = "";
                    snap.forEach(doc => {
                        const p = doc.data();
                        const el = document.createElement('div');
                        el.className = 'post';
                        el.innerHTML = `<div class="avatar" onclick="Core.Router.goProfile('${p.user}')">${p.av ? `<img src="${p.av}">` : p.user[0].toUpperCase()}</div>
                                        <div style="flex:1"><b>@${p.user}</b><p style="margin-top:4px">${p.text}</p></div>`;
                        w.appendChild(el);
                    });
                });
            },
            async profile(u) {
                document.getElementById('p-nav').innerText = '@' + u;
                const doc = await db.collection("users").doc(u).get();
                const d = doc.data() || { bio: "...", name: u };
                
                const myF = await db.collection("users").doc(Core.State.me).collection("following").doc(u).get();
                const hisF = await db.collection("users").doc(u).collection("following").doc(Core.State.me).get();
                const isMut = myF.exists && hisF.exists;

                document.getElementById('p-top').innerHTML = `
                    <div class="avatar" style="width:80px; height:80px; margin:0 auto; font-size:30px">${d.av ? `<img src="${d.av}">` : u[0].toUpperCase()}</div>
                    <h2 style="margin-top:10px">${d.name || u}</h2>
                    <p style="color:var(--t2); margin:8px 0">${d.bio || 'Sin biografía'}</p>
                    ${u !== Core.State.me ? `
                        <button class="btn-m" onclick="Core.Social.follow('${u}')">${myF.exists ? 'Siguiendo' : 'Seguir'}</button>
                        ${isMut ? `<button class="btn-m" style="background:#222; color:white; margin-left:5px" onclick="Core.Inbox.open('${u}')">Inbox</button>` : ''}
                    ` : ''}
                `;
                
                db.collection("posts").where("user", "==", u).orderBy("created", "desc").get().then(snap => {
                    const container = document.getElementById('p-posts'); container.innerHTML = "";
                    snap.forEach(d => {
                        const p = d.data();
                        const el = document.createElement('div');
                        el.className = 'post';
                        el.innerHTML = `<div class="avatar">${p.av ? `<img src="${p.av}">` : u[0].toUpperCase()}</div><div><b>@${u}</b><p>${p.text}</p></div>`;
                        container.appendChild(el);
                    });
                });
            },
            async follow(u) {
                const ref = db.collection("users").doc(Core.State.me).collection("following").doc(u);
                (await ref.get()).exists ? await ref.delete() : await ref.set({ u });
                this.profile(u);
            },
            async post() {
                const t = prompt("¿Qué quieres publicar?");
                if(!t) return;
                const me = await db.collection("users").doc(Core.State.me).get();
                const av = me.data().av || null;
                db.collection("posts").add({ user: Core.State.me, text: t, created: Date.now(), av });
            }
        },

        Inbox: {
            hid(u1, u2) { return u1 < u2 ? u1+'_'+u2 : u2+'_'+u1; },
            open(u) {
                Core.State.target = u;
                document.getElementById('chat-u').innerText = '@' + u;
                Core.Router.go('chat');
                this.listen(u);
            },
            listen(u) {
                const id = this.hid(Core.State.me, u);
                db.collection("chats").doc(id).collection("m").orderBy("t", "asc").onSnapshot(snap => {
                    const b = document.getElementById('chat-msgs'); b.innerHTML = "";
                    snap.forEach(d => {
                        const m = d.data();
                        const el = document.createElement('div');
                        el.className = `chat-bubble ${m.f === Core.State.me ? 'me' : 'them'}`;
                        el.innerText = m.x;
                        b.appendChild(el);
                    });
                    b.scrollTop = b.scrollHeight;
                });
            },
            async send() {
                const i = document.getElementById('chat-in');
                const x = i.value.trim();
                if(!x) return;
                const id = this.hid(Core.State.me, Core.State.target);
                await db.collection("chats").doc(id).collection("m").add({ f: Core.State.me, x, t: Date.now() });
                const update = { last: x, t: Date.now() };
                await db.collection("users").doc(Core.State.me).collection("inboxes").doc(Core.State.target).set(update);
                await db.collection("users").doc(Core.State.target).collection("inboxes").doc(Core.State.me).set(update);
                i.value = "";
            },
            list() {
                db.collection("users").doc(Core.State.me).collection("inboxes").orderBy("t", "desc").onSnapshot(snap => {
                    const l = document.getElementById('inbox-list'); l.innerHTML = "";
                    snap.forEach(doc => {
                        const d = doc.data();
                        const el = document.createElement('div');
                        el.className = 'post'; el.style.border = "none";
                        el.onclick = () => this.open(doc.id);
                        el.innerHTML = `<div class="avatar">${doc.id[0].toUpperCase()}</div><div><b>@${doc.id}</b><div style="color:var(--t2); font-size:13px">${d.last}</div></div>`;
                        l.appendChild(el);
                    });
                });
            }
        },

        UI: {
            renderSettings() {
                const rows = [
                    ["Modo Oscuro", "ON"], ["Calidad de Imagen", "Alta"], ["Idioma", "Español"],
                    ["Efectos de Sonido", "OFF"], ["Modo Lectura", "OFF"], ["Auto-Scroll", "OFF"],
                    ["Animaciones", "ON"], ["Estado del Servidor", "Excelente"], ["Ubicación", "Privada"], ["Copia de Seguridad", "Exportar"]
                ];
                const container = document.getElementById('settings-dynamic-rows');
                container.innerHTML = rows.map(r => `<div class="row" onclick="alert('Ajuste: ${r[0]}')"><span>${r[0]}</span><span class="val">${r[1]}</span></div>`).join('');
                db.collection("users").doc(Core.State.me).get().then(doc => {
                    const d = doc.data();
                    if(d) {
                        document.getElementById('st-name').innerText = d.name || '...';
                        document.getElementById('st-bio').innerText = d.bio || '...';
                    }
                });
            },
            async edit(f, l) {
                const v = prompt("Nuevo " + l);
                if(v) {
                    await db.collection("users").doc(Core.State.me).update({ [f]: v });
                    Core.UI.renderSettings();
                }
            },
            uploadAvatar() {
                const input = document.getElementById('avatar-file');
                input.click();
                input.onchange = e => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = async () => {
                        const base64 = reader.result;
                        await db.collection("users").doc(Core.State.me).update({ av: base64 });
                        alert("Avatar actualizado");
                    };
                    reader.readAsDataURL(file);
                };
            },
            verify() {
                const email = "Borrerosanjuanjhossue@gmail.com";
                const subject = encodeURIComponent("SOLICITUD DE VERIFICACIÓN - @" + Core.State.me);
                const body = encodeURIComponent("Estimado Administrador,\n\nSolicito la verificación de mi cuenta @" + Core.State.me + ".\n\nMotivo de la solicitud:\n(Escribe aquí por qué deberías ser verificado)");
                window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
            }
        },

        Auth: {
            login() {
                const u = document.getElementById('auth-input').value.trim().toLowerCase();
                if(u.length < 3) return;
                Core.State.me = u;
                localStorage.setItem('_u_id', u);
                db.collection("users").doc(u).get().then(doc => {
                    if(!doc.exists) db.collection("users").doc(u).set({ u, name: u, bio: "¡Hola! Estoy en Instant X." });
                    Core.Router.go('feed');
                });
            },
            logout() { localStorage.clear(); location.reload(); }
        }
    };

    window.onload = () => {
        if(Core.State.me) Core.Router.go('feed'); else Core.Router.go('auth');
    };
</script>
</body>
</html>
