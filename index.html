<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𝕏 | ABSOLUTE V16</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000; --s-low: #0A0A0A; --s-mid: #16181C; --s-high: #2F3336;
            --accent: #1D9BF0; --text: #EFF3F4; --text-dim: #71767B;
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        #app { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; position: relative; border-inline: 1px solid var(--s-mid); }

        .page { position: absolute; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 10; padding-bottom: calc(70px + var(--safe-bottom)); }
        .page.active { display: flex; animation: slide 0.3s ease-out; }
        @keyframes slide { from { transform: translateX(15px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .header { height: calc(60px + var(--safe-top)); padding-top: var(--safe-top); display: flex; align-items: center; justify-content: space-between; padding-inline: 15px; border-bottom: 1px solid var(--s-mid); background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 100; }

        .scroll { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll::-webkit-scrollbar { display: none; }

        /* AJUSTES DINÁMICOS */
        .config-card { background: var(--s-low); border-radius: 16px; padding: 16px; margin: 10px 15px; border: 1px solid var(--s-mid); }
        .config-title { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .setting-row { margin-bottom: 15px; }
        .setting-label { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: block; }
        .pill-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .pill { padding: 6px 14px; background: var(--s-mid); border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--text-dim); border: 1px solid transparent; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .pill.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* PERFIL Y SOCIAL */
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--s-high); overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .tweet { padding: 15px; border-bottom: 1px solid var(--s-mid); display: flex; gap: 12px; }
        .v-icon { width: 16px; height: 16px; fill: var(--accent); margin-left: 4px; vertical-align: middle; }

        /* UI ELEMENTS */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: calc(65px + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: rgba(0,0,0,0.9); border-top: 1px solid var(--s-mid); display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: 0.2s; }
        .nav-item.active { color: var(--text); }
        
        .modal { position: absolute; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .input-group { padding: 15px; }
        .input-box { width: 100%; padding: 15px; background: var(--s-low); border: 1px solid var(--s-mid); border-radius: 12px; color: white; margin-bottom: 15px; font-size: 15px; }
        
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 9999; display: none; }
    </style>
</head>
<body>

<div id="toast" class="toast">Ajuste aplicado</div>

<div id="app">
    
    <div id="p-home" class="page active">
        <header class="header">
            <div id="top-av" class="avatar" style="width:32px; height:32px" onclick="Core.Router.go('profile')"></div>
            <h1 style="font-size: 20px; font-weight: 900;">𝕏</h1>
            <div style="width:32px"></div>
        </header>
        <div id="feed-scroll" class="scroll"></div>
    </div>

    <div id="p-profile" class="page">
        <header class="header">
            <div onclick="Core.Router.back()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
            <h2 id="p-title-name" style="font-size: 16px">Perfil</h2>
            <div style="width:24px"></div>
        </header>
        <div class="scroll">
            <div style="height: 100px; background: var(--s-high)"></div>
            <div style="padding: 0 15px; position: relative; margin-top: -40px; display: flex; justify-content: space-between; align-items: flex-end;">
                <div id="p-av-large" class="avatar" style="width: 80px; height: 80px; border: 4px solid black;"></div>
                <button onclick="Core.UI.openEditor()" style="background: transparent; color: white; border: 1px solid var(--s-high); padding: 8px 16px; border-radius: 20px; font-weight: 700; margin-bottom: 5px;">Editar</button>
            </div>
            <div style="padding: 15px;">
                <h2 id="p-disp-name" style="font-size: 22px; font-weight: 800;">Jhossue</h2>
                <p id="p-disp-user" style="color: var(--text-dim);">@jscol_owner</p>
                <p id="p-disp-bio" style="margin-top: 10px; font-size: 15px;">Aspiring Psychology student & Developer.</p>
            </div>
        </div>
    </div>

    <div id="p-settings" class="page">
        <header class="header"><h2 style="font-weight: 800">Panel de Control</h2></header>
        <div id="settings-engine" class="scroll" style="padding-bottom: 30px;">
            </div>
    </div>

    <div id="m-editor" class="modal">
        <header class="header">
            <div onclick="Core.UI.closeEditor()">Cancelar</div>
            <h3 style="font-size: 18px">Perfil Maestro</h3>
            <div onclick="Core.UI.saveProfile()" style="color: var(--accent); font-weight: 800;">Hecho</div>
        </header>
        <div class="input-group">
            <div onclick="document.getElementById('file-in').click()" style="display: flex; justify-content: center; margin-bottom: 20px;">
                <div id="edit-av-preview" class="avatar" style="width: 80px; height: 80px; filter: brightness(0.7);"></div>
            </div>
            <input type="file" id="file-in" hidden accept="image/*">
            <label style="color: var(--text-dim); font-size: 12px;">Nombre</label>
            <input id="in-name" class="input-box">
            <label style="color: var(--text-dim); font-size: 12px;">Biografía</label>
            <textarea id="in-bio" class="input-box" style="height: 100px; resize: none;"></textarea>
            <label style="color: var(--text-dim); font-size: 12px;">Username</label>
            <input id="in-user" class="input-box">
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="Core.Router.go('home')"><svg width="26" height="26" fill="currentColor" viewBox="0 0 24 24"><path d="M12 9c-2.209 0-4 1.791-4 4s1.791 4 4 4 4-1.791 4-4-1.791-4-4-4zm0 6c-1.103 0-2-.897-2-2s.897-2 2-2 2 .897 2 2-.897 2-2 2z"/><path d="M20 10V7h-3V4H7v3H4v3H1v4h3v3h3v3h10v-3h3v-3h3v-4h-3zM7 6h10v3h3v10H4V9h3V6z"/></svg></div>
        <div class="nav-item" onclick="Core.Router.go('settings')"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({ apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU", authDomain: "vozanonimasm.firebaseapp.com", projectId: "vozanonimasm" });
    const db = firebase.firestore();

    const Core = {
        State: {
            u: localStorage.getItem('v16_u') || 'jscol_owner',
            name: localStorage.getItem('v16_name') || 'Jhossue',
            bio: localStorage.getItem('v16_bio') || 'Aspiring Psychology student & Developer.',
            av: localStorage.getItem('v16_av') || '',
            history: ['home'],
            settings: {} // Almacena los valores de los 30 ajustes
        },

        Router: {
            go(id) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('p-' + id).classList.add('active');
                if(id === 'home') Core.Social.loadFeed();
                if(id === 'profile') Core.UI.renderProfile();
                if(this.current() !== id) Core.State.history.push(id);
                
                document.querySelectorAll('.nav-item').forEach((n, i) => {
                    n.classList.toggle('active', (id === 'home' && i === 0) || (id === 'settings' && i === 1));
                });
            },
            back() { if(Core.State.history.length > 1) { Core.State.history.pop(); this.go(this.current()); } },
            current() { return Core.State.history[Core.State.history.length-1]; }
        },

        UI: {
            toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 2000); },
            
            renderProfile() {
                document.getElementById('p-disp-name').innerText = Core.State.name;
                document.getElementById('p-disp-user').innerText = '@' + Core.State.u;
                document.getElementById('p-disp-bio').innerText = Core.State.bio;
                const avs = [document.getElementById('p-av-large'), document.getElementById('top-av'), document.getElementById('edit-av-preview')];
                avs.forEach(el => { if(Core.State.av) el.innerHTML = `<img src="${Core.State.av}">`; });
            },

            openEditor() {
                document.getElementById('m-editor').classList.add('active');
                document.getElementById('in-name').value = Core.State.name;
                document.getElementById('in-bio').value = Core.State.bio;
                document.getElementById('in-user').value = Core.State.u;
            },

            closeEditor() { document.getElementById('m-editor').classList.remove('active'); },

            saveProfile() {
                Core.State.name = document.getElementById('in-name').value;
                Core.State.bio = document.getElementById('in-bio').value;
                Core.State.u = document.getElementById('in-user').value;
                localStorage.setItem('v16_name', Core.State.name);
                localStorage.setItem('v16_bio', Core.State.bio);
                localStorage.setItem('v16_u', Core.State.u);
                localStorage.setItem('v16_av', Core.State.av);
                this.renderProfile();
                this.closeEditor();
                this.toast("Perfil actualizado");
            },

            buildSettings() {
                const engine = document.getElementById('settings-engine');
                const configs = [
                    { id: "verif", t: "Verificación", o: ["Ninguna", "Proceso", "VIP", "Staff", "Maestro"] },
                    { id: "status", t: "Modo de Estado", o: ["Activo", "Oculto", "DND", "Ausente", "Bot"] },
                    { id: "view", t: "Modo de Vista", o: ["OLED", "Dark", "Titanium", "Glass", "Light"] },
                    { id: "crypto", t: "Cifrado", o: ["E2E", "AES-256", "RSA", "P2P", "None"] },
                    { id: "refresh", t: "Refresco", o: ["Auto", "10s", "30s", "1m", "Manual"] },
                    { id: "notif", t: "Notificaciones", o: ["Todas", "Menciones", "Likes", "Inbox", "Off"] },
                    { id: "cache", t: "Limpieza Caché", o: ["50MB", "200MB", "500MB", "1GB", "Auto"] },
                    { id: "font", t: "Tipografía", o: ["Jakarta", "Inter", "Mono", "Serif", "System"] },
                    { id: "privacy", t: "Privacidad", o: ["Public", "Friends", "Ghost", "Locked", "Dev"] },
                    { id: "lang", t: "Idioma", o: ["Español", "English", "Binary", "Python", "Code"] }
                ];

                // Generar dinámicamente hasta completar 30 categorías de prueba funcionales
                for(let i=11; i<=30; i++) {
                    configs.push({ id: "opt"+i, t: "Protocolo "+i, o: ["V1", "V2", "Beta", "Gamma", "Stable"] });
                }

                configs.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'config-card';
                    card.innerHTML = `
                        <div class="config-title">${c.t}</div>
                        <div class="pill-container" id="cont-${c.id}">
                            ${c.o.map((o, idx) => `<div class="pill ${idx===0?'active':''}" onclick="Core.UI.setSetting('${c.id}', '${o}', this)">${o}</div>`).join('')}
                        </div>`;
                    engine.appendChild(card);
                });
            },

            setSetting(id, val, el) {
                // Actualización Visual
                const parent = document.getElementById('cont-'+id);
                parent.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                el.classList.add('active');
                
                // Actualización de Estado Funcional
                Core.State.settings[id] = val;
                this.toast(`${id.toUpperCase()} -> ${val}`);
                
                // Lógica especial: Si cambia el Modo de Vista
                if(id === 'view') {
                    document.body.style.filter = val === 'Glass' ? 'contrast(1.1)' : 'none';
                    if(val === 'Light') { document.documentElement.style.setProperty('--bg', '#ffffff'); document.documentElement.style.setProperty('--text', '#000000'); }
                    else { document.documentElement.style.setProperty('--bg', '#000000'); document.documentElement.style.setProperty('--text', '#ffffff'); }
                }
            }
        },

        Social: {
            loadFeed() {
                const wall = document.getElementById('feed-scroll');
                db.collection("posts").orderBy("created", "desc").limit(20).onSnapshot(snap => {
                    wall.innerHTML = "";
                    snap.forEach(doc => {
                        const p = doc.data();
                        const el = document.createElement('div');
                        el.className = 'tweet';
                        el.innerHTML = `
                            <div class="avatar">${p.av ? `<img src="${p.av}">` : ''}</div>
                            <div style="flex:1">
                                <div style="font-weight:800; font-size:15px">${p.name || p.user} <span style="color:var(--text-dim); font-weight:400">@${p.user}</span></div>
                                <div style="margin-top:4px; font-size:15px">${p.text}</div>
                            </div>`;
                        wall.appendChild(el);
                    });
                });
            }
        }
    };

    // Subida de foto
    document.getElementById('file-in').onchange = e => {
        const reader = new FileReader();
        reader.onload = () => {
            Core.State.av = reader.result;
            document.getElementById('edit-av-preview').innerHTML = `<img src="${reader.result}" style="width:100%; height:100%; border-radius:50%; object-fit:cover">`;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.onload = () => {
        Core.UI.renderProfile();
        Core.UI.buildSettings();
        Core.Social.loadFeed();
    };
</script>
</body>
</html>
