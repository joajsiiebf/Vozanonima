<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Social PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="setup">
  <h2>Crear usuario</h2>
  <input id="username" placeholder="@usuario">
  <button onclick="createUser()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="topbar">
    <span id="me"></span>

    <div>
      <button onclick="openNotifications()">🔔 <span id="notiCount">0</span></button>
      <button onclick="openSettings()">⚙️</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="post-box">
    <textarea id="postText" placeholder="¿Qué estás pensando?"></textarea>
    <button onclick="createPost()">Publicar</button>
  </div>

  <div id="feed"></div>

</div>

<!-- NOTIFICATIONS -->
<div id="notificationsPanel" style="display:none;">
  <h3>Notificaciones</h3>
  <div id="notificationsList"></div>
  <button onclick="closeNotifications()">Cerrar</button>
</div>

<!-- SETTINGS -->
<div id="settingsPanel" style="display:none;">
  <h3>Configuración</h3>
  <button onclick="toggleTheme()">Modo oscuro/claro</button>
  <button onclick="logout()">Cerrar sesión</button>
  <button onclick="closeSettings()">Cerrar</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
