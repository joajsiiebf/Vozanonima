<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant</title>

<style>
:root{
  --bg:#07070b;
  --card:rgba(255,255,255,0.04);
  --text:#f5f5f7;
  --muted:#9ca3af;
  --accent:#7c3aed;
  --stroke:rgba(255,255,255,0.06);
  --glass:rgba(20,20,25,0.6);
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= PANTALLAS ================= */
.screen{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:0.35s ease;
}

.screen.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* ================= WELCOME ================= */
#welcome{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo{
  font-size:52px;
  font-weight:800;
  letter-spacing:-1px;
  color:var(--accent);
}

.sub{color:var(--muted)}

.btn{
  margin-top:12px;
  padding:12px 18px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:white;
  font-weight:600;
}

/* ================= LOGIN ================= */
#login{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:24px;
  gap:12px;
}

input{
  padding:13px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:var(--card);
  color:var(--text);
}

/* ================= APP ================= */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-weight:700;
  font-size:18px;
}

/* FEED */
.post{
  margin:12px;
  padding:14px;
  background:var(--card);
  border-radius:18px;
  border:1px solid var(--stroke);
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  background:var(--accent);
  opacity:0.7;
}

.image{
  height:230px;
  margin-top:10px;
  border-radius:14px;
  background:#111118;
}

/* ================= NAV ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:64px;
  background:var(--glass);
  backdrop-filter:blur(28px);
  border-radius:24px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid var(--stroke);
}

/* ================= PROFILE ================= */
.profileHeader{
  padding:16px;
}

.stats{
  display:flex;
  justify-content:space-around;
  padding:10px;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.grid div{
  height:120px;
  background:#111118;
}

/* ================= SETTINGS ================= */
#settings{
  padding:16px;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:16px;
  margin-bottom:10px;
  border:1px solid var(--stroke);
}
</style>
</head>

<body>

<!-- ================= WELCOME ================= -->
<div id="welcome" class="screen active">
  <div class="logo">Instant</div>
  <div class="sub">Share moments</div>

  <button class="btn" onclick="goLogin()">Entrar</button>
  <button class="btn" onclick="guest()">Invitado</button>
</div>

<!-- ================= LOGIN ================= -->
<div id="login" class="screen">
  <h2>Login</h2>
  <input id="user" placeholder="usuario">
  <input id="pass" type="password" placeholder="contraseña">

  <button class="btn" onclick="login()">Entrar</button>
  <button class="btn" onclick="register()">Crear</button>
</div>

<!-- ================= FEED ================= -->
<div id="feedScreen" class="screen">

  <div class="topbar">
    <div>Instant</div>
    <div onclick="openSettings()">⚙</div>
  </div>

  <div id="feed"></div>

  <div class="nav">
    <span onclick="showFeed()">🏠</span>
    <span onclick="createPost()">＋</span>
    <span onclick="openProfile()">👤</span>
  </div>

</div>

<!-- ================= PROFILE ================= -->
<div id="profile" class="screen">

  <div style="padding:14px" onclick="showFeed()">←</div>

  <div class="profileHeader">
    <h2 id="username"></h2>

    <div class="stats">
      <div><b id="postsCount">0</b><br>posts</div>
      <div><b>120</b><br>followers</div>
      <div><b>80</b><br>following</div>
    </div>
  </div>

  <div id="grid" class="grid"></div>

</div>

<!-- ================= SETTINGS ================= -->
<div id="settings" class="screen">
  <div style="padding:14px" onclick="showFeed()">← Ajustes</div>

  <div class="card">
    Tema morado metálico
  </div>

  <div class="card" onclick="logout()">
    Cerrar sesión
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain:"vozanonimasm.firebaseapp.com",
  projectId:"vozanonimasm"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* ================= STATE ================= */
let me=null;
let role="guest";

/* ================= NAV ENGINE ================= */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ================= START ================= */
let saved=localStorage.getItem("user");

if(saved){
  me=JSON.parse(saved);
  role=me.role||"user";
  show("feedScreen");
  loadFeed();
}else show("welcome");

/* ================= AUTH ================= */
function goLogin(){show("login");}

function guest(){
  me={username:"Invitado"};
  role="guest";
  show("feedScreen");
  loadFeed();
}

async function login(){

  let s=await db.collection("users")
  .where("username","==",user.value)
  .where("password","==",pass.value)
  .get();

  if(s.empty) return alert("error");

  me=s.docs[0].data();
  role=me.role||"user";

  localStorage.setItem("user",JSON.stringify(me));

  show("feedScreen");
  loadFeed();
}

async function register(){
  await db.collection("users").add({
    username:user.value,
    password:pass.value,
    role:"user"
  });

  alert("creado");
}

/* ================= FEED ================= */
function loadFeed(){
  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{

    let html="";

    s.forEach(d=>{
      let p=d.data();

      html+=`
      <div class="post">
        <div class="header">
          <div class="avatar"></div>
          <b>@${p.username}</b>
        </div>

        <div class="image"></div>
        <p>${p.text}</p>
      </div>`;
    });

    feed.innerHTML=html;

  });
}

/* ================= PROFILE ================= */
function openProfile(){

  show("profile");

  username.innerText="@"+me.username;

  db.collection("posts")
  .where("username","==",me.username)
  .get()
  .then(s=>{

    postsCount.innerText=s.size;

    let html="";

    s.forEach(()=>html+=`<div></div>`);

    grid.innerHTML=html;

  });

}

/* ================= POSTS ================= */
function createPost(){
  if(role==="guest")return alert("solo lectura");

  let t=prompt("texto");
  if(!t)return;

  db.collection("posts").add({
    username:me.username,
    text:t,
    created:Date.now()
  });
}

/* ================= SETTINGS ================= */
function openSettings(){show("settings");}

function showFeed(){show("feedScreen");}

function logout(){
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
