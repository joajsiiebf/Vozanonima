<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant</title>

<style>
:root{
  --bg:#000;
  --card:#111;
  --text:#fff;
  --glass:rgba(20,20,20,0.55);
  --accent:#3897f0;
}

.light{
  --bg:#f5f5f5;
  --card:#fff;
  --text:#000;
  --glass:rgba(255,255,255,0.6);
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= WELCOME ================= */
#welcome{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

#welcome button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#fff;
}

/* ================= LOGIN ================= */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:100%;
  transition:.35s ease;
  overflow:auto;
}

.screen.active{left:0}

.login{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
  gap:10px;
}

/* ================= TOP ================= */
.top{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* ================= FEED ================= */
.post{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  animation:pop .25s ease;
}

@keyframes pop{
  from{transform:translateY(10px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

.img{
  width:100%;
  height:260px;
  background:#222;
  border-radius:12px;
  margin-top:10px;
}

/* ================= NAV BAR (LIQUID GLASS) ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:60px;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-radius:20px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid rgba(255,255,255,0.1);
}

/* ================= PROFILE ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.grid div{
  height:110px;
  background:#222;
}

/* ================= NOTIFY ================= */
.notify{
  position:fixed;
  top:60px;
  right:10px;
  background:var(--card);
  padding:10px;
  border-radius:12px;
  font-size:12px;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- WELCOME SCREEN -->
<div id="welcome">
  <h1>Instant</h1>
  <p>Tu red social privada</p>
  <button onclick="goLogin()">Continuar</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <div class="login">
    <h2>Bienvenido</h2>
    <input id="user" placeholder="usuario">
    <input id="pass" type="password" placeholder="contraseña">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Crear cuenta</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">

  <div class="top">
    <div>Instant</div>
    <div onclick="toggleTheme()">◐</div>
  </div>

  <div id="feed"></div>

  <div class="nav">
    <span onclick="loadFeed()">⌂</span>
    <span onclick="createPost()">＋</span>
    <span onclick="openProfile()">👤</span>
    <span onclick="notify('acción')">🔔</span>
  </div>

</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <div class="top">
    <div onclick="back()">←</div>
    <div>Perfil</div>
  </div>
  <div id="profileBox"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
 apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
 authDomain:"vozanonimasm.firebaseapp.com",
 projectId:"vozanonimasm"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let currentUser=JSON.parse(localStorage.getItem("user"))||null;

/* AUTO LOGIN */
if(currentUser){
  showApp();
}

/* ================= NAV ================= */
function goLogin(){
  welcome.style.display="none";
  login.classList.add("active");
}

function showApp(){
  login.classList.remove("active");
  app.classList.add("active");
  loadFeed();
}

/* ================= AUTH ================= */
async function login(){
  const snap=await db.collection("users")
  .where("username","==",user.value)
  .where("password","==",pass.value)
  .get();

  if(snap.empty) return alert("error");

  currentUser=snap.docs[0].data();
  localStorage.setItem("user",JSON.stringify(currentUser));

  showApp();
}

async function register(){
  await db.collection("users").add({
    username:user.value,
    password:pass.value
  });
}

/* ================= FEED ================= */
function loadFeed(){
  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{
    let html="";

    s.forEach(d=>{
      let p=d.data();

      html+=`
      <div class="post">
        <b>@${p.username}</b>
        <div class="img"></div>
        <p>${p.text}</p>
      </div>`;
    });

    feed.innerHTML=html;
  });
}

/* ================= POST ================= */
function createPost(){
  let t=prompt("texto");

  db.collection("posts").add({
    username:currentUser.username,
    text:t,
    created:Date.now()
  });
}

/* ================= PROFILE ================= */
function openProfile(){
  app.classList.remove("active");
  profile.classList.add("active");

  db.collection("posts")
  .where("username","==",currentUser.username)
  .get()
  .then(s=>{
    let html=`<h3>@${currentUser.username}</h3><div class="grid">`;

    s.forEach(()=>html+=`<div></div>`);

    html+=`</div>`;
    profileBox.innerHTML=html;
  });
}

/* ================= BACK ================= */
function back(){
  profile.classList.remove("active");
  app.classList.add("active");
}

/* ================= THEME ================= */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ================= NOTIFY ================= */
function notify(msg){
  alert(msg);
}
</script>

</body>
</html>
