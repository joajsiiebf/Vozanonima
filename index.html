<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Red Social App</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase compat (estable para GitHub Pages) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>
<div id="app">

  <!-- LOGIN -->
  <section id="loginScreen" class="screen active">
    <div class="authBox">
      <h1>Bienvenido</h1>

      <input id="loginPhone" placeholder="Teléfono">
      <input id="loginPass" type="password" placeholder="Contraseña">
      <button onclick="login()">Entrar</button>

      <hr>

      <input id="regUser" placeholder="Username único">
      <input id="regPhone" placeholder="Teléfono">
      <input id="regPass" type="password" placeholder="Contraseña">
      <button onclick="register()">Crear cuenta</button>
    </div>
  </section>

  <!-- APP -->
  <section id="appScreen" class="screen">

    <!-- HEADER -->
    <header class="topbar">
      <span id="topTitle">Inicio</span>
    </header>

    <!-- FEED -->
    <div id="feed" class="view"></div>

    <!-- SEARCH -->
    <div id="search" class="view hidden">
      <input id="searchInput" placeholder="Buscar usuarios..." oninput="searchUsers()">
      <div id="searchResults"></div>
    </div>

    <!-- MESSAGES -->
    <div id="messages" class="view hidden">
      <div id="chatList"></div>
      <div id="chatBox" class="hidden">
        <div id="chatMessages"></div>
        <input id="chatInput" placeholder="Mensaje...">
        <button onclick="sendMessage()">Enviar</button>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="view hidden"></div>

    <!-- SETTINGS -->
    <div id="settings" class="view hidden">
      <button onclick="toggleTheme()">Modo oscuro / claro</button>
      <button onclick="logout()">Cerrar sesión</button>
    </div>

    <!-- CREATE POST -->
    <div class="createPost">
      <input id="postText" placeholder="¿Qué estás pensando?">
      <button onclick="createPost()">Publicar</button>
    </div>

    <!-- NAV -->
    <nav class="nav">
      <button onclick="navigate('feed')">Inicio</button>
      <button onclick="navigate('search')">Buscar</button>
      <button onclick="navigate('messages')">Mensajes</button>
      <button onclick="navigate('profile')">Perfil</button>
      <button onclick="navigate('settings')">Ajustes</button>
    </nav>

  </section>

</div>

<script src="app.js"></script>
</body>
</html>
