<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Voz Social</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="tutorial" class="tutorial">
  <h2>👁️ Voz Social</h2>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none;">

  <div class="topbar">
    <span>Voz Social</span>
    <button onclick="toggleConfig()">⚙️</button>
  </div>

  <!-- CONFIG COMPLETA -->
  <div id="config" class="config">
    <h3>Configuración</h3>

    <input id="configUser" placeholder="Usuario">

    <button onclick="cambiarUsuario()">Guardar usuario</button>

    <button onclick="toggleTheme()">🌙 Modo oscuro</button>

    <button onclick="toggleComments()">💬 Comentarios ON/OFF</button>

    <button onclick="toggleConfig()">Cerrar</button>
  </div>

  <!-- POST BOX -->
  <div class="post-box">
    <textarea id="inputPost" placeholder="¿Qué estás pensando?"></textarea>
    <button onclick="crearPost()">Publicar</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
