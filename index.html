<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INSTANT 𝕏 | SUPREME ENGINE V7</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --s1: #0A0A0A;
            --s2: #161616;
            --t1: #FFFFFF;
            --t2: #71767B;
            --accent: #8B5CF6;
            --accent-soft: rgba(139, 92, 246, 0.1);
            --danger: #F91880;
            --glass: rgba(0, 0, 0, 0.8);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body.light-mode {
            --bg: #FFFFFF; --s1: #F7F9F9; --s2: #EFF3F4;
            --t1: #0F1419; --t2: #536471; --accent: #7C3AED;
            --glass: rgba(255, 255, 255, 0.8);
        }

        /* --- GLOBAL RESET --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        html, body { 
            background: var(--bg); color: var(--t1); 
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh; overflow: hidden; width: 100%;
        }

        #app {
            width: 100%; max-width: 500px; height: 100vh; margin: 0 auto;
            position: relative; display: flex; flex-direction: column;
            border-left: 0.5px solid rgba(255,255,255,0.05);
            border-right: 0.5px solid rgba(255,255,255,0.05);
        }

        /* --- SCREEN ENGINE --- */
        .screen {
            position: absolute; inset: 0; display: none; flex-direction: column;
            background: var(--bg); z-index: 10;
            padding-top: var(--safe-top);
            padding-bottom: calc(85px + var(--safe-bottom));
        }
        .screen.active { display: flex; animation: viewSlide 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes viewSlide { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* --- HEADER --- */
        .header {
            height: 60px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100; border-bottom: 0.5px solid rgba(255,255,255,0.08);
        }
        .header h1 { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
        .head-btn { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .head-btn:active { background: var(--s2); transform: scale(0.9); }

        /* --- FEED & POSTS --- */
        .feed { flex: 1; overflow-y: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .feed::-webkit-scrollbar { display: none; }

        .post { padding: 16px; display: flex; gap: 12px; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        .avatar {
            width: 45px; height: 45px; border-radius: 50%; background: var(--s2);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: var(--accent); flex-shrink: 0;
            background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.05);
        }

        .p-body { flex: 1; }
        .p-user-info { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
        .p-name { font-weight: 700; font-size: 15px; }
        .p-tag { color: var(--t2); font-size: 14px; }
        .p-text { font-size: 15px; line-height: 1.5; margin-top: 2px; color: var(--t1); }
        .p-stats { display: flex; gap: 20px; margin-top: 12px; color: var(--t2); font-size: 13px; }

        /* --- INBOX & CHAT --- */
        .inbox-item { padding: 15px 16px; display: flex; gap: 12px; align-items: center; cursor: pointer; transition: 0.2s; }
        .inbox-item:active { background: var(--s1); }
        .inbox-info { flex: 1; border-bottom: 0.5px solid rgba(255,255,255,0.03); padding-bottom: 12px; }
        
        .chat-bubble { padding: 12px 16px; border-radius: 20px; max-width: 80%; margin-bottom: 8px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg-me { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-them { background: var(--s2); color: var(--t1); align-self: flex-start; border-bottom-left-radius: 4px; }

        .chat-input-area { 
            padding: 10px 16px calc(15px + var(--safe-bottom)); background: var(--bg);
            border-top: 0.5px solid rgba(255,255,255,0.08); display: flex; gap: 10px;
        }

        /* --- SETTINGS CARDS --- */
        .section-label { padding: 24px 16px 8px; font-size: 12px; font-weight: 800; color: var(--t2); text-transform: uppercase; letter-spacing: 1px; }
        .card { background: var(--s1); border-radius: 20px; margin: 0 16px 12px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.05); }
        .card-row { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .card-row:active { background: var(--s2); }
        .card-row:not(:last-child) { border-bottom: 0.5px solid rgba(255,255,255,0.03); }
        .card-row span { font-weight: 500; font-size: 15px; }
        .card-row .val { color: var(--t2); font-size: 14px; }

        /* --- NAV BAR --- */
        .nav-bar {
            position: absolute; bottom: 0; width: 100%; height: calc(80px + var(--safe-bottom));
            background: var(--glass); backdrop-filter: blur(25px); display: flex; 
            justify-content: space-around; align-items: center; padding-bottom: var(--safe-bottom);
            border-top: 0.5px solid rgba(255,255,255,0.05); z-index: 1000;
        }
        .nav-tab { color: var(--t2); flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .nav-tab.active { color: var(--t1); }
        .nav-tab svg { width: 26px; height: 26px; }

        /* --- BUTTONS & INPUTS --- */
        .btn-main { padding: 12px 24px; border-radius: 25px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--t2); color: var(--t1); }
        
        .input-box { width: 100%; padding: 16px; background: var(--s2); border: 1px solid transparent; border-radius: 14px; color: white; transition: 0.3s; }
        .input-box:focus { border-color: var(--accent); background: var(--s1); }

        .fab { width: 54px; height: 54px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -40px; border: 4px solid var(--bg); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-auth" class="screen active" style="justify-content:center; align-items:center; padding:40px;">
        <div style="font-size:70px; font-weight:900; margin-bottom:10px">𝕏</div>
        <h1 style="margin-bottom:30px; letter-spacing:-1px">Instant X Pro</h1>
        <input id="auth-user" class="input-box" placeholder="Usuario (mín. 3 letras)" style="margin-bottom:15px">
        <button onclick="Engine.Auth.login()" class="btn-main btn-accent" style="width:100%; font-size:16px; padding:18px">Entrar ahora</button>
    </div>

    <div id="scr-feed" class="screen">
        <header class="header">
            <h1>Para ti</h1>
            <div onclick="Engine.Router.go('settings')" class="head-btn">⚙️</div>
        </header>
        <div id="feed-wall" class="feed"></div>
    </div>

    <div id="scr-inbox" class="screen">
        <header class="header">
            <h1>Inboxes</h1>
            <div style="width:38px"></div>
        </header>
        <div id="inbox-list" class="feed"></div>
    </div>

    <div id="scr-chat" class="screen" style="padding-bottom:0">
        <header class="header">
            <div onclick="Engine.Router.go('inbox')" class="head-btn">←</div>
            <h1 id="chat-user-name">Inbox</h1>
            <div style="width:38px"></div>
        </header>
        <div id="chat-messages" class="feed" style="display:flex; flex-direction:column; padding:16px;"></div>
        <div class="chat-input-area">
            <input id="chat-input" class="input-box" placeholder="Escribe un mensaje..." style="border-radius:25px">
            <button onclick="Engine.Inbox.send()" class="btn-main btn-accent" style="width:45px; height:45px; padding:0; border-radius:50%">↑</button>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <header class="header">
            <div onclick="Engine.Router.back()" class="head-btn">←</div>
            <h1 id="prof-header-name">Perfil</h1>
            <div style="width:38px"></div>
        </header>
        <div class="feed" id="profile-scroll">
            <div id="profile-top" style="padding:20px; text-align:center; border-bottom:0.5px solid #111"></div>
            <div id="profile-posts"></div>
        </div>
    </div>

    <div id="scr-settings" class="screen">
        <header class="header">
            <div onclick="Engine.Router.back()" class="head-btn">←</div>
            <h1>Configuración</h1>
            <div style="width:38px"></div>
        </header>
        <div class="feed">
            <div class="section-label">Mi Identidad</div>
            <div class="card">
                <div class="card-row" onclick="Engine.UI.promptEdit('name', 'Nombre Real')">
                    <span>Nombre Real</span>
                    <span class="val" id="st-name">Configurar</span>
                </div>
                <div class="card-row" onclick="Engine.UI.promptEdit('bio', 'Biografía')">
                    <span>Biografía</span>
                    <span class="val" id="st-bio">Editar</span>
                </div>
                <div class="card-row" onclick="Engine.UI.promptEdit('avatar', 'URL de Avatar')">
                    <span>Foto de Perfil</span>
                    <span class="val">Cambiar</span>
                </div>
            </div>

            <div class="section-label">Privacidad</div>
            <div class="card">
                <div class="card-row">
                    <span>Cuenta Privada</span>
                    <div id="st-priv" onclick="Engine.UI.toggle('private')" style="color:var(--accent); font-weight:800">OFF</div>
                </div>
                <div class="card-row" onclick="alert('Solicitud enviada.')">
                    <span>Verificación (Check)</span>
                    <span class="val">Solicitar</span>
                </div>
            </div>

            <div class="section-label">Sistema</div>
            <div class="card">
                <div class="card-row" onclick="Engine.UI.toggleTheme()">
                    <span>Modo Oscuro</span>
                    <span class="val" id="st-theme">ON</span>
                </div>
                <div class="card-row" onclick="Engine.Data.clear()">
                    <span>Limpiar Caché</span>
                </div>
                <div class="card-row" onclick="Engine.Auth.logout()" style="color:var(--danger)">
                    <span>Cerrar Sesión</span>
                </div>
            </div>
        </div>
    </div>

    <nav id="nav-global" class="nav-bar hidden">
        <div class="nav-tab active" onclick="Engine.Router.go('feed')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/></svg>
        </div>
        <div onclick="Engine.Social.createPost()" class="fab">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
        <div class="nav-tab" onclick="Engine.Router.go('inbox')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <div class="nav-tab" onclick="Engine.Router.goProfile(Engine.Data.me)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    /* CONFIGURACIÓN DE FIREBASE 
       Sync Real-Time con Firestore
    */
    firebase.initializeApp({
        apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain: "vozanonimasm.firebaseapp.com",
        projectId: "vozanonimasm"
    });
    const db = firebase.firestore();

    const Engine = {
        Data: {
            me: localStorage.getItem('_instant_uid'),
            stack: ['feed'],
            settings: { private: false }
        },

        /* --- ROUTING LOGIC --- */
        Router: {
            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('scr-' + id).classList.add('active');
                
                const nav = document.getElementById('nav-global');
                nav.classList.toggle('hidden', id === 'auth');

                document.querySelectorAll('.nav-tab').forEach((t, i) => {
                    t.classList.toggle('active', (id === 'feed' && i === 0) || (id === 'inbox' && i === 2) || (id === 'profile' && i === 3));
                });

                if(id === 'feed') Engine.Social.listenFeed();
                if(id === 'inbox') Engine.Inbox.loadList();
                if(id !== Engine.Data.stack[Engine.Data.stack.length-1]) Engine.Data.stack.push(id);
            },
            back() {
                if(Engine.Data.stack.length > 1) {
                    Engine.Data.stack.pop();
                    this.go(Engine.Data.stack[Engine.Data.stack.length-1]);
                }
            },
            goProfile(u) {
                this.go('profile');
                Engine.Social.loadProfile(u);
            }
        },

        /* --- SOCIAL LOGIC (FOLLOWS & POSTS) --- */
        Social: {
            listenFeed() {
                db.collection("posts").orderBy("created", "desc").limit(30).onSnapshot(snap => {
                    const wall = document.getElementById('feed-wall');
                    wall.innerHTML = "";
                    snap.forEach(doc => {
                        const p = doc.data();
                        const el = document.createElement('div');
                        el.className = 'post';
                        el.innerHTML = `
                            <div class="avatar" onclick="Engine.Router.goProfile('${p.user}')" style="background-image:url(${p.avatar || ''})">${p.avatar ? '' : p.user[0].toUpperCase()}</div>
                            <div class="p-body">
                                <div class="p-user-info">
                                    <span class="p-name">${p.user}</span>
                                    <span class="p-tag">@${p.user}</span>
                                </div>
                                <div class="p-text">${p.text}</div>
                                <div class="p-stats">
                                    <span>❤️ ${p.likes || 0}</span>
                                    <span>💬 0</span>
                                </div>
                            </div>
                        `;
                        wall.appendChild(el);
                    });
                });
            },
            async loadProfile(u) {
                document.getElementById('prof-header-name').innerText = '@' + u;
                
                // CONDICIÓN MUTUA: ¿Yo te sigo? ¿Tú me sigues?
                const myFollow = await db.collection("users").doc(Engine.Data.me).collection("following").doc(u).get();
                const hisFollow = await db.collection("users").doc(u).collection("following").doc(Engine.Data.me).get();
                const isMutual = myFollow.exists && hisFollow.exists;

                const doc = await db.collection("users").doc(u).get();
                const d = doc.data() || { name: u, bio: "Sin biografía", following: 0, followers: 0 };

                document.getElementById('profile-top').innerHTML = `
                    <div class="avatar" style="width:90px; height:90px; font-size:35px; margin:0 auto; background-image:url(${d.avatar || ''})">${d.avatar ? '' : u[0].toUpperCase()}</div>
                    <h2 style="margin-top:15px; font-weight:900">${d.name}</h2>
                    <p style="color:var(--t2); margin:5px 0 15px">${d.bio}</p>
                    
                    <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px">
                        <span><b>${d.following}</b> <small>Siguiendo</small></span>
                        <span><b>${d.followers}</b> <small>Seguidores</small></span>
                    </div>

                    ${u !== Engine.Data.me ? `
                        <button onclick="Engine.Social.toggleFollow('${u}')" class="btn-main ${myFollow.exists ? 'btn-outline' : 'btn-accent'}" style="width:140px">
                            ${myFollow.exists ? 'Siguiendo' : 'Seguir'}
                        </button>
                        ${isMutual ? `<button onclick="Engine.Inbox.open('${u}')" class="btn-main btn-outline" style="margin-left:8px">Enviar Inbox</button>` : ''}
                    ` : ''}
                `;
            },
            async toggleFollow(u) {
                const myRef = db.collection("users").doc(Engine.Data.me).collection("following").doc(u);
                const hisRef = db.collection("users").doc(u).collection("followers").doc(Engine.Data.me);
                
                const exists = (await myRef.get()).exists;
                if(exists) {
                    await myRef.delete(); await hisRef.delete();
                } else {
                    await myRef.set({ u }); await hisRef.set({ u: Engine.Data.me });
                }
                this.loadProfile(u);
            },
            createPost() {
                const t = prompt("¿Qué está pasando?");
                if(t) db.collection("posts").add({ user: Engine.Data.me, text: t, created: Date.now(), likes: 0 });
            }
        },

        /* --- INBOX LOGIC (MUTUAL ONLY) --- */
        Inbox: {
            getHID(u1, u2) { return u1 < u2 ? u1+'_'+u2 : u2+'_'+u1; },
            open(u) {
                Engine.Data.activeChat = u;
                document.getElementById('chat-user-name').innerText = '@' + u;
                Engine.Router.go('chat');
                this.listenChat(u);
            },
            listenChat(u) {
                const hid = this.getHID(Engine.Data.me, u);
                db.collection("chats").doc(hid).collection("m").orderBy("t", "asc").onSnapshot(snap => {
                    const box = document.getElementById('chat-messages'); box.innerHTML = "";
                    snap.forEach(d => {
                        const m = d.data();
                        const el = document.createElement('div');
                        el.className = `chat-bubble ${m.f === Engine.Data.me ? 'msg-me' : 'msg-them'}`;
                        el.innerText = m.x;
                        box.appendChild(el);
                    });
                    box.scrollTop = box.scrollHeight;
                });
            },
            async send() {
                const input = document.getElementById('chat-input');
                const text = input.value.trim();
                if(!text || !Engine.Data.activeChat) return;
                
                const hid = this.getHID(Engine.Data.me, Engine.Data.activeChat);
                await db.collection("chats").doc(hid).collection("m").add({ f: Engine.Data.me, x: text, t: Date.now() });
                
                // Actualizar punteros de Inbox
                const update = { last: text, t: Date.now() };
                await db.collection("users").doc(Engine.Data.me).collection("inboxes").doc(Engine.Data.activeChat).set(update);
                await db.collection("users").doc(Engine.Data.activeChat).collection("inboxes").doc(Engine.Data.me).set(update);
                
                input.value = "";
            },
            loadList() {
                db.collection("users").doc(Engine.Data.me).collection("inboxes").orderBy("t", "desc").onSnapshot(snap => {
                    const l = document.getElementById('inbox-list'); l.innerHTML = "";
                    if(snap.empty) l.innerHTML = `<p style="padding:40px; text-align:center; color:var(--t2)">No tienes inboxes todavía. Sigue a alguien que te siga para hablar.</p>`;
                    snap.forEach(doc => {
                        const d = doc.data();
                        const el = document.createElement('div');
                        el.className = 'inbox-item';
                        el.onclick = () => this.open(doc.id);
                        el.innerHTML = `
                            <div class="avatar">${doc.id[0].toUpperCase()}</div>
                            <div class="inbox-info">
                                <div style="font-weight:700">@${doc.id}</div>
                                <div style="color:var(--t2); font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${d.last}</div>
                            </div>
                        `;
                        l.appendChild(el);
                    });
                });
            }
        },

        /* --- UI & SETTINGS --- */
        UI: {
            toggleTheme() {
                document.body.classList.toggle('light-mode');
                document.getElementById('st-theme').innerText = document.body.classList.contains('light-mode') ? 'OFF' : 'ON';
            },
            async promptEdit(field, label) {
                const val = prompt(`Cambiar ${label}:`);
                if(val) {
                    await db.collection("users").doc(Engine.Data.me).update({ [field]: val });
                    if(document.getElementById('st-'+field)) document.getElementById('st-'+field).innerText = val;
                    alert("Actualizado correctamente.");
                }
            },
            toggle(key) {
                Engine.Data.settings[key] = !Engine.Data.settings[key];
                document.getElementById('st-priv').innerText = Engine.Data.settings[key] ? 'ON' : 'OFF';
            }
        },

        /* --- AUTH SYSTEM --- */
        Auth: {
            async login() {
                const u = document.getElementById('auth-user').value.trim().toLowerCase();
                if(u.length < 3) return alert("Nombre muy corto");
                
                Engine.Data.me = u;
                localStorage.setItem('_instant_uid', u);
                
                const ref = db.collection("users").doc(u);
                const doc = await ref.get();
                if(!doc.exists) {
                    await ref.set({ u, name: u, bio: "¡Hola! Uso Instant X.", followers: 0, following: 0 });
                }
                Engine.Router.go('feed');
            },
            logout() {
                localStorage.clear();
                location.reload();
            }
        },

        Data: {
            clear() { localStorage.clear(); location.reload(); }
        }
    };

    // Inicialización
    window.onload = () => {
        if(Engine.Data.me) Engine.Router.go('feed');
    };
</script>
</body>
</html>
