<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Voz Social</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="tutorial">
  <h2>Voz Social</h2>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none;">

  <div class="topbar">
    Voz Social
    <button onclick="toggleConfig()">⚙️</button>
  </div>

  <div id="config" class="config">
    <input id="userInput" placeholder="Usuario">
    <button onclick="saveUser()">Guardar</button>
    <button onclick="toggleTheme()">Modo</button>
  </div>

  <div class="post-box">
    <textarea id="text" placeholder="¿Qué estás pensando?"></textarea>
    <button onclick="createPost()">Publicar</button>
  </div>

  <div id="feed"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
