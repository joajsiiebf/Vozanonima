<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INSTANT - Ultra Fidelity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-metallic: linear-gradient(135deg, #C04FBA 0%, #7A2C76 100%);
            --bg: #000000;
            --card: #1C1C1E;
            --text: #FFFFFF;
            --border: rgba(255, 255, 255, 0.12);
            --muted: #8E8E93;
            --glass: rgba(20, 20, 20, 0.75);
            --ios-blue: #0A84FF;
        }

        body.light-mode {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #000000;
            --border: rgba(0, 0, 0, 0.1);
            --muted: #636366;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background-color: #000;
            color: var(--text);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-viewport {
            width: 100%;
            max-width: 430px;
            background: var(--bg);
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            transition: background 0.4s ease;
        }

        /* ================= iOS STATUS BAR ================= */
        .status-bar {
            height: 44px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            position: relative;
        }

        /* ================= SCREENS ================= */
        .screen {
            position: absolute;
            inset: 0;
            top: 44px; /* Debajo de status bar */
            display: none;
            flex-direction: column;
            padding-bottom: 120px;
            overflow-y: auto;
            z-index: 10;
        }

        .screen.active { display: flex; animation: iosPush 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); }

        @keyframes iosPush {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ================= GLASS HEADER ================= */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--border);
        }

        .logo-text {
            font-weight: 800;
            background: var(--primary-metallic);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            letter-spacing: -0.8px;
        }

        /* ================= THREADS COMPONENT ================= */
        .thread-card {
            padding: 16px;
            border-bottom: 0.5px solid var(--border);
            display: flex;
            gap: 14px;
            transition: background 0.2s;
        }

        .avatar-main {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--primary-metallic);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; flex-shrink: 0;
        }

        .thread-content { flex: 1; }
        .thread-user { font-weight: 700; font-size: 15px; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
        .verified { color: var(--ios-blue); font-size: 12px; }
        .thread-text { font-size: 15px; line-height: 1.5; opacity: 0.95; margin-bottom: 12px; }
        .hashtag { color: #C04FBA; font-weight: 600; cursor: pointer; }

        .thread-actions { display: flex; gap: 30px; color: var(--muted); }
        .btn-act { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-act:hover { color: var(--text); }
        .btn-act.liked { color: #FF2D55; animation: pop 0.3s ease; }
        
        @keyframes pop { 50% { transform: scale(1.3); } }

        /* ================= NAV BAR (FIDELIDAD TOTAL) ================= */
        .nav-wrapper {
            position: absolute;
            bottom: 35px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }

        .nav-island {
            width: 90%;
            height: 70px;
            background: var(--primary-metallic);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            pointer-events: all;
            position: relative;
        }

        .nav-btn {
            color: white;
            display: flex; flex-direction: column; align-items: center;
            font-size: 10px; font-weight: 700; opacity: 0.7; cursor: pointer;
        }

        .nav-btn.active { opacity: 1; }
        .nav-btn svg { width: 24px; height: 24px; margin-bottom: 3px; }

        .btn-plus {
            width: 62px; height: 62px;
            background: white;
            border-radius: 50%;
            margin-top: -45px;
            display: flex; align-items: center; justify-content: center;
            color: #7A2C76; font-size: 35px;
            border: 6px solid var(--bg);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-plus:active { transform: scale(0.9); }

        /* ================= MODAL POST ================= */
        .ios-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: flex-end;
            z-index: 2000;
        }

        .modal-sheet {
            background: var(--card);
            width: 100%;
            border-radius: 25px 25px 0 0;
            padding: 20px;
            animation: sheetUp 0.3s ease-out;
        }

        @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .ios-textarea {
            width: 100%; height: 150px;
            background: transparent; border: none;
            color: var(--text); font-size: 18px;
            resize: none; margin-top: 20px;
        }

        /* ================= SETTINGS iOS STYLE ================= */
        .settings-section { margin: 20px 16px; }
        .settings-label { color: var(--muted); font-size: 13px; text-transform: uppercase; margin: 0 0 8px 16px; }
        .settings-box { background: var(--card); border-radius: 12px; overflow: hidden; border: 0.5px solid var(--border); }
        .row { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); cursor: pointer; }
        .row:last-child { border: none; }
        
        .switch {
            width: 51px; height: 31px;
            background: #39393D; border-radius: 16px;
            position: relative; transition: 0.3s;
        }
        .switch.on { background: #34C759; }
        .switch::after {
            content: ''; position: absolute; width: 27px; height: 27px;
            background: white; border-radius: 50%; top: 2px; left: 2px;
            transition: 0.3s; box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }
        .switch.on::after { left: 22px; }

    </style>
</head>
<body>

<div class="app-viewport">
    
    <div class="status-bar">
        <span>9:41</span>
        <div style="display:flex; gap:5px">📶 🛜 🔋</div>
    </div>

    <div id="scr-login" class="screen active" style="justify-content: center; padding-bottom: 0;">
        <div style="padding: 40px; text-align: center;">
            <div class="logo-text" style="font-size: 55px; margin-bottom: 10px;">INSTANT</div>
            <p style="color: var(--muted); font-weight: 500;">Comparte sin filtros.</p>
            <div style="margin-top: 50px;">
                <input type="text" id="user-field" style="background: var(--card); border: 1px solid var(--border); padding: 18px; width: 100%; border-radius: 14px; color: white; margin-bottom: 15px; font-size: 16px;" placeholder="Nombre de usuario">
                <button onclick="handleLogin()" style="background: var(--primary-metallic); border: none; padding: 18px; width: 100%; border-radius: 14px; color: white; font-weight: 700; font-size: 16px; cursor: pointer;">Empezar</button>
            </div>
        </div>
    </div>

    <div id="scr-feed" class="screen">
        <header class="header">
            <div class="logo-text">INSTANT</div>
            <div onclick="navigate('settings')" style="font-size: 20px; cursor: pointer;">👤</div>
        </header>
        <div id="feed-render"></div>
    </div>

    <div id="scr-profile" class="screen">
        <header class="header">
            <div style="width:24px"></div>
            <div class="logo-text">MI PERFIL</div>
            <div onclick="navigate('settings')" style="cursor: pointer;">⚙️</div>
        </header>
        <div style="text-align: center; padding: 40px 20px;">
            <div class="avatar-main" style="width: 100px; height: 100px; margin: 0 auto 20px; font-size: 32px;"></div>
            <h2 id="me-username" style="margin: 0; font-weight: 800;">@user</h2>
            <p style="color: var(--muted); margin-top: 5px;">Miembro desde 2026</p>
            <div style="display: flex; justify-content: center; gap: 30px; margin-top: 30px;">
                <div><b style="font-size: 20px;">110K</b><br><small style="color:var(--muted)">Seguidores</small></div>
                <div><b style="font-size: 20px;">482</b><br><small style="color:var(--muted)">Posts</small></div>
            </div>
        </div>
    </div>

    <div id="scr-settings" class="screen">
        <header class="header">
            <div onclick="navigate('feed')" style="color: var(--ios-blue); cursor: pointer; font-weight: 500;">← Volver</div>
            <div class="logo-text">AJUSTES</div>
            <div style="width:60px"></div>
        </header>
        
        <div class="settings-section">
            <div class="settings-label">Apariencia</div>
            <div class="settings-box">
                <div class="row" onclick="toggleTheme()">
                    <span>Modo Oscuro</span>
                    <div class="switch on" id="themeSwitch"></div>
                </div>
                <div class="row">
                    <span>Reducir movimiento</span>
                    <div class="switch"></div>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-label">Seguridad</div>
            <div class="settings-box">
                <div class="row"><span>Privacidad de cuenta</span> <span>Pública &rsaquo;</span></div>
                <div class="row" onclick="logout()" style="color: #FF3B30; font-weight: 600;"><span>Cerrar Sesión</span></div>
            </div>
        </div>
    </div>

    <div class="nav-wrapper" id="nav-bar" style="display: none;">
        <div class="nav-island">
            <div class="nav-btn active" onclick="navigate('feed')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                INICIO
            </div>
            <div class="btn-plus" onclick="toggleModal(true)">+</div>
            <div class="nav-btn" onclick="navigate('profile')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                PERFIL
            </div>
        </div>
    </div>

    <div class="ios-modal" id="post-modal">
        <div class="modal-sheet">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button onclick="toggleModal(false)" style="background: none; border: none; color: var(--ios-blue); font-size: 16px;">Cancelar</button>
                <b style="font-size: 17px;">Nuevo Post</b>
                <button onclick="pushPost()" style="background: var(--primary-metallic); border: none; color: white; padding: 6px 16px; border-radius: 20px; font-weight: 700;">Publicar</button>
            </div>
            <textarea id="post-area" class="ios-textarea" placeholder="¿Qué está pasando?"></textarea>
        </div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain:"vozanonimasm.firebaseapp.com",
        projectId:"vozanonimasm"
    });
    const db = firebase.firestore();
    let me = localStorage.getItem("user");

    /* ================= CONTROL DE NAVEGACIÓN ================= */
    function navigate(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        
        document.getElementById('nav-bar').style.display = (id === 'login') ? 'none' : 'flex';
        
        // Actualizar active state en nav
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if(id === 'feed') document.querySelectorAll('.nav-btn')[0].classList.add('active');
        if(id === 'profile') document.querySelectorAll('.nav-btn')[1].classList.add('active');

        if(id === 'feed') loadFeed();
        if(id === 'profile') document.getElementById('me-username').innerText = '@' + me;
    }

    /* ================= FUNCIONES CORE ================= */
    function handleLogin() {
        const u = document.getElementById('user-field').value;
        if(!u) return;
        me = u;
        localStorage.setItem("user", u);
        navigate('feed');
    }

    function toggleTheme() {
        const body = document.body;
        const sw = document.getElementById('themeSwitch');
        body.classList.toggle('light-mode');
        sw.classList.toggle('on');
        localStorage.setItem("theme", body.classList.contains('light-mode') ? "light" : "dark");
    }

    function toggleModal(show) {
        document.getElementById('post-modal').style.display = show ? 'flex' : 'none';
        if(show) document.getElementById('post-area').focus();
    }

    function loadFeed() {
        db.collection("posts").orderBy("created", "desc").onSnapshot(snap => {
            const container = document.getElementById('feed-render');
            container.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                const card = document.createElement('div');
                card.className = 'thread-card';
                card.innerHTML = `
                    <div class="avatar-main">${data.username.charAt(0).toUpperCase()}</div>
                    <div class="thread-content">
                        <div class="thread-user">@${data.username} <span class="verified">●</span></div>
                        <div class="thread-text">${data.text.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>')}</div>
                        <div class="thread-actions">
                            <div class="btn-act" onclick="likePost('${id}', ${data.likes || 0})">
                                <span>❤</span> <b>${data.likes || 0}</b>
                            </div>
                            <div class="btn-act"><span>💬</span> 0</div>
                            <div class="btn-act"><span>⇆</span></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    }

    function likePost(id, current) {
        db.collection("posts").doc(id).update({ likes: current + 1 });
        event.currentTarget.classList.add('liked');
    }

    function pushPost() {
        const txt = document.getElementById('post-area').value;
        if(!txt) return;
        db.collection("posts").add({
            username: me,
            text: txt,
            likes: 0,
            created: Date.now()
        }).then(() => {
            document.getElementById('post-area').value = "";
            toggleModal(false);
        });
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    // Inicialización
    if(localStorage.getItem("theme") === "light") toggleTheme();
    if(me) navigate('feed'); else navigate('login');

</script>
</body>
</html>
