<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSCOL | Tactical Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cian: #00f7ff; --neon-magenta: #ff00ff; --neon-yellow: #fff200;
            --bg-dark: #020210; --error: #ff0040;
        }

        * { user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background: var(--bg-dark); color: #fff;
            font-family: 'Press Start 2P', cursive; overflow: hidden;
            height: 100dvh; display: flex; flex-direction: column;
        }

        .crt {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 1000;
        }

        #app { flex: 1; display: flex; flex-direction: column; padding: 15px; position: relative; }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .screen.active { display: flex; }

        /* Login con solo Usuario */
        .auth-box {
            flex: 1; border: 2px solid var(--neon-cian); background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        input {
            width: 90%; background: #000; border: 1px solid var(--neon-cian);
            color: var(--neon-yellow); font-family: 'Share Tech Mono', monospace;
            padding: 15px; margin: 20px 0; font-size: 22px; text-align: center; outline: none;
        }

        .btn {
            background: var(--neon-cian); color: #000; border: none; padding: 20px;
            font-family: 'Press Start 2P'; width: 90%; cursor: pointer;
            box-shadow: 4px 4px 0 var(--neon-magenta); font-size: 10px;
        }

        /* Gameplay */
        .header {
            display: flex; justify-content: space-between; padding: 10px;
            border: 2px solid var(--neon-cian); font-size: 7px; margin-bottom: 10px;
        }

        .game-frame {
            flex: 1; border: 2px solid var(--neon-magenta); position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(5, 5, 20, 0.9); text-align: center;
        }

        .reaper-wrap {
            position: absolute; bottom: -100%; width: 100%; height: 50%;
            background: linear-gradient(transparent, #000 60%); transition: 0.5s;
            z-index: 100; display: flex; flex-direction: column; align-items: center;
        }
        .reaper-wrap.active { bottom: 0; }

        .pixel-reaper {
            width: 50px; height: 70px; background: #fff; 
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            animation: float 2s infinite ease-in-out;
            box-shadow: 0 0 30px var(--error);
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>
    <div class="crt"></div>

    <div id="app">
        <div id="screen-login" class="screen active">
            <div class="auth-box">
                <h1 style="color:var(--neon-cian); font-size:16px;">IDENT_SYSTEM</h1>
                <p style="font-size:7px; color: #555;">VOZANONIMASM v1.0</p>
                <input type="text" id="user-input" placeholder="ESCRIBE TU NICK">
                <button class="btn" onclick="login()">ACCEDER AL ARCADE</button>
            </div>
        </div>

        <div id="screen-game" class="screen">
            <div class="header">
                <div id="ui-lvl">LVL: 01</div>
                <div id="ui-id">ID: ---</div>
                <div id="ui-lives">❤❤❤</div>
            </div>
            
            <div class="game-frame">
                <div id="q-text" style="font-size:11px; padding:20px; line-height: 1.5;">...</div>
                <input type="text" id="ans-input" placeholder="TU RESPUESTA..." style="font-size: 16px; border-color: var(--neon-yellow);">
                <button class="btn" onclick="check()">VALIDAR</button>

                <div class="reaper-wrap" id="reaper-ui">
                    <div id="reaper-msg" style="color:var(--error); font-size:8px; padding:20px;"></div>
                    <div class="pixel-reaper"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
            authDomain: "vozanonimasm.firebaseapp.com",
            projectId: "vozanonimasm",
            storageBucket: "vozanonimasm.firebasestorage.app",
            messagingSenderId: "533740152067",
            appId: "1:533740152067:web:1ec05c7842f09a9e32f536"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userID = "";
        let state = { lvl: 1, lives: 3 };

        const puzzles = [
            {q: "¿Color del neón secundario?", a: "magenta"},
            {q: "LÓGICA: 2, 4, 16, 256, ?", a: "65536"},
            {q: "Escribe 'JSCOL' al revés", a: "locsj"},
            {q: "¿Premio mayor en COP?", a: "10000"},
            {q: "BINARIO: 1010 es...", a: "10"}
        ];

        window.login = async () => {
            const user = document.getElementById('user-input').value.trim().toUpperCase();
            if(!user) return;
            
            userID = user;
            const userRef = doc(db, "players", userID);
            const snap = await getDoc(userRef);

            if(snap.exists()) {
                state.lvl = snap.data().lvl || 1;
            } else {
                await setDoc(userRef, { lvl: 1 });
            }

            document.getElementById('screen-login').style.display = "none";
            document.getElementById('screen-game').classList.add('active');
            load();
        };

        function load() {
            if(state.lvl > puzzles.length) {
                document.getElementById('q-text').innerText = "¡SISTEMA COMPLETADO!";
                return;
            }
            document.getElementById('ui-lvl').innerText = "LVL: " + (state.lvl < 10 ? "0"+state.lvl : state.lvl);
            document.getElementById('ui-id').innerText = "ID: " + userID;
            document.getElementById('q-text').innerText = puzzles[state.lvl-1].q;
            document.getElementById('ans-input').value = "";
            renderHearts();
        }

        window.check = async () => {
            const val = document.getElementById('ans-input').value.toLowerCase().trim();
            if(val === puzzles[state.lvl-1].a) {
                state.lvl++;
                await setDoc(doc(db, "players", userID), { lvl: state.lvl }, { merge: true });
                load();
            } else {
                state.lives--;
                trigger();
            }
        };

        function renderHearts() {
            let h = "";
            for(let i=0; i<3; i++) h += i < state.lives ? "❤" : "🖤";
            document.getElementById('ui-lives').innerText = h;
        }

        function trigger() {
            const ui = document.getElementById('reaper-ui');
            document.getElementById('reaper-msg').innerText = "FALLASTE. LA PARCA TE OBSERVA...";
            ui.classList.add('active');
            if(navigator.vibrate) navigator.vibrate(200);
            setTimeout(() => {
                ui.classList.remove('active');
                renderHearts();
                if(state.lives <= 0) location.reload();
            }, 2500);
        }
    </script>
</body>
</html>
