<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voz Anónima</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="tutorial" class="tutorial">
  <h2>👁️ Voz Anónima</h2>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none;">

  <div class="topbar">
    Voz Anónima
    <button class="config-btn" onclick="toggleConfig()">⚙️</button>
  </div>

  <!-- CONFIG -->
  <div id="config" class="config">
    <h3>Configuración</h3>

    <input id="configUser" placeholder="Cambiar usuario">

    <button onclick="cambiarUsuario()">Guardar usuario</button>

    <button onclick="toggleTheme()">Modo oscuro / claro</button>

    <button onclick="toggleConfig()">Cerrar</button>
  </div>

  <div class="composer">
    <input id="username" disabled>
  </div>

  <div class="post-box">
    <textarea id="inputChisme" placeholder="¿Qué estás pensando?"></textarea>
    <button onclick="enviarChisme()">Publicar</button>
  </div>

  <div id="feed"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
