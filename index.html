<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Social App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="auth">

  <div class="login-card">

    <h2>Acceder</h2>

    <input id="user" placeholder="Usuario">
    <input id="phone" placeholder="Teléfono">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="register()">Crear cuenta</button>
    <button onclick="login()">Entrar</button>

  </div>

</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="topbar">
    <span id="me"></span>
  </div>

  <div class="post-box">
    <textarea id="postText" placeholder="Escribe algo..."></textarea>
    <button onclick="createPost()">Publicar</button>
  </div>

  <div id="feed"></div>

  <div class="bottom-nav">
    <button onclick="loadFeed()">Inicio</button>
    <button onclick="openProfile()">Perfil</button>
    <button onclick="openSettings()">Ajustes</button>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings" style="display:none;" class="panel">

  <h3>Configuración</h3>

  <button onclick="toggleTheme()">Modo oscuro/claro</button>
  <button onclick="toggleLang()">Idioma ES/EN</button>
  <button onclick="logout()">Cerrar sesión</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
