<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSCOL | Final Protocol PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cian: #00f7ff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #fff200;
            --bg-dark: #050512;
            --error: #ff0040;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { 
            user-select: none; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; outline: none; 
        }
        
        body {
            margin: 0; background: var(--bg-dark); color: #fff;
            font-family: 'Share Tech Mono', monospace; overflow: hidden;
            height: 100dvh; display: flex; flex-direction: column;
        }

        .crt {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 1001;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; position: absolute; bottom: 100%; animation: scanline 8s linear infinite; pointer-events: none;
        }

        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100%; } }

        #app { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; z-index: 10; }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .screen.active { display: flex; animation: glitchTransition 0.3s ease; }

        @keyframes glitchTransition {
            0% { transform: skew(5deg); opacity: 0; }
            50% { transform: skew(-5deg); opacity: 0.5; }
            100% { transform: skew(0); opacity: 1; }
        }

        .auth-box {
            flex: 1; border: 2px solid var(--neon-cian); background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; box-shadow: 0 0 20px rgba(0, 247, 255, 0.2); position: relative;
        }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 14px; color: var(--neon-cian); text-shadow: 0 0 10px var(--neon-cian); }

        input {
            width: 100%; background: rgba(0, 20, 40, 0.5); border: 1px solid var(--neon-cian);
            color: var(--neon-yellow); font-family: 'Share Tech Mono', monospace;
            padding: 18px; font-size: 20px; text-align: center; margin: 20px 0;
        }

        .btn {
            background: var(--neon-cian); color: #000; border: none; padding: 20px;
            font-family: 'Press Start 2P', cursive; width: 100%; cursor: pointer;
            font-size: 9px; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .header {
            display: flex; justify-content: space-between; padding: 12px;
            border: 1px solid rgba(0, 247, 255, 0.3); background: var(--glass); margin-bottom: 15px; font-size: 9px;
        }

        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.05); margin-bottom: 20px; }
        .progress-fill { height: 100%; background: var(--neon-cian); width: 0%; transition: 0.6s; }

        .game-frame {
            flex: 1; border: 1px solid rgba(255, 0, 255, 0.3); position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6); padding: 20px; text-align: center;
        }

        .reaper-wrap {
            position: absolute; bottom: -120%; width: 100%; height: 60%;
            background: linear-gradient(transparent, #000 70%); transition: 0.7s;
            z-index: 100; display: flex; flex-direction: column; align-items: center; pointer-events: none;
        }
        .reaper-wrap.active { bottom: 0; }

        .pixel-reaper {
            width: 60px; height: 80px; background: #fff; clip-path: polygon(50% 0%, 100% 100%, 80% 90%, 50% 100%, 20% 90%, 0% 100%);
            animation: float 2.5s infinite ease-in-out; box-shadow: 0 0 40px var(--error);
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }

        .code-box {
            background: #000; border: 2px dashed var(--neon-yellow); padding: 20px; 
            margin: 25px 0; color: var(--neon-yellow); font-family: 'Press Start 2P'; font-size: 9px;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>
    <div class="crt"></div>
    <div class="scanline"></div>

    <div id="app">
        <section id="screen-login" class="screen active">
            <div class="auth-box">
                <h1>JSCOL ARCADE</h1>
                <input type="text" id="user-input" placeholder="NICKNAME" autocomplete="off">
                <button class="btn" onclick="login()">INICIALIZAR</button>
            </div>
        </section>

        <section id="screen-game" class="screen">
            <div class="header">
                <div>ID: <span id="ui-id">---</span></div>
                <div id="ui-lvl">LVL: 01</div>
                <div id="ui-lives">❤❤❤</div>
            </div>
            <div class="progress-container"><div class="progress-fill" id="ui-progress"></div></div>
            <div class="game-frame" id="main-frame">
                <div id="q-text" style="font-size: 16px; margin-bottom: 30px;">Cargando...</div>
                <div id="game-controls" style="width:100%">
                    <input type="text" id="ans-input" placeholder="RESPUESTA" autocomplete="off">
                    <button class="btn" onclick="check()">VALIDAR</button>
                </div>
                <div id="reward-ui" style="display:none">
                    <div class="code-box" id="final-code-display"></div>
                    <button class="btn" onclick="claimReward()" style="background:var(--neon-yellow)">RECLAMAR PREMIO</button>
                </div>
                <div class="reaper-wrap" id="reaper-ui">
                    <div style="color:var(--error); margin: 20px;" id="reaper-msg">TE VEO...</div>
                    <div class="pixel-reaper"></div>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
            authDomain: "vozanonimasm.firebaseapp.com",
            projectId: "vozanonimasm",
            storageBucket: "vozanonimasm.firebasestorage.app",
            messagingSenderId: "533740152067",
            appId: "1:533740152067:web:1ec05c7842f09a9e32f536"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type==='success'){ osc.type='square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime+0.2); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime+0.2); }
            else if(type==='error'){ osc.type='sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime+0.4); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime+0.4); }
        }

        let userID = "";
        let state = { lvl: 1, lives: 3, finalCode: "" };
        const puzzles = [
            {q: "¿Color del neón secundario?", a: "magenta"},
            {q: "LÓGICA: 2, 4, 16, 256, ?", a: "65536"},
            {q: "Escribe 'JSCOL' al revés", a: "locsj"},
            {q: "¿Premio mayor en COP?", a: "10000"},
            {q: "Si 3 gatos cazan 3 ratones en 3 min, ¿1 tarda?", a: "3"},
            {q: "¿Qué analiza JSCOL que otros no ven?", a: "detalles"},
            {q: "Escribe 'ESTRATEGA' sin vocales", a: "strtg"},
            {q: "¿En qué año estamos?", a: "2026"},
            {q: "¿Color del neón primario?", a: "cian"},
            {q: "BINARIO: 1010 es...", a: "10"},
            {q: "JSCOL prefiere lo genérico o lo...", a: "unico"},
            {q: "Oro parece, plata no es...", a: "platano"},
            {q: "The Retro ___ Begins Now", a: "adventure"},
            {q: "Mezcla de Cian y Magenta resulta en...", a: "azul"},
            {q: "Fibonacci: 1, 1, 2, 3, 5, 8, ?", a: "13"},
            {q: "Cuadrados: 1, 4, 9, 16, 25, ?", a: "36"},
            {q: "Tiene dientes pero no muerde...", a: "peine"},
            {q: "¿Vidas iniciales del sistema?", a: "3"},
            {q: "Escribe 'RETR0' con un cero", a: "retr0"},
            {q: "¿Quién es el dueño del arcade?", a: "jscol"}
        ];

        window.login = async () => {
            const input = document.getElementById('user-input').value.trim().toUpperCase();
            if(!input) return;
            userID = input;
            const snap = await getDoc(doc(db, "players", userID));
            if(snap.exists()) state.lvl = snap.data().lvl || 1;
            else await setDoc(doc(db, "players", userID), { lvl: 1 });
            document.getElementById('screen-login').style.display = "none";
            document.getElementById('screen-game').classList.add('active');
            render();
        };

        function render() {
            if(state.lvl > puzzles.length) { finish(); return; }
            document.getElementById('ui-lvl').innerText = "LVL: " + (state.lvl < 10 ? "0"+state.lvl : state.lvl);
            document.getElementById('ui-id').innerText = userID;
            document.getElementById('q-text').innerText = puzzles[state.lvl-1].q;
            document.getElementById('ans-input').value = "";
            document.getElementById('ui-progress').style.width = (state.lvl / puzzles.length * 100) + "%";
            updateHearts();
        }

        window.check = async () => {
            const val = document.getElementById('ans-input').value.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            if(val === puzzles[state.lvl-1].a) {
                playSound('success'); state.lvl++;
                await setDoc(doc(db, "players", userID), { lvl: state.lvl }, { merge: true });
                render();
            } else {
                playSound('error'); state.lives--;
                triggerReaper();
            }
        };

        function triggerReaper() {
            const ui = document.getElementById('reaper-ui');
            ui.classList.add('active');
            if(navigator.vibrate) navigator.vibrate(200);
            setTimeout(() => {
                ui.classList.remove('active');
                updateHearts();
                if(state.lives <= 0) location.reload();
            }, 2000);
        }

        function updateHearts() {
            let h = "";
            for(let i=0; i<3; i++) h += i < state.lives ? "❤" : "🖤";
            document.getElementById('ui-lives').innerText = h;
        }

        function finish() {
            state.finalCode = "JSCOL-" + userID + "-" + Math.floor(1000 + Math.random()*9000);
            document.getElementById('q-text').innerText = "SISTEMA COMPLETADO";
            document.getElementById('game-controls').style.display = "none";
            document.getElementById('reward-ui').style.display = "block";
            document.getElementById('final-code-display').innerText = "CÓDIGO DE VICTORIA: " + state.finalCode;
        }

        window.claimReward = () => {
            const msg = encodeURIComponent(`¡He completado el ARCADE! Nick: ${userID} | Código: ${state.finalCode}`);
            window.open(`https://wa.me/573043329665?text=${msg}`, '_blank');
        };
    </script>
</body>
</html>
