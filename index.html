<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant</title>

<style>
:root{
  --bg:#0b0b0f;
  --card:#141419;
  --text:#f5f5f7;
  --muted:#8e8e93;
  --accent:#3897f0;

  --glass:rgba(20,20,24,0.55);
  --stroke:rgba(255,255,255,0.08);
}

.light{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#0b0b0f;
  --muted:#6b6b70;
  --glass:rgba(255,255,255,0.65);
  --stroke:rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= WELCOME ================= */
#welcome{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:10px;
  animation:fadeIn .8s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

.logo{
  font-size:38px;
  font-weight:700;
  letter-spacing:-1px;
}

.sub{
  color:var(--muted);
  font-size:14px;
}

.btn{
  margin-top:20px;
  padding:12px 18px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
}

/* ================= SCREENS STACK ================= */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:100%;
  background:var(--bg);
  transition:.38s cubic-bezier(.2,.8,.2,1);
  overflow:auto;
}

.screen.active{
  left:0;
}

/* ================= TOPBAR ================= */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  border-bottom:1px solid var(--stroke);
  backdrop-filter:blur(14px);
}

.title{
  font-weight:700;
  letter-spacing:-0.3px;
}

/* ================= LOGIN ================= */
.login{
  display:flex;
  flex-direction:column;
  justify-content:center;
  height:100%;
  padding:24px;
  gap:10px;
}

input{
  padding:13px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:var(--card);
  color:var(--text);
  outline:none;
}

/* ================= FEED ================= */
.feed{
  padding-bottom:100px;
}

.post{
  padding:14px;
  border-bottom:1px solid var(--stroke);
  animation:pop .25s ease;
}

@keyframes pop{
  from{transform:translateY(6px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

.postHeader{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:linear-gradient(135deg,#2c2c2e,#3a3a3c);
}

.username{
  font-weight:600;
  font-size:14px;
}

.image{
  width:100%;
  height:280px;
  background:var(--card);
  border-radius:16px;
}

/* ================= ACTIONS ================= */
.actions{
  display:flex;
  gap:14px;
  margin-top:10px;
  font-size:13px;
  color:var(--muted);
}

/* ================= NAV iOS GLASS ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:64px;

  display:flex;
  justify-content:space-around;
  align-items:center;

  background:var(--glass);
  backdrop-filter:blur(28px) saturate(1.8);
  -webkit-backdrop-filter:blur(28px);

  border:1px solid var(--stroke);
  border-radius:22px;

  box-shadow:0 10px 35px rgba(0,0,0,0.35);
}

/* ICONS */
.icon{
  width:22px;
  height:22px;
  fill:var(--text);
  opacity:0.85;
}

/* ================= PROFILE ================= */
.profile{
  padding:16px;
}

.headerProfile{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
}

.bigAvatar{
  width:66px;
  height:66px;
  border-radius:50%;
  background:linear-gradient(135deg,#2c2c2e,#3a3a3c);
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.grid div{
  height:120px;
  background:var(--card);
}

.hidden{display:none}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome">
  <div class="logo">Instant</div>
  <div class="sub">Share moments, not noise</div>
  <button class="btn" onclick="goLogin()">Continuar</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <div class="login">
    <h2>Bienvenido</h2>
    <input id="user" placeholder="usuario">
    <input id="pass" type="password" placeholder="contraseña">
    <button class="btn" onclick="login()">Entrar</button>
    <button class="btn" onclick="register()">Crear cuenta</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">

  <div class="topbar">
    <div class="title">Instant</div>
    <div onclick="toggleTheme()">◐</div>
  </div>

  <div id="feed" class="feed"></div>

  <div class="nav">

    <svg class="icon" onclick="loadFeed()" viewBox="0 0 24 24">
      <path d="M3 10l9-7 9 7v10a2 2 0 0 1-2 2h-5v-6H10v6H5a2 2 0 0 1-2-2z"/>
    </svg>

    <svg class="icon" onclick="createPost()" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14"/>
    </svg>

    <svg class="icon" onclick="openProfile()" viewBox="0 0 24 24">
      <path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/>
    </svg>

  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">

  <div class="topbar">
    <div onclick="back()">←</div>
    <div class="title">Perfil</div>
  </div>

  <div id="profileBox" class="profile"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
 apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
 authDomain:"vozanonimasm.firebaseapp.com",
 projectId:"vozanonimasm"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let currentUser=JSON.parse(localStorage.getItem("user"))||null;

/* AUTO LOGIN */
if(currentUser){
  showApp();
}

/* NAV */
function goLogin(){
  welcome.style.display="none";
  login.classList.add("active");
}

function showApp(){
  login.classList.remove("active");
  app.classList.add("active");
  loadFeed();
}

/* AUTH */
async function login(){
  const snap=await db.collection("users")
  .where("username","==",user.value)
  .where("password","==",pass.value)
  .get();

  if(snap.empty) return alert("error");

  currentUser=snap.docs[0].data();
  localStorage.setItem("user",JSON.stringify(currentUser));

  showApp();
}

async function register(){
  await db.collection("users").add({
    username:user.value,
    password:pass.value
  });
}

/* FEED */
function loadFeed(){
  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{
    let html="";

    s.forEach(d=>{
      let p=d.data();

      html+=`
      <div class="post">

        <div class="postHeader">
          <div class="avatar"></div>
          <div class="username">@${p.username}</div>
        </div>

        <div class="image"></div>

        <div class="actions">
          <div>like</div>
          <div>comment</div>
        </div>

        <div>${p.text}</div>

      </div>`;
    });

    feed.innerHTML=html;
  });
}

/* POST */
function createPost(){
  let t=prompt("texto");

  db.collection("posts").add({
    username:currentUser.username,
    text:t,
    created:Date.now()
  });
}

/* PROFILE */
function openProfile(){
  app.classList.remove("active");
  profile.classList.add("active");

  db.collection("posts")
  .where("username","==",currentUser.username)
  .get()
  .then(s=>{
    let html=`
    <div class="headerProfile">
      <div class="bigAvatar"></div>
      <div>@${currentUser.username}</div>
    </div>
    <div class="grid">`;

    s.forEach(()=>html+=`<div></div>`);

    html+=`</div>`;
    profileBox.innerHTML=html;
  });
}

function back(){
  profile.classList.remove("active");
  app.classList.add("active");
}

function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
