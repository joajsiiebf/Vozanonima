<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voz Social</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TUTORIAL -->
<div id="tutorial" class="tutorial">
  <h2>👁️ Voz Social</h2>
  <button onclick="entrar()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- TOP -->
  <div class="topbar">
    <span>Voz Social</span>
    <button onclick="toggleConfig()">⚙️</button>
  </div>

  <!-- CONFIG -->
  <div id="config" class="config">
    <input id="configUser" placeholder="Cambiar usuario">
    <button onclick="cambiarUsuario()">Guardar</button>
    <button onclick="toggleTheme()">🌙 Modo</button>
  </div>

  <!-- STORIES -->
  <div id="stories"></div>

  <!-- POST -->
  <div class="post-box">
    <textarea id="inputChisme" placeholder="¿Qué estás pensando?"></textarea>
    <button onclick="enviarPost()">Publicar</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
