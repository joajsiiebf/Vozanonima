<!DOCTYPE html>
<html>
<head>
  <title>Social App</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase COMPAT (IMPORTANTE) -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>

<body>

<div id="auth">
  <input id="phone" placeholder="Teléfono">
  <input id="pass" placeholder="Contraseña">
  <input id="user" placeholder="Usuario (registro)">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div id="app" style="display:none;">

  <div class="topbar">
    <span id="me"></span>
  </div>

  <div id="feedView"></div>
  <div id="profileView" style="display:none"></div>
  <div id="chatView" style="display:none">
    <div id="messages"></div>
    <div class="chat-input">
      <input id="msgInput">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="bottom-nav">
    <button onclick="showView('home')">Home</button>
    <button onclick="showView('profile')">Profile</button>
    <button onclick="showView('chat')">Chat</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
