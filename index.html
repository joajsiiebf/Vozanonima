<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InstaLite Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginView" class="view">
  <div class="card">

    <h2>InstaLite</h2>

    <input id="loginPhone" placeholder="Teléfono o admin">
    <input id="loginPass" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <hr>

    <h3>Crear cuenta</h3>

    <input id="regUser" placeholder="Username">
    <input id="regPhone" placeholder="Teléfono">
    <input id="regPass" type="password" placeholder="Contraseña">

    <button onclick="register()">Registrar</button>

  </div>
</div>

<!-- APP -->
<div id="appView" class="view hidden">

  <!-- HEADER -->
  <header class="topbar">
    <span>InstaLite</span>
    <span id="roleBadge"></span>
  </header>

  <!-- STORIES -->
  <div class="stories">
    <div class="story">+</div>
  </div>

  <!-- COMPOSER -->
  <div class="composer">
    <input id="postText" placeholder="Escribe algo...">
    <button onclick="createPost()">Publicar</button>
  </div>

  <!-- FEED -->
  <section id="feedView" class="feed"></section>

  <!-- PROFILE -->
  <section id="profileView" class="screen hidden"></section>

  <!-- SETTINGS -->
  <section id="settingsView" class="screen hidden">
    <button onclick="toggleTheme()">Modo oscuro</button>
    <button onclick="logout()">Salir</button>
  </section>

  <!-- NAV -->
  <nav class="nav">

    <button onclick="go('feedView')">🏠</button>
    <button onclick="go('profileView'); loadProfile()">👤</button>
    <button onclick="go('settingsView')">⚙️</button>

  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
