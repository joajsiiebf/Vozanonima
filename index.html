<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant</title>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#0b0b10;
  color:white;
  overflow:hidden;
}

/* ================= APP ROOT ================= */
#app{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

/* ================= SCREEN SYSTEM ================= */
.screen{
  position:absolute;
  inset:0;
  opacity:0;
  transform:translateX(30px);
  pointer-events:none;
  transition:.35s cubic-bezier(.2,.8,.2,1);
  background:#0b0b10;
}

.screen.active{
  opacity:1;
  transform:translateX(0);
  pointer-events:auto;
}

/* ================= HEADER ================= */
.header{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-weight:700;
  align-items:center;
}

/* ================= FEED ================= */
.post{
  margin:10px;
  padding:14px;
  background:#15151c;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.05);
  animation:fade .2s ease;
}

@keyframes fade{
  from{opacity:0;transform:scale(.98)}
  to{opacity:1;transform:scale(1)}
}

/* ================= NAV ================= */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:60px;
  background:rgba(20,20,25,0.7);
  backdrop-filter:blur(20px);
  border-radius:20px;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

/* ================= BUTTON ================= */
.btn{
  padding:8px 12px;
  background:#7c3aed;
  border:none;
  border-radius:10px;
  color:white;
}

</style>
</head>

<body>

<div id="app">

<!-- FEED -->
<div id="feed" class="screen active">

  <div class="header">
    <div>Instant</div>
    <button class="btn" onclick="router.push('settings')">⚙</button>
  </div>

  <div id="feedBox"></div>

  <div class="nav">
    <button onclick="router.replace('feed')">Home</button>
    <button onclick="router.push('create')">+</button>
    <button onclick="router.push('profile')">Perfil</button>
  </div>

</div>

<!-- CREATE -->
<div id="create" class="screen">

  <div class="header">
    <button class="btn" onclick="router.back()">←</button>
    Crear post
  </div>

  <div style="padding:16px">
    <textarea id="text" style="width:100%;height:120px"></textarea>
    <button class="btn" onclick="createPost()">Publicar</button>
  </div>

</div>

<!-- PROFILE -->
<div id="profile" class="screen">

  <div class="header">
    <button class="btn" onclick="router.back()">←</button>
    Perfil
  </div>

  <div style="padding:16px">
    <h3 id="me"></h3>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings" class="screen">

  <div class="header">
    <button class="btn" onclick="router.back()">←</button>
    Settings
  </div>

  <div style="padding:16px">
    <button class="btn" onclick="logout()">Logout</button>
  </div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */
firebase.initializeApp({
  apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
  authDomain:"vozanonimasm.firebaseapp.com",
  projectId:"vozanonimasm"
});

const db=firebase.firestore();

/* ================= ROUTER ENGINE PRO ================= */
const router={
  stack:["feed"],

  get current(){
    return this.stack[this.stack.length-1];
  },

  render(){
    document.querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));

    document.getElementById(this.current)
    .classList.add("active");
  },

  push(screen){
    if(this.current===screen) return;
    this.stack.push(screen);
    this.render();
  },

  replace(screen){
    this.stack=[screen];
    this.render();
  },

  back(){
    if(this.stack.length>1){
      this.stack.pop();
      this.render();
    }
  }
};

/* ================= USER ================= */
let me="Jscol_Owner";

/* ================= FEED ================= */
function loadFeed(){

  db.collection("posts")
  .orderBy("created","desc")
  .onSnapshot(s=>{

    let html="";

    s.forEach(d=>{

      let p=d.data();

      html+=`
      <div class="post">
        <b>@${p.username}</b>
        <p>${p.text}</p>
      </div>`;
    });

    feedBox.innerHTML=html;

  });

}

/* ================= CREATE ================= */
function createPost(){

  let t=text.value;
  if(!t) return;

  db.collection("posts").add({
    username:me,
    text:t,
    created:Date.now()
  });

  router.back();

}

/* ================= AUTH CLEAN EXIT ================= */
function logout(){
  location.reload();
}

/* ================= INIT ================= */
loadFeed();
router.render();

</script>

</body>
</html>
