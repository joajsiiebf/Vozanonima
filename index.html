<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INSTANT Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: linear-gradient(135deg, #C04FBA 0%, #7A2C76 100%);
            --bg: #000000; --card: #1C1C1E; --text: #FFFFFF;
            --border: rgba(255, 255, 255, 0.1); --muted: #8E8E93;
            --ios-blue: #0A84FF; --glass: rgba(15, 15, 15, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: #000; color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
        }

        /* VIEWPORT & ROUTER */
        #app-shell {
            width: 100%; max-width: 430px; background: var(--bg);
            height: 100%; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .view {
            position: absolute; inset: 0; display: none;
            flex-direction: column; background: var(--bg); z-index: 10;
            padding-bottom: 90px; overflow-y: auto;
        }
        .view.active { display: flex; animation: slideIn 0.3s cubic-bezier(0.1, 0.7, 0.1, 1); }

        @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* UI COMPONENTS */
        .header {
            position: sticky; top: 0; padding: 20px;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 0.5px solid var(--border); z-index: 100;
        }

        .logo { font-weight: 800; background: var(--primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px; letter-spacing: -1.2px; }

        /* POST & INTERACTIONS */
        .post { padding: 16px; border-bottom: 0.5px solid var(--border); display: flex; gap: 12px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; cursor: pointer; }
        .post-content { flex: 1; }
        .post-user { font-weight: 700; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .post-text { font-size: 15px; line-height: 1.4; margin-bottom: 12px; }
        
        .actions { display: flex; gap: 24px; }
        .action-btn { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; cursor: pointer; transition: 0.2s; }
        .action-btn.liked { color: #FF2D55; }

        /* PROFILE */
        .profile-header { padding: 30px 20px; text-align: center; border-bottom: 0.5px solid var(--border); }
        .stats { display: flex; justify-content: center; gap: 35px; margin: 20px 0; }
        .stat-val { display: block; font-size: 18px; font-weight: 800; }
        .stat-lab { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-follow { 
            padding: 8px 30px; border-radius: 20px; border: none; font-weight: 700; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-follow.following { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-follow.not-following { background: #FFFFFF; color: #000; }

        /* NAV BAR */
        .nav-bar {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 65px; background: var(--primary); border-radius: 32px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
        }
        .nav-item { color: white; opacity: 0.6; font-size: 10px; font-weight: 800; text-align: center; cursor: pointer; }
        .nav-item.active { opacity: 1; }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 2px; }

        /* NOTIFICATIONS BADGE */
        .badge { position: absolute; top: -5px; right: -5px; background: #FF3B30; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid #7A2C76; }

        /* MODAL POST */
        .composer { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="app-shell">
    <div id="view-auth" class="view active" style="justify-content: center; padding: 40px; text-align: center;">
        <div class="logo" style="font-size: 50px; margin-bottom: 40px;">INSTANT</div>
        <input id="in-username" style="width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: var(--card); color: white; margin-bottom: 15px;" placeholder="Username">
        <button onclick="Router.auth()" style="width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: 700;">Entrar</button>
    </div>

    <div id="view-feed" class="view">
        <header class="header">
            <div class="logo">INSTANT</div>
            <div onclick="Router.go('notifications')" style="position:relative; cursor:pointer">
                🔔 <span id="notif-count" class="badge" style="display:none">0</span>
            </div>
        </header>
        <div id="feed-items"></div>
    </div>

    <div id="view-profile" class="view">
        <header class="header">
            <div onclick="Router.back()" style="color:var(--ios-blue); cursor:pointer">← Atrás</div>
            <div id="profile-user-title" class="logo" style="font-size:18px">PERFIL</div>
            <div onclick="Router.logout()" style="color:#FF3B30; font-size:12px; font-weight:700">SALIR</div>
        </header>
        <div id="profile-content"></div>
    </div>

    <div id="view-notifications" class="view">
        <header class="header">
            <div onclick="Router.back()" style="color:var(--ios-blue); cursor:pointer">← Volver</div>
            <div class="logo">ACTIVIDAD</div>
            <div style="width:40px"></div>
        </header>
        <div id="notif-list"></div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <div class="nav-item active" onclick="Router.go('feed')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            INICIO
        </div>
        <div onclick="UI.openComposer()" style="width:55px; height:55px; background:white; border-radius:50%; margin-top:-35px; display:flex; align-items:center; justify-content:center; color:#7A2C76; font-size:28px; cursor:pointer; border:5px solid var(--bg)">+</div>
        <div class="nav-item" onclick="Router.viewProfile(State.me)">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            PERFIL
        </div>
    </nav>

    <div id="modal-composer" class="composer">
        <div class="header">
            <span onclick="UI.closeComposer()" style="color:var(--ios-blue); cursor:pointer">Cerrar</span>
            <b>Nuevo Post</b>
            <button onclick="Social.post()" style="background:var(--primary); border:none; padding:8px 18px; border-radius:20px; color:white; font-weight:700">Postear</button>
        </div>
        <textarea id="composer-text" style="flex:1; padding:20px; background:transparent; border:none; color:white; font-size:18px; resize:none" placeholder="¿Qué tienes en mente?"></textarea>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey:"AIzaSyDln6EBV5vvYf0HzgAqdH8J6OAxIeO50JU",
        authDomain:"vozanonimasm.firebaseapp.com",
        projectId:"vozanonimasm"
    });
    const db = firebase.firestore();

    // 1. ESTADO GLOBAL
    const State = {
        me: localStorage.getItem('inst_u'),
        cid: localStorage.getItem('inst_c'),
        history: ['feed'],
        notifCount: 0
    };

    // 2. ROUTER & AUTH
    const Router = {
        auth() {
            const u = document.getElementById('in-username').value.trim().toLowerCase();
            if(u.length < 3) return;
            State.me = u;
            State.cid = 'cid_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('inst_u', u);
            localStorage.setItem('inst_c', State.cid);
            db.collection("users").doc(u).set({ username: u, followers: 0, following: 0 }, { merge: true });
            this.go('feed');
        },
        go(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
            document.getElementById('app-nav').style.display = (id === 'auth') ? 'none' : 'flex';
            if(id !== State.history[State.history.length - 1]) State.history.push(id);
            if(id === 'feed') Social.loadFeed();
            if(id === 'notifications') Social.loadNotifications();
        },
        back() {
            if(State.history.length > 1) {
                State.history.pop();
                this.go(State.history[State.history.length - 1]);
            }
        },
        viewProfile(u) {
            State.viewing = u;
            this.go('profile');
            Social.loadProfile(u);
        },
        logout() { localStorage.clear(); location.reload(); }
    };

    // 3. SOCIAL ENGINE (RELEVANCE & GRAPH)
    const Social = {
        async loadFeed() {
            const container = document.getElementById('feed-items');
            // Enfoque Algorítmico: Cargar seguidos primero
            const followSnap = await db.collection("follows").where("follower", "==", State.me).get();
            const following = followSnap.docs.map(d => d.data().following);
            following.push(State.me); // Incluirme a mi mismo

            // Cargar posts de mis seguidos (Checklist 4)
            db.collection("posts")
              .where("user", "in", following.slice(0, 10)) // Limitado por Firebase 'in' rules
              .orderBy("created", "desc")
              .limit(20)
              .onSnapshot(snap => {
                  container.innerHTML = "";
                  snap.forEach(doc => container.appendChild(UI.renderPost(doc.id, doc.data())));
              });
        },

        async post() {
            const text = document.getElementById('composer-text').value;
            if(!text) return;
            await db.collection("posts").add({
                user: State.me, text, created: Date.now(), likes: 0
            });
            UI.closeComposer();
            document.getElementById('composer-text').value = "";
        },

        async toggleFollow(target) {
            const id = `${State.me}_${target}`;
            const ref = db.collection("follows").doc(id);
            const doc = await ref.get();

            const batch = db.batch();
            if(!doc.exists) {
                batch.set(ref, { follower: State.me, following: target, created: Date.now() });
                batch.update(db.collection("users").doc(State.me), { following: firebase.firestore.FieldValue.increment(1)});
                batch.update(db.collection("users").doc(target), { followers: firebase.firestore.FieldValue.increment(1)});
                Social.notify(target, 'follow');
            } else {
                batch.delete(ref);
                batch.update(db.collection("users").doc(State.me), { following: firebase.firestore.FieldValue.increment(-1)});
                batch.update(db.collection("users").doc(target), { followers: firebase.firestore.FieldValue.increment(-1)});
            }
            await batch.commit();
            Router.viewProfile(target);
        },

        async toggleLike(postId, owner) {
            const id = `${State.me}_${postId}`;
            const ref = db.collection("likes").doc(id);
            const doc = await ref.get();
            
            if(!doc.exists) {
                await ref.set({ u: State.me, p: postId });
                await db.collection("posts").doc(postId).update({ likes: firebase.firestore.FieldValue.increment(1)});
                if(owner !== State.me) Social.notify(owner, 'like');
            } else {
                await ref.delete();
                await db.collection("posts").doc(postId).update({ likes: firebase.firestore.FieldValue.increment(-1)});
            }
        },

        notify(to, type) {
            db.collection("notifications").add({
                to, from: State.me, type, created: Date.now(), read: false
            });
        },

        loadNotifications() {
            db.collection("notifications").where("to", "==", State.me).orderBy("created", "desc").onSnapshot(snap => {
                const list = document.getElementById('notif-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const n = doc.data();
                    const item = document.createElement('div');
                    item.className = 'post';
                    item.innerHTML = `<b>@${n.from}</b> ${n.type === 'like' ? 'le dio like a tu post' : 'empezó a seguirte'}`;
                    list.appendChild(item);
                });
            });
        },

        async loadProfile(u) {
            const data = (await db.collection("users").doc(u).get()).data() || {followers:0, following:0};
            const isFollowing = (await db.collection("follows").doc(`${State.me}_${u}`).get()).exists;
            
            document.getElementById('profile-content').innerHTML = `
                <div class="profile-header">
                    <div class="avatar" style="width:80px; height:80px; margin:0 auto 15px; font-size:30px">${u[0].toUpperCase()}</div>
                    <h2 style="margin:0">@${u}</h2>
                    <div class="stats">
                        <div class="stat-item"><span class="stat-val">${data.followers}</span><span class="stat-lab">Followers</span></div>
                        <div class="stat-item"><span class="stat-val">${data.following}</span><span class="stat-lab">Following</span></div>
                    </div>
                    ${u !== State.me ? `<button onclick="Social.toggleFollow('${u}')" class="btn-follow ${isFollowing?'following':'not-following'}">${isFollowing?'Siguiendo':'Seguir'}</button>` : ''}
                </div>
            `;
        }
    };

    // 4. UI RENDERER
    const UI = {
        renderPost(id, data) {
            const div = document.createElement('div');
            div.className = 'post';
            div.innerHTML = `
                <div class="avatar" onclick="Router.viewProfile('${data.user}')">${data.user[0].toUpperCase()}</div>
                <div class="post-content">
                    <div class="post-user" onclick="Router.viewProfile('${data.user}')">@${data.user}</div>
                    <div class="post-text">${data.text}</div>
                    <div class="actions">
                        <div class="action-item" onclick="Social.toggleLike('${id}', '${data.user}')">❤️ ${data.likes}</div>
                        <div class="action-item">💬 0</div>
                    </div>
                </div>
            `;
            return div;
        },
        openComposer() { document.getElementById('modal-composer').style.display = 'flex'; },
        closeComposer() { document.getElementById('modal-composer').style.display = 'none'; }
    };

    // Listeners Globales para Notificaciones
    if(State.me) {
        db.collection("notifications").where("to", "==", State.me).where("read", "==", false)
          .onSnapshot(snap => {
              const el = document.getElementById('notif-count');
              el.innerText = snap.size;
              el.style.display = snap.size > 0 ? 'flex' : 'none';
          });
    }

    // Init
    if(!State.me) Router.go('auth'); else Router.go('feed');

</script>
</body>
</html>
